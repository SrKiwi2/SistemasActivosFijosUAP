<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Responsables</h4>

<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Responsable</h5>
        <h5>Registro Responsable <small id="badgeSource" class="text-muted ms-2"></small></h5>
        <div class="d-flex gap-2">
            <label for="filtroOficina" class="mb-0 fw-semibold">Filtrar por oficina:</label>
            <div class="d-flex align-items-center gap-2">
                <select id="filtroOficina" class="form-select form-select" style="min-width:260px">
                    <option value="">Todas</option>
                    <option th:each="o : ${oficinas}" th:value="${o.idOficina}"
                        th:text="${o.predio.unidad + ' - ' + o.codOfi + ' (' + o.predio.entidad.sigla + ')'}">
                    </option>
                </select>
            </div>
            <button id="btnSyncResp" type="button" class="btn btn-outline-secondary">
                <i class="fa-solid fa-file-import me-1"></i> Importar desde DBF montado
            </button>
            <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
                data-bs-target="#modalFormularioResponsable">
                <i class="fa-solid fa-user-plus"></i> Agregar Responsable
            </button>
        </div>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>CODIGO FUNCIONARIO</th>
                    <th>NOMBRE</th>
                    <th>APELLIDO PATERNO</th>
                    <th>APELLIDO MATERNO</th>
                    <th>C.I.</th>
                    <th>OFICINA</th>
                    <th>CARGO</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="modal fade" id="modalFormularioResponsable" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalResponsbale"></div>
    </div>
</div>

<script>
    $(function () {
        $('#filtroOficina').select2({
            placeholder: 'Todas las oficinas',
            allowClear: true,
            width: 'resolve',    // usa el width del elemento
            language: 'es'
        });

        $('#data-table').on('xhr.dt', function (e, settings, json) {
            if (json && json.source) {
                const src = json.source.toUpperCase();
                // Puedes ponerlo en el título, o en algún span que crees:
                $('#badgeSource').text(src === 'DBF' ? '(fuente: DBF)' : '(fuente: BD)');
            }
        });

        const $tbl = $('#data-table');

        // Loader global
        showGlobalLoader({ texto: 'Cargando...' });
        $tbl.on('preXhr.dt', function () { showGlobalLoader({ texto: 'Cargando...' }); });
        $tbl.on('xhr.dt', function () { hideGlobalLoader(); });

        const tbl = $tbl.DataTable({
            processing: false,
            serverSide: true,
            deferRender: true,
            pageLength: 10,
            lengthMenu: [10, 25, 50, 100],
            ajax: {
                url: '/administracion/responsable/api/datatables',
                type: 'POST',
                data: function (d) {
                    const v = $('#filtroOficina').val();
                    if (v && v !== '') {
                        d.oficinaId = v;      // nombre que espera el controller
                    } else {
                        // Importante: no enviar el parámetro vacío
                        if ('oficinaId' in d) delete d.oficinaId;
                    }
                }
            },
            columns: [
                {
                    data: null, orderable: false, searchable: false,
                    render: (d, t, r, m) => m.row + m.settings._iDisplayStart + 1
                },
                { data: 'codFun' },
                { data: 'nombre' },
                { data: 'paterno' },
                { data: 'materno' },
                { data: 'ci' },
                { data: 'oficina' },
                { data: 'cargo' },
                {
                    data: 'idEnc', orderable: false, searchable: false,
                    render: (idEnc) => `
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-danger" onclick="eliminar('RESPONSABLE','${idEnc}')">
                    <i class="fa-solid fa-trash"></i> Eliminar
                    </button>
                </div>` }
            ],
            language: {
                sProcessing: "Procesando...", sLengthMenu: "Mostrar _MENU_",
                sZeroRecords: "No se encontraron resultados",
                sInfo: "Mostrando _START_ a _END_ de _TOTAL_",
                sInfoEmpty: "Mostrando 0 a 0 de 0", sInfoFiltered: "(filtrado de _MAX_)",
                sSearch: "Buscar:", oPaginate: { sFirst: "Primero", sLast: "Último", sNext: "Siguiente", sPrevious: "Anterior" }
            }
        });

        // Debounce buscador
        let t; $('#data-table_filter input').off().on('input', function () {
            clearTimeout(t); const v = this.value; t = setTimeout(() => tbl.search(v).draw(), 250);
        });

        $('#filtroOficina').on('change', function () {
            tbl.ajax.reload(null, true); // respeta la página actual
            // Si prefieres ir siempre a la página 1: tbl.ajax.reload(null, true);
        });

        $(document).on('click', '#btnSyncResp', function () {
            const oficinaId = $('#filtroOficina').val() || '';
            showGlobalLoader({ texto: 'Sincronizando...' });
            $.ajax({
                type: 'POST',
                url: '/administracion/responsable/sync-from-mounted' + (oficinaId ? ('?oficinaId=' + encodeURIComponent(oficinaId)) : ''),
                success: function (res) {
                    Swal.fire('Importación completa',
                        `Leídas: ${res.totalLeidas}<br>
             Insertados: ${res.insertados}<br>
             Actualizados: ${res.actualizados}<br>
             Sin oficina: ${res.sinOficina}<br>
             Personas nuevas: ${res.personasCreadas}<br>
             Cargos creados: ${res.cargosCreados}`,
                        'success');
                    $('#data-table').DataTable().ajax.reload(null, false);
                },
                error: function (xhr) {
                    const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                    Swal.fire('Error', msg, 'error');
                },
                complete: hideGlobalLoader
            });
        });
    });

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/responsable/formulario", "#contenidoModalResponsbale", "#formularioResponsable", () => $('#data-table').DataTable().ajax.reload(null, false));
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/responsable/eliminar", () => $('#data-table').DataTable().ajax.reload(null, false));
    }
</script>
