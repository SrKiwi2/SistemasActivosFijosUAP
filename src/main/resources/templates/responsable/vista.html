<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Responsables</h4>

<div class="card">
    <div class="card-header d-flex flex-column flex-lg-row justify-content-lg-between align-items-lg-center gap-3">
        <div class="d-flex align-items-center gap-2">
            <h5 class="mb-0">Registro Responsable</h5>
        </div>

        <div class="d-flex gap-2 align-items-center flex-wrap">
            <!-- ✅ Badge con información de última sincronización -->
            <span class="badge bg-info" id="ultimaSync" data-bs-toggle="tooltip" data-bs-placement="bottom"
                th:title="'Procesados: ' + (${registrosProcesados ?: 0}) + ' | Nuevos: ' + (${registrosNuevos ?: 0}) + ' | Actualizados: ' + (${registrosActualizados ?: 0}) + ' | Duración: ' + (${duracionUltimaSync ?: 0}) + 's'">
                <i class="fa-solid fa-clock me-1"></i>
                Última sync: <span th:text="${ultimaSincronizacion ?: 'Nunca'}">--</span>
            </span>

            <!-- ✅ Badge de estado -->
            <span class="badge" id="estadoSyncBadge"
                th:classappend="${estadoSync == 'COMPLETADO'} ? 'bg-success' : (${estadoSync == 'ERROR'} ? 'bg-danger' : 'bg-warning')"
                th:text="${estadoSync ?: 'PENDIENTE'}">
            </span>

            <!-- ✅ Botón sincronización incremental -->
            <button id="btnSyncResp" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-sync me-1"></i> Sincronizar
            </button>

            <!-- ✅ Botón sincronización completa -->
            <button id="btnSyncCompleto" class="btn btn-outline-warning btn-sm" data-bs-toggle="tooltip"
                data-bs-placement="bottom" title="Forzar sincronización completa">
                <i class="fa-solid fa-database me-1"></i> Sync Completo
            </button>

            <!-- Filtro de oficina -->
            <label for="filtroOficina" class="mb-0 fw-semibold">Filtro:</label>
            <select id="filtroOficina" class="form-select form-select-sm" style="min-width: 150px;">
                <option value="">Todas</option>
                <option th:each="o : ${oficinas}" th:value="${o.idOficina}"
                    th:text="${o.predio.unidad + ' - ' + o.codOfi}">
                </option>
            </select>

            <button type="button" class="btn btn-primary btn-sm" onclick="cargarFormulario()">
                <i class="fa-solid fa-user-plus me-1"></i> Nuevo Responsable
            </button>

            <label for="filtroOficina" class="mb-0 fw-semibold ms-2">Filtro:</label>
        </div>
    </div>

    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>CODIGO FUNCIONARIO</th>
                    <th>NOMBRE</th>
                    <th>APELLIDO PATERNO</th>
                    <th>APELLIDO MATERNO</th>
                    <th>C.I.</th>
                    <th>OFICINA</th>
                    <th>CARGO</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="modal fade" id="modalFormularioResponsable" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalResponsbale"></div>
    </div>
</div>

<div class="modal fade" id="modalFormularioOficina" tabindex="-1" aria-hidden="true" style="z-index: 1060;"> <div class="modal-dialog modal-lg">
        <div class="modal-content" id="prediocontenidoModalOficina"></div>
    </div>
</div>

<script th:inline="javascript">
    $(document).ready(function () {
        // Inicializar select2
        $('#filtroOficina').select2({
            placeholder: 'Todas las oficinas',
            allowClear: true,
            width: 'resolve',
            language: 'es'
        });

        // Inicializar tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });

        // Inicializar DataTable
        initDataTable();

        // Eventos
        $('#filtroOficina').on('change', function () {
            $('#data-table').DataTable().ajax.reload(null, false);
        });

        $(document).on('click', '#btnSyncResp', function () {
            sincronizar(false);
        });

        $(document).on('click', '#btnSyncCompleto', function () {
            Swal.fire({
                title: '¿Forzar sincronización completa?',
                text: "Esto procesará todos los registros y puede tardar más tiempo",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Sí, sincronizar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    sincronizar(true);
                }
            });
        });
    });

    function cargarFormulario() {
        // Carga el HTML del formulario dentro del modal
        cargarFormularioAlert(
            "/administracion/responsable/formulario", // URL del endpoint
            "#contenidoModalResponsbale",             // ID del div dentro del modal (OJO: revisa si es 'Responsbale' o 'Responsable' en tu HTML)
            "#modalFormularioResponsable",            // ID del modal completo
            () => $('#data-table').DataTable().ajax.reload(null, false) // Callback al cerrar (opcional si ya recargas al guardar)
        );
    }

    function initDataTable() {
        const $tbl = $('#data-table');
        if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();

        const table = $tbl.DataTable({
            processing: false,
            serverSide: true,
            deferRender: true,
            pageLength: 25,
            lengthMenu: [10, 25, 50, 100],
            ajax: {
                url: '/administracion/responsable/api/datatables',
                type: 'POST',
                data: function (d) {
                    const v = $('#filtroOficina').val();
                    if (v && v !== '') {
                        d.oficinaId = v;
                    } else {
                        if ('oficinaId' in d) delete d.oficinaId;
                    }
                }
            },
            columns: [
                {
                    data: null, orderable: false, searchable: false,
                    render: (d, t, r, m) => m.row + m.settings._iDisplayStart + 1
                },
                { data: 'codFun' },
                { data: 'nombre' },
                { data: 'paterno' },
                { data: 'materno' },
                { data: 'ci' },
                { data: 'oficina' },
                { data: 'cargo' },
                {
                    data: 'idResponsable', 
                    orderable: false, 
                    searchable: false,
                    // 🔴 CORRECCIÓN AQUÍ: Usar 'function(data, type, row)'
                    render: function(data, type, row) { 
                        let botones = `
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-danger btn-eliminar-responsable"
                                        data-id="${row.idEnc}"
                                        title="Eliminar responsable">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        `;

                        // ✅ Lógica del botón amarillo basada en la respuesta del Controller
                        if (row.existeEnDbf === false) {
                            botones += `
                                <button class="btn btn-warning btn-sm ms-1 btn-subir-dbf"
                                        data-id="${row.idEnc}"
                                        title="⚠️ No encontrado en DBF. Subir ahora.">
                                    <i class="fa-solid fa-cloud-arrow-up"></i>
                                </button>
                            `;
                        } else {
                            botones += `
                                <span class="badge bg-success ms-1" title="Sincronizado">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            `;
                        }

                        return botones;
                    }
                }
            ],
            language: {
                sProcessing: "Procesando...",
                sLengthMenu: "Mostrar _MENU_ registros",
                sZeroRecords: "No se encontraron resultados",
                sInfo: "Mostrando _START_ a _END_ de _TOTAL_ registros",
                sInfoEmpty: "Mostrando 0 a 0 de 0 registros",
                sInfoFiltered: "(filtrado de _MAX_ registros)",
                sSearch: "Buscar:",
                oPaginate: {
                    sFirst: "Primero",
                    sLast: "Último",
                    sNext: "Siguiente",
                    sPrevious: "Anterior"
                }
            }
        });
    }

    $(document).on('click', '.btn-subir-dbf', function() {
        const idEnc = $(this).data('id');
        Swal.fire({
            title: 'Sincronizar DBF',
            text: "Este reponsable existe en el sistema pero no en el archivo DBF. ¿Desea registrarla ahora?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Sí, registrar',
            confirmButtonColor: '#ffc107'
        }).then((result) => {
            if (result.isConfirmed) {
                showGlobalLoader({ texto: 'Registrando...' });
                $.ajax({
                    type: 'POST',
                    url: '/administracion/responsable/subir-dbf/' + idEnc,
                    success: function(res) {
                        if(res.ok) {
                            Swal.fire('Éxito', res.msg, 'success');
                            cargarTabla(); // Recargar para quitar el icono
                        } else {
                            Swal.fire('Atención', res.msg, 'warning');
                        }
                    },
                    error: function(xhr) {
                        Swal.fire('Error', 'Falló el registro', 'error');
                    },
                    complete: hideGlobalLoader
                });
            }
        });
    });

    function sincronizar(forzarCompleto) {
        showGlobalLoader({ texto: 'Sincronizando Responsables...' });

        $.ajax({
            type: 'POST',
            url: '/administracion/responsable/sync-from-mounted',
            data: { forzarCompleto: forzarCompleto },
            success: function (res) {
                const tiempoSegundos = (res.duracionMs / 1000).toFixed(2);
                const msg = `
                    <div class="text-start">
                        <p><strong>✅ Sincronización exitosa</strong></p>
                        <hr>
                        <p><i class="fa-solid fa-file-import"></i> Total leídas: <strong>${res.totalLeidas}</strong></p>
                        <p><i class="fa-solid fa-plus-circle text-success"></i> Insertados: <strong>${res.insertados}</strong></p>
                        <p><i class="fa-solid fa-edit text-primary"></i> Actualizados: <strong>${res.actualizados}</strong></p>
                        <p><i class="fa-solid fa-check-circle text-info"></i> Omitidos (sin cambios): <strong>${res.omitidos || 0}</strong></p>
                        <hr>
                        <p class="text-muted"><strong>Análisis de registros no procesados:</strong></p>
                        <p><i class="fa-solid fa-times-circle text-danger"></i> Campos nulos: <strong>${res.camposNulos || 0}</strong></p>
                        <p><i class="fa-solid fa-copy text-warning"></i> Duplicados en DBF: <strong>${res.duplicadosDbf || 0}</strong></p>
                        <p><i class="fa-solid fa-building text-danger"></i> Sin oficina: <strong>${res.sinOficina || 0}</strong></p>
                        <p><i class="fa-solid fa-id-card text-warning"></i> Sin CI: <strong>${res.sinCi || 0}</strong></p>
                        ${res.colisiones > 0 ? `<p><i class="fa-solid fa-exclamation-triangle text-danger"></i> Colisiones de caché: <strong>${res.colisiones}</strong></p>` : ''}
                        <hr>
                        <p><i class="fa-solid fa-user-plus text-info"></i> Personas creadas: <strong>${res.personasCreadas}</strong></p>
                        <p><i class="fa-solid fa-briefcase text-info"></i> Cargos creados: <strong>${res.cargosCreados}</strong></p>
                        <p><i class="fa-solid fa-clock"></i> Tiempo: <strong>${tiempoSegundos}s</strong></p>
                        ${res.registrosSinOficina && res.registrosSinOficina.length > 0 ? `
                            <hr>
                            <details>
                                <summary class="text-danger"><strong>⚠️ Ver registros sin oficina (${res.registrosSinOficina.length})</strong></summary>
                                <ul class="mt-2" style="max-height: 200px; overflow-y: auto;">
                                    ${res.registrosSinOficina.map(r => `<li><small>${r}</small></li>`).join('')}
                                </ul>
                            </details>
                        ` : ''}
                    </div>
                `;

                Swal.fire({
                    title: 'Completado',
                    html: msg,
                    icon: 'success',
                    confirmButtonText: 'Aceptar',
                    width: '600px'
                });

                actualizarInfoSync();
                $('#data-table').DataTable().ajax.reload(null, false);
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                Swal.fire('Error', msg, 'error');
            },
            complete: hideGlobalLoader
        });
    }


    function actualizarInfoSync() {
        $.ajax({
            type: 'GET',
            url: '/administracion/responsable/sync-info',
            success: function (info) {
                $('#ultimaSync span').text(info.ultimaSincronizacion);

                const tooltip = `Procesados: ${info.registrosProcesados || 0} | Nuevos: ${info.registrosNuevos || 0} | Actualizados: ${info.registrosActualizados || 0} | Duración: ${info.duracionSegundos || 0}s`;
                $('#ultimaSync').attr('data-bs-original-title', tooltip);

                const badgeEstado = $('#estadoSyncBadge');
                badgeEstado.removeClass('bg-success bg-danger bg-warning');

                if (info.estado === 'COMPLETADO') {
                    badgeEstado.addClass('bg-success');
                } else if (info.estado === 'ERROR') {
                    badgeEstado.addClass('bg-danger');
                } else {
                    badgeEstado.addClass('bg-warning');
                }

                badgeEstado.text(info.estado);
            }
        });
    }

    $(document).on('click', '.btn-eliminar-responsable', function () {
        const id = $(this).data('id');
        eliminar('RESPONSABLE', id);
    });

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/responsable/formulario", "#contenidoModalResponsable", "#formularioResponsable",
            () => $('#data-table').DataTable().ajax.reload(null, false));
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/responsable/eliminar",
            () => $('#data-table').DataTable().ajax.reload(null, false));
    }
</script>
