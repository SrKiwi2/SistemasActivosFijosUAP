<div class="modal-header">
    <h5 class="modal-title" id="modalTitle">
        <i class="fa-solid fa-user-tie me-2"></i>
        <span th:text="${responsable.idResponsable != null ? 'Editar Responsable' : 'Nuevo Responsable'}"></span>
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body">
    <form id="formResponsable" autocomplete="off">
        <input type="hidden" id="idResponsable" name="idResponsable" th:value="${responsable.idResponsable}">
        
        <div class="card mb-3 border-primary-subtle">
            <div class="card-header bg-primary-subtle text-primary fw-bold py-2">
                <i class="fa-solid fa-user me-1"></i> Datos Personales
            </div>
            <div class="card-body py-2">
                <div class="row g-2">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">C.I. / Documento <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="txtCi" name="ci" 
                                   th:value="${responsable.persona?.ci}" placeholder="Ingrese C.I.">
                            <button class="btn btn-outline-primary" type="button" id="btnBuscarPersona" title="Buscar Persona">
                                <i class="fa-solid fa-search"></i>
                            </button>
                        </div>
                        <div id="ciFeedback" class="form-text text-muted small">Pulse la lupa para buscar.</div>
                    </div>
                    
                    <div class="col-md-8">
                        <div class="alert alert-warning py-1 px-2 mb-0 d-none" id="alertNuevaPersona" style="font-size: 0.8rem;">
                            <i class="fa-solid fa-info-circle"></i> Persona no encontrada. Complete los datos para crearla.
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtNombre" name="nombre" 
                               th:value="${responsable.persona?.nombre}" readonly required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Paterno</label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtPaterno" name="paterno" 
                               th:value="${responsable.persona?.paterno}" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Materno</label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtMaterno" name="materno" 
                               th:value="${responsable.persona?.materno}" readonly>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 border-secondary-subtle">
            <div class="card-header bg-secondary-subtle text-secondary fw-bold py-2">
                <i class="fa-solid fa-briefcase me-1"></i> Asignación Institucional
            </div>
            <div class="card-body py-2">
                <div class="row g-2">
                    
                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Oficina Asignada <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <select class="form-select" id="selectOficina" name="idOficina" required>
                                <option value="">Buscar oficina...</option>
                                <option th:each="of : ${oficinas}" 
                                        th:value="${of.idOficina}" 
                                        th:text="${of.predio.unidad + ' - ' + of.codOfi + ' | ' + of.nombre}"
                                        th:selected="${responsable.oficina?.idOficina == of.idOficina}">
                                </option>
                            </select>
                            <button class="btn btn-outline-success" type="button" id="btnAddOficina" title="Nueva Oficina">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Código Funcionario <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="txtCodigoFuncionario" name="codigoFuncionario" 
                                   th:value="${responsable.codigoFuncionario}" required placeholder="Ej: 5">
                            <button class="btn btn-outline-secondary" type="button" id="btnSugerirCodigo" title="Sugerir siguiente código">
                                <i class="fa-solid fa-magic"></i>
                            </button>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Cargo <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <select class="form-select" id="selectCargo" name="cargoApi">
                                <option value="">Seleccione o cree...</option>
                                <option th:if="${responsable.cargo != null}" 
                                        th:value="${responsable.cargo.nombre}" 
                                        th:text="${responsable.cargo.nombre}" selected>
                                </option>
                            </select>
                            <button class="btn btn-outline-info" type="button" id="btnAddCargo" title="Crear nuevo cargo">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="button" class="btn btn-primary btn-sm" id="btnGuardarResponsable">
        <i class="fa-solid fa-save me-1"></i> Guardar Responsable
    </button>
</div>

<script>
$(document).ready(function() {
    
    // 1. INICIALIZAR SELECT2 (Búsqueda potente)
    $('#selectOficina').select2({
        theme: 'bootstrap-5',
        dropdownParent: $('#modalFormularioResponsable'),
        width: '100%',
        placeholder: 'Escriba unidad, código o nombre...',
        allowClear: true
    });

    // Cargar cargos vía AJAX para no saturar el DOM inicial
    $('#selectCargo').select2({
        theme: 'bootstrap-5',
        dropdownParent: $('#modalFormularioResponsable'),
        width: '100%',
        tags: true, // ¡Permite escribir un cargo nuevo y seleccionarlo!
        placeholder: 'Seleccione cargo',
        ajax: {
            url: '/api/cargos/search', // Necesitarás este endpoint simple
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return {
                    results: data.map(c => ({ id: c.nombre, text: c.nombre }))
                };
            }
        }
    });

    // 2. LÓGICA DE BÚSQUEDA DE PERSONA
    $('#btnBuscarPersona').on('click', function() {
        const ci = $('#txtCi').val().trim();
        if(!ci) {
            Swal.fire('Atención', 'Ingrese un C.I. para buscar', 'warning');
            return;
        }

        // Simular carga
        const btn = $(this);
        const originalHtml = btn.html();
        btn.html('<i class="fa-solid fa-spinner fa-spin"></i>').prop('disabled', true);

        $.ajax({
            url: '/api/personas/buscar-por-ci', // Ajusta tu endpoint
            data: { ci: ci },
            success: function(persona) {
                if(persona) {
                    // ENCONTRADO
                    $('#txtNombre').val(persona.nombre).prop('readonly', true);
                    $('#txtPaterno').val(persona.paterno).prop('readonly', true);
                    $('#txtMaterno').val(persona.materno).prop('readonly', true);
                    $('#alertNuevaPersona').addClass('d-none');
                    $('#ciFeedback').text('✅ Persona encontrada en el sistema.').removeClass('text-muted text-danger').addClass('text-success');
                } else {
                    // NO ENCONTRADO - MODO CREACIÓN
                    activarModoNuevaPersona();
                }
            },
            error: function() {
                // Error o 404
                activarModoNuevaPersona();
            },
            complete: function() {
                btn.html(originalHtml).prop('disabled', false);
            }
        });
    });

    function activarModoNuevaPersona() {
        $('.input-persona').prop('readonly', false).val('');
        $('#txtNombre').focus();
        $('#alertNuevaPersona').removeClass('d-none');
        $('#ciFeedback').text('⚠️ Persona no registrada. Ingrese los datos manualmente.').removeClass('text-muted text-success').addClass('text-danger');
    }

    // 3. LOGICA PARA AGREGAR NUEVA OFICINA (Abre el otro modal)
    $('#btnAddOficina').on('click', function() {
        // Ocultar modal actual temporalmente
        $('#modalFormularioResponsable').modal('hide');
        
        // Cargar modal de oficina
        // Asumimos que tienes un div #contenedorModalOficina en tu vista principal
        // y usas cargarFormularioAlert de oficina
        
        // TRUCO: Sobrescribir temporalmente la función de recarga de tabla de oficina
        // para que en lugar de recargar tabla, vuelva a abrir este modal y recargue el select.
        cargarFormularioOficinaCallback = function() {
            // Recargar lista de oficinas
            $.get('/api/oficinas/list-select', function(data) {
                let options = '<option value="">Buscar oficina...</option>';
                data.forEach(o => {
                    options += `<option value="${o.idOficina}">${o.predio.unidad} - ${o.codOfi} | ${o.nombre}</option>`;
                });
                $('#selectOficina').html(options).trigger('change');
                
                // Reabrir modal responsable
                $('#modalFormularioResponsable').modal('show');
            });
        };
        
        // Llamar a tu función existente para cargar form de oficina
        cargarFormularioAlert("/administracion/oficina/formulario", "#prediocontenidoModalOficina", "#formularioOficina", cargarFormularioOficinaCallback);
    });

    // 4. LOGICA PARA CREAR CARGO RÁPIDO
    $('#btnAddCargo').on('click', function() {
        Swal.fire({
            title: 'Nuevo Cargo',
            input: 'text',
            inputLabel: 'Nombre del Cargo',
            inputPlaceholder: 'Ej. JEFE DE UNIDAD',
            showCancelButton: true,
            confirmButtonText: 'Crear',
            preConfirm: (nombre) => {
                if (!nombre) Swal.showValidationMessage('Escriba un nombre');
                return nombre;
            }
        }).then((result) => {
            if (result.isConfirmed) {
                // Agregar al select temporalmente (el backend lo creará al guardar responsable si no existe)
                const nuevoCargo = new Option(result.value.toUpperCase(), result.value.toUpperCase(), true, true);
                $('#selectCargo').append(nuevoCargo).trigger('change');
            }
        });
    });

    // 5. SUGERIR CÓDIGO
    $('#btnSugerirCodigo').on('click', function() {
        const idOficina = $('#selectOficina').val();
        if(!idOficina) {
            Swal.fire('Info', 'Seleccione una oficina primero', 'info');
            return;
        }
        $.get('/administracion/responsable/obtener-siguiente-codigo-funcionario', {idOficina: idOficina}, function(codigo) {
            $('#txtCodigoFuncionario').val(codigo);
        });
    });

    // 6. GUARDAR TODO
    $('#btnGuardarResponsable').on('click', function() {
        if(!$('#formResponsable')[0].checkValidity()) {
            $('#formResponsable')[0].reportValidity();
            return;
        }

        const formData = $('#formResponsable').serialize();
        showGlobalLoader({texto: 'Registrando...'});

        $.ajax({
            url: '/administracion/responsable/registrar-responsable',
            type: 'POST',
            data: formData,
            success: function(res) {
                hideGlobalLoader();
                if(res.ok) {
                    Swal.fire('Éxito', res.msg, 'success').then(() => {
                        $('#modalFormularioResponsable').modal('hide');
                        $('#data-table').DataTable().ajax.reload(null, false);
                    });
                } else {
                    Swal.fire('Error', res.msg, 'error');
                }
            },
            error: function(xhr) {
                hideGlobalLoader();
                Swal.fire('Error', 'No se pudo registrar', 'error');
            }
        });
    });
});
</script>
