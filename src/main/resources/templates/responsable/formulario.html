<div class="modal-header bg-primary text-white">
    <h5 class="modal-title text-white">
        <i class="fa-solid fa-user-plus me-2"></i>
        <span th:text="${responsable.idResponsable != null ? 'Editar Responsable' : 'Nuevo Responsable'}"></span>
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body bg-light">
    <form id="formResponsable" autocomplete="off">
        <input type="hidden" name="idResponsable" th:value="${responsable.idResponsable}">
        
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h6 class="card-title text-primary border-bottom pb-2">
                    <i class="fa-solid fa-id-card me-1"></i> Datos Personales
                </h6>
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">C.I. / Documento <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="txtCi" name="ci" 
                                   th:value="${responsable.persona?.ci}" placeholder="Número de Carnet" required>
                            
                            <select class="form-select" name="codExp" style="max-width: 100px;" required>
                                <option value="1" th:selected="${responsable.codExp == 1}">CHQ (1)</option>
                                <option value="2" th:selected="${responsable.codExp == 2}">LPZ (2)</option>
                                <option value="3" th:selected="${responsable.codExp == 3}">CBB (3)</option>
                                <option value="4" th:selected="${responsable.codExp == 4}">ORU (4)</option>
                                <option value="5" th:selected="${responsable.codExp == 5}">PTS (5)</option>
                                <option value="6" th:selected="${responsable.codExp == 6}">TAR (6)</option>
                                <option value="7" th:selected="${responsable.codExp == 7}">SCZ (7)</option>
                                <option value="8" th:selected="${responsable.codExp == 8}">BEN (8)</option>
                                <option value="9" th:selected="${responsable.codExp == 9}">PAN (9)</option>
                            </select>

                            <button class="btn btn-outline-primary" type="button" id="btnBuscarPersona" title="Buscar">
                                <i class="fa-solid fa-search"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="col-md-8">
                        <div class="alert alert-secondary py-1 px-2 mb-0 mt-4 d-none" id="msgPersona" style="font-size: 0.85rem;">
                            </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small">Nombres <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtNombre" name="nombre" th:value="${responsable.persona?.nombre}" readonly required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Paterno <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtPaterno" name="paterno" th:value="${responsable.persona?.paterno}" readonly required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Materno</label>
                        <input type="text" class="form-control form-control-sm input-persona" id="txtMaterno" name="materno" th:value="${responsable.persona?.materno}" readonly>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small">Correo Electrónico</label>
                        <input type="email" class="form-control form-control-sm input-persona" name="correo" 
                               th:value="${responsable.persona?.correo}" readonly placeholder="Opcional">
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h6 class="card-title text-success border-bottom pb-2">
                    <i class="fa-solid fa-building-user me-1"></i> Asignación Institucional
                </h6>

                <div class="row g-3">
                    
                    <div class="col-12">
                        <label class="form-label small fw-bold">Oficina <span class="text-danger">*</span></label>
                        <div class="d-flex"> <div class="flex-grow-1">
                                <select class="form-select" id="selectOficinaForm" name="idOficina" required style="width: 100%;">
                                    <option value="">Buscar oficina...</option>
                                    <option th:each="of : ${oficinas}" 
                                            th:value="${of.idOficina}" 
                                            th:text="${of.predio.unidad + ' - ' + of.codOfi + ' | ' + of.nombre}"
                                            th:selected="${responsable.oficina?.idOficina == of.idOficina}">
                                    </option>
                                </select>
                            </div>
                            <button class="btn btn-success ms-1" type="button" id="btnNuevaOficina" title="Nueva Oficina" style="height: 38px;"> <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Cod. Funcionario <span class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="txtCodFun" name="codigoFuncionario" 
                                   th:value="${responsable.codigoFuncionario}" required placeholder="Correlativo">
                            <button class="btn btn-outline-secondary" type="button" id="btnSugerir" title="Autogenerar siguiente">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </button>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label small">Código API (Opcional)</label>
                        <input type="text" class="form-control form-control-sm" name="codigoApi" 
                               th:value="${responsable.codigoApi}" placeholder="Código externo si aplica">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Cargo <span class="text-danger">*</span></label>
                        <div class="d-flex">
                            <div class="flex-grow-1">
                                <select class="form-select" id="selectCargo" name="cargoApi" required style="width: 100%;">
                                    <option value="">Seleccione o cree uno...</option>
                                    <option th:if="${responsable.cargo != null}" 
                                            th:value="${responsable.cargo.nombre}" 
                                            th:text="${responsable.cargo.nombre}" selected>
                                    </option>
                                </select>
                            </div>
                            <button class="btn btn-info text-white ms-1" type="button" id="btnNuevoCargo" title="Nuevo Cargo" style="height: 38px;">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btnGuardar">
        <i class="fa-solid fa-check me-1"></i> Guardar
    </button>
</div>

<script>
$(document).ready(function() {

    let idResp = $('input[name="idResponsable"]').val();

    if (idResp && idResp !== "") {
        // Estamos en MODO EDICIÓN
        console.log("Modo Edición detectado: Habilitando campos de persona.");
        $('.input-persona').prop('readonly', false).css('background-color', '#fff');
        
        // Opcional: Si también quieres permitir corregir el CI
        $('#txtCi').prop('readonly', false); 
    } else {
        // Estamos en MODO NUEVO (Mantenemos gris por defecto)
        $('.input-persona').prop('readonly', true).css('background-color', '#e9ecef');
    }
    
    // 1. SELECT2 para OFICINA
    $('#selectOficinaForm').select2({
        theme: 'bootstrap-5',
        dropdownParent: $('#modalFormularioResponsable'), // Importante para que funcione en modal
        width: '100%',
        placeholder: 'Buscar oficina...'
    });

    // 2. SELECT2 para CARGO (Con AJAX y Tags)
    $('#selectCargo').select2({
        theme: 'bootstrap-5',
        dropdownParent: $('#modalFormularioResponsable'),
        width: '100%',
        tags: true, // Permite escribir texto nuevo
        placeholder: 'Busque o escriba un cargo nuevo...',
        ajax: {
            url: '/administracion/responsable/api/cargos/search',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return {
                    results: data.map(function(c) {
                        return { id: c.nombre, text: c.nombre };
                    })
                };
            },
            cache: true
        }
    });

    

    // 3. BUSCADOR DE PERSONA
    $('#btnBuscarPersona').click(function() {
        let ci = $('#txtCi').val();
        if(!ci) return Swal.fire('Error', 'Ingrese un CI', 'error');

        $('#btnBuscarPersona').html('<i class="fa-solid fa-spinner fa-spin"></i>');

        $.ajax({
            url: '/administracion/responsable/api/personas/buscar-por-ci',
            data: { ci: ci },
            success: function(p) {
                // Encontrado -> Bloquear campos
                $('#txtNombre').val(p.nombre).prop('readonly', true).css('background-color', '#e9ecef');
                $('#txtPaterno').val(p.paterno).prop('readonly', true).css('background-color', '#e9ecef');
                $('#txtMaterno').val(p.materno).prop('readonly', true).css('background-color', '#e9ecef');
                
                $('#msgPersona').removeClass('d-none alert-warning').addClass('alert-success')
                    .html('<i class="fa-solid fa-check-circle"></i> Persona encontrada en el sistema.');
            },
            error: function() {
                // No encontrado -> Desbloquear para registro
                $('.input-persona').val('').prop('readonly', false).css('background-color', '#fff');
                $('#txtNombre').focus();
                
                $('#msgPersona').removeClass('d-none alert-success').addClass('alert-warning')
                    .html('<i class="fa-solid fa-pen"></i> Persona nueva. Ingrese los datos manualmente.');
            },
            complete: function() {
                $('#btnBuscarPersona').html('<i class="fa-solid fa-search"></i>');
                $('#msgPersona').removeClass('d-none');
            }
        });
    });

    // 4. NUEVA OFICINA (Llamada al otro modal)
    $('#btnNuevaOficina').click(function() {
        // Ocultar este modal
        $('#modalFormularioResponsable').modal('hide');
        
        // Llamar a cargarFormulario de oficina (asegúrate de tener esta función global)
        if(typeof cargarFormularioOficinaAlert === 'function') {
             // Si tienes un helper global
             cargarFormularioOficinaAlert(); 
        } else {
             // Carga manual
             $('#prediocontenidoModalOficina').load('/administracion/oficina/formulario', function() {
                 $('#modalFormularioOficina').modal('show');
             });
        }
        
        // Cuando se cierre el modal de oficina, reabrir este y recargar select
        $('#modalFormularioOficina').one('hidden.bs.modal', function () {
            $('#modalFormularioResponsable').modal('show');
            // Recargar select de oficinas (Implementa un endpoint simple o recarga todo)
            recargarSelectOficinas(); 
        });
    });

    function recargarSelectOficinas() {
        $.get('/administracion/responsable/api/oficinas/list-select', function(data) {
            let opts = '<option value="">Buscar oficina...</option>';
            data.forEach(o => {
                opts += `<option value="${o.idOficina}">${o.predio.unidad} - ${o.codOfi} | ${o.nombre}</option>`;
            });
            $('#selectOficinaForm').html(opts);
        });
    }

    // 5. NUEVO CARGO (SweetAlert)
    $('#btnNuevoCargo').click(function() {
        Swal.fire({
            title: 'Nuevo Cargo',
            input: 'text',
            inputLabel: 'Nombre del cargo',
            showCancelButton: true,
            confirmButtonText: 'Usar',
            preConfirm: (val) => {
                if (!val) Swal.showValidationMessage('Escriba algo');
                return val.toUpperCase();
            }
        }).then((res) => {
            if(res.isConfirmed) {
                // Crear opción en el select y seleccionarla
                let newOption = new Option(res.value, res.value, true, true);
                $('#selectCargo').append(newOption).trigger('change');
            }
        });
    });

    // 6. SUGERIR CODIGO
    $('#selectOficinaForm').on('select2:select', function(e) {
        const idOficina = $(this).val();
        if(idOficina) {
            // Solo autogenerar si estamos creando O si el usuario cambió la oficina a propósito
            // Para edición, no queremos perder el código original al abrir el modal
            sugerirCodigo(idOficina);
        }
    });

    $('#btnSugerir').click(function() {
        let idOficina = $('#selectOficinaForm').val();
        if(idOficina) sugerirCodigo(idOficina);
        else Swal.fire('Atención', 'Seleccione una oficina', 'warning');
    });

    function sugerirCodigo(idOficina) {
        $.get('/administracion/responsable/obtener-siguiente-codigo-funcionario', { idOficina: idOficina }, function(cod) {
            $('#txtCodFun').val(cod).addClass('bg-warning-subtle');
            setTimeout(() => $('#txtCodFun').removeClass('bg-warning-subtle'), 500);
        });
    }



    // 7. GUARDAR
    $('#btnGuardar').click(function() {
        if(!$('#formResponsable')[0].checkValidity()) {
            $('#formResponsable')[0].reportValidity();
            return;
        }

        let data = $('#formResponsable').serialize();
        
        // Detectar si es edición buscando el input hidden que inyectamos
        let idEnc = $('input[name="idResponsableEnc"]').val();
        
        // Definir URL y mensaje
        let url = idEnc ? '/administracion/responsable/modificar-responsable' : '/administracion/responsable/registrar-responsable';
        let texto = idEnc ? 'Actualizando...' : 'Registrando...';

        showGlobalLoader({ texto: texto });

        $.ajax({
            type: 'POST',
            url: url,
            data: data,
            success: function(res) {
                hideGlobalLoader();
                if(res.ok) {
                    Swal.fire('Éxito', res.msg, 'success').then(() => {
                        $('#modalFormularioResponsable').modal('hide');
                        $('#data-table').DataTable().ajax.reload(null, false);
                    });
                } else {
                    let icon = (res.msg && res.msg.includes("DBF")) ? 'warning' : 'error';
                    Swal.fire('Atención', res.msg, icon);
                }
            },
            error: function(xhr) {
                hideGlobalLoader();
                let msg = xhr.responseJSON ? xhr.responseJSON.msg : 'Error desconocido';
                Swal.fire('Error', msg, 'error');
            }
        });
    });
});
</script>
