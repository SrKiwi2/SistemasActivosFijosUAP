<div class="modal-header">
    <h4 class="modal-title">Registrar Responsable</h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioResponsable" method="post" th:action="@{/administracion/responsable/registrar-responsable}"
    novalidate>
    <input type="hidden" th:if="${edit != null}" name="idResponsable">
    
    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Código Funcionario (API) - Opcional</label>
                <input type="text" id="codigoFuncionarioInput" name="codigoApi" class="form-control"
                    placeholder="Opcional - Si consulta API" />
                <small class="text-muted">Opcional: Solo si consultas la API</small>
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">C.I. *</label>
                <div class="input-group">
                    <input type="text" id="ciInput" name="ci" class="form-control" required />
                    <button type="button" id="consultarApiBtn" class="btn btn-primary">
                        <i class="fa-solid fa-search"></i> Consultar API
                    </button>
                </div>
            </div>
        </div>
        
        <hr>
        
        <h6 class="mb-3">Datos de la Persona</h6>
        <div id="datosResponsableDiv" class="row">
            <!-- ✅ Campos VISIBLES y editables para capturar datos -->
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Nombre *</label>
                <input type="text" id="nombreInput" name="nombre" class="form-control" 
                       required placeholder="Ej: JUAN" />
                <div class="invalid-feedback">Por favor ingrese el nombre.</div>
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Apellido Paterno *</label>
                <input type="text" id="paternoInput" name="paterno" class="form-control" 
                       required placeholder="Ej: PÉREZ" />
                <div class="invalid-feedback">Por favor ingrese el apellido paterno.</div>
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Apellido Materno</label>
                <input type="text" id="maternoInput" name="materno" class="form-control" 
                       placeholder="Ej: GÓMEZ (opcional)" />
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="correoInput" name="correo" class="form-control" 
                       placeholder="ejemplo@uap.edu.bo (opcional)" />
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Cargo</label>
                <input type="text" id="cargoApiInput" name="cargoApi" class="form-control" 
                       placeholder="Ej: JEFE DE UNIDAD (opcional)" />
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Oficina *</label>
                <select id="selectOficina" name="idOficina" class="form-select select2it" required>
                    <option value="">Seleccione Oficina...</option>
                    <option th:each="o : ${oficinas}" th:value="${o.idOficina}" th:text="${o.nombre}"></option>
                </select>
                <div class="invalid-feedback">Debe seleccionar una oficina.</div>
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Código Funcionario (Final) *</label>
                <input type="text" id="codFuncFinalInput" name="codigoFuncionario" 
                       class="form-control" required readonly />
                <small class="text-muted">Se genera automáticamente según la oficina</small>
            </div>
        </div>
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fa-solid fa-xmark me-1"></i> Cancelar
        </button>
        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-save me-1"></i> Guardar Registro
        </button>
    </div>
</form>

<script>
    function inicializarFormularioResponsable() {
        const $codFuncInput = document.getElementById('codigoFuncionarioInput');
        const $ciInput = document.getElementById('ciInput');
        const $consultarBtn = document.getElementById('consultarApiBtn');
        const $codFuncFinal = document.getElementById('codFuncFinalInput');
        const $selectOficina = document.getElementById('selectOficina');
        
        // ✅ Campos editables
        const $nombreInput = document.getElementById('nombreInput');
        const $paternoInput = document.getElementById('paternoInput');
        const $maternoInput = document.getElementById('maternoInput');
        const $correoInput = document.getElementById('correoInput');
        const $cargoApiInput = document.getElementById('cargoApiInput');
        
        // Obtener código funcionario correlativo
        function obtenerCorrelativoCodigoFuncionario() {
            const idOficina = $selectOficina.value;
            if (!idOficina) {
                $codFuncFinal.value = '';
                return;
            }
            
            const url = `[[@{/administracion/responsable/obtener-siguiente-codigo-funcionario}]]?idOficina=${idOficina}`;
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Error al obtener el correlativo.');
                    return response.text();
                })
                .then(siguienteCodigo => {
                    $codFuncFinal.value = siguienteCodigo.trim();
                })
                .catch(error => {
                    console.error('Error al obtener el correlativo:', error);
                    $codFuncFinal.value = '';
                });
        }
        
        // Consultar API
        function consultarApi() {
            const codigoFuncionario = $codFuncInput.value.trim();
            const ci = $ciInput.value.trim();
            
            if (!ci) {
                alert('Por favor, ingrese el C.I. primero');
                return;
            }
            
            if (!codigoFuncionario) {
                alert('Por favor, ingrese el Código de Funcionario de la API');
                return;
            }
            
            const url = `[[@{/administracion/responsable/consultar-api-datos}]]?codigoFuncionario=${codigoFuncionario}&ci=${ci}`;
            
            if (typeof showGlobalLoader === 'function') {
                showGlobalLoader({ texto: 'Consultando API...' });
            }
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('No se encontraron datos en la API');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.yaEsResponsable) {
                        alert('¡Advertencia! Este Código Funcionario ya está registrado.');
                        return;
                    }
                    
                    // ✅ Llenar campos editables con datos de la API
                    $nombreInput.value = data.nombre || '';
                    $paternoInput.value = data.paterno || '';
                    $maternoInput.value = data.materno || '';
                    $correoInput.value = data.correo || '';
                    $cargoApiInput.value = data.nombreCargoApi || '';
                    
                    alert('Datos cargados desde la API. Puede modificarlos antes de guardar.');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('No se encontraron datos en la API. Puede ingresar los datos manualmente.');
                })
                .finally(() => {
                    if (typeof hideGlobalLoader === 'function') {
                        hideGlobalLoader();
                    }
                });
        }
        
        $consultarBtn.addEventListener('click', consultarApi);
        $selectOficina.addEventListener('change', obtenerCorrelativoCodigoFuncionario);
        
        // Obtener correlativo inicial si ya hay oficina seleccionada
        if ($selectOficina.value) {
            setTimeout(obtenerCorrelativoCodigoFuncionario, 100);
        }
        
        // ===== MANEJO DEL SUBMIT =====
        const form = document.getElementById('formularioResponsable');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }
            
            const formData = new FormData(form);
            
            // ✅ Log para verificar datos
            console.log('=== DATOS DEL FORMULARIO ===');
            for (let [key, value] of formData.entries()) {
                console.log(`${key}: ${value}`);
            }
            
            showGlobalLoader({ texto: 'Guardando...' });
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                
                hideGlobalLoader();
                
                const data = await response.json();
                
                // Manejar conflicto de personas similares
                if (response.status === 409 && data.requireConfirmacion) {
                    const confirmar = confirm(data.msg);
                    
                    if (confirmar) {
                        // Usuario confirmó, continuar con registro
                        showGlobalLoader({ texto: 'Creando nueva persona...' });
                        
                        // Agregar flag de confirmación
                        formData.append('forzarCreacion', 'true');
                        
                        const response2 = await fetch(form.action, {
                            method: 'POST',
                            body: formData
                        });
                        
                        hideGlobalLoader();
                        const data2 = await response2.json();
                        
                        if (data2.ok) {
                            alert(data2.msg);
                            cerrarModalYRecargar();
                        } else {
                            throw new Error(data2.msg);
                        }
                    }
                    return;
                }
                
                if (!response.ok || !data.ok) {
                    throw new Error(data.msg || 'Error al guardar');
                }
                
                alert(data.msg || 'Guardado correctamente');
                cerrarModalYRecargar();
                
            } catch (error) {
                hideGlobalLoader();
                console.error('Error:', error);
                alert('Error al guardar: ' + error.message);
            }
        });
        
        function cerrarModalYRecargar() {
            const modal = bootstrap.Modal.getInstance(document.getElementById('modalResponsable'));
            if (modal) {
                modal.hide();
            }
            
            if (window.$ && $('#data-table-responsable').length) {
                $('#data-table-responsable').DataTable().ajax.reload(null, false);
            }
            
            form.reset();
            form.classList.remove('was-validated');
        }
    }
    
    inicializarFormularioResponsable();
</script>
