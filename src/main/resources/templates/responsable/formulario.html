<div class="modal-header">
    <h4 class="modal-title">Registrar Responsable</h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioResponsable" method="post" th:action="@{/administracion/responsable/registrar-responsable}"
    novalidate>
    <input type="hidden" th:if="${edit != null}" name="idResponsable">
    
    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Código Funcionario (API) - Opcional</label>
                <input type="text" id="codigoFuncionarioInput" name="codigoApi" class="form-control"
                    placeholder="Opcional - Si consulta API" />
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">C.I.</label>
                <input type="text" id="ciInput" name="ci" class="form-control" required />
            </div>
            
            <div class="col-12 col-md-4 mb-2 d-flex align-items-end">
                <button type="button" id="consultarApiBtn" class="btn btn-primary w-100">Consultar API</button>
            </div>
        </div>
        <hr>
        
        <div id="datosResponsableDiv" class="row">
            <input type="hidden" id="nombreInput" name="nombre">
            <input type="hidden" id="paternoInput" name="paterno">
            <input type="hidden" id="maternoInput" name="materno">
            <input type="hidden" id="correoInput" name="correo">
            <input type="hidden" id="idCargoInput" name="cargoApi">
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Nombre Completo</label>
                <input type="text" id="nombreCompletoApi" class="form-control" />
            </div>
            
            <div class="col-12 col-md-6 mb-2">
                <label class="form-label">Correo</label>
                <input type="text" id="correoApi" class="form-control" />
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Cargo Sugerido (API)</label>
                <input type="text" id="cargoApi" class="form-control" />
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Oficina</label>
                <select id="selectOficina" name="idOficina" class="form-select select2it" required>
                    <option value="">Seleccione Oficina...</option>
                    <option th:each="o : ${oficinas}" th:value="${o.idOficina}" th:text="${o.nombre}"></option>
                </select>
            </div>
            
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Código Funcionario (Final)</label>
                <input type="text" id="codFuncFinalInput" name="codigoFuncionario" 
                       class="form-control" required />
            </div>
        </div>
    </div>
    
    <div class="modal-footer">
        <div class="row">
            <div class="col-12">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <input type="submit" class="btn btn-success" value="Guardar Registro">
            </div>
        </div>
    </div>
</form>

<script>
    function inicializarFormularioResponsable() {
        const $codFuncInput = document.getElementById('codigoFuncionarioInput');
        const $ciInput = document.getElementById('ciInput');
        const $consultarBtn = document.getElementById('consultarApiBtn');
        const $nombreCompletoApi = document.getElementById('nombreCompletoApi');
        const $correoApi = document.getElementById('correoApi');
        const $cargoApi = document.getElementById('cargoApi');
        const $codFuncFinal = document.getElementById('codFuncFinalInput');
        const $selectOficina = document.getElementById('selectOficina');
        
        const $nombreInput = document.getElementById('nombreInput');
        const $paternoInput = document.getElementById('paternoInput');
        const $maternoInput = document.getElementById('maternoInput');
        const $correoInput = document.getElementById('correoInput');
        const $idCargoInput = document.getElementById('idCargoInput');
        
        function obtenerCorrelativoCodigoFuncionario() {
            const idOficina = $selectOficina.value;
            if (!idOficina) {
                $codFuncFinal.value = '';
                return;
            }
            
            const url = `[[@{/administracion/responsable/obtener-siguiente-codigo-funcionario}]]?idOficina=${idOficina}`;
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Error al obtener el correlativo.');
                    return response.text();
                })
                .then(siguienteCodigo => {
                    $codFuncFinal.value = siguienteCodigo.trim();
                })
                .catch(error => {
                    console.error('Error al obtener el correlativo:', error);
                    $codFuncFinal.value = '';
                });
        }
        
        function consultarApi() {
            const codigoFuncionario = $codFuncInput.value.trim();
            const ci = $ciInput.value.trim();
            
            if (!ci) {
                alert('Por favor, ingrese el C.I.');
                return;
            }
            
            if (!codigoFuncionario) {
                console.log('No se proporcionó código de funcionario API, continuando solo con CI');
                return;
            }
            
            const url = `[[@{/administracion/responsable/consultar-api-datos}]]?codigoFuncionario=${codigoFuncionario}&ci=${ci}`;
            
            if (typeof showGlobalLoader === 'function') {
                showGlobalLoader({ texto: 'Consultando API...' });
            }
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error al consultar la API o datos no encontrados. Código: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.yaEsResponsable) {
                        alert('¡Advertencia! Este Código Funcionario ya está registrado.');
                        return;
                    }
                    
                    $nombreCompletoApi.value = `${data.nombre} ${data.paterno} ${data.materno || ''}`.trim();
                    $correoApi.value = data.correo || 'N/A';
                    $cargoApi.value = data.nombreCargoApi || 'N/A';
                    
                    $nombreInput.value = data.nombre || '';
                    $paternoInput.value = data.paterno || '';
                    $maternoInput.value = data.materno || '';
                    $correoInput.value = data.correo || '';
                    $idCargoInput.value = data.nombreCargoApi || '';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error en la consulta. Puede continuar con el registro manual.');
                    $nombreCompletoApi.value = '';
                    $correoApi.value = '';
                    $cargoApi.value = '';
                })
                .finally(() => {
                    if (typeof hideGlobalLoader === 'function') {
                        hideGlobalLoader();
                    }
                });
        }
        
        $consultarBtn.addEventListener('click', consultarApi);
        $selectOficina.addEventListener('change', obtenerCorrelativoCodigoFuncionario);
        
        if ($selectOficina.value) {
            setTimeout(obtenerCorrelativoCodigoFuncionario, 100);
        }
        
        const form = document.getElementById('formularioResponsable');
        
        function cerrarModalYRecargar() {
            const modal = bootstrap.Modal.getInstance(document.getElementById('modalResponsable'));
            if (modal) {
                modal.hide();
            }
            
            if (window.$ && $('#data-table-responsable').length) {
                $('#data-table-responsable').DataTable().ajax.reload(null, false);
            }
            
            form.reset();
            form.classList.remove('was-validated');
        }
    }
    inicializarFormularioResponsable();
</script>
