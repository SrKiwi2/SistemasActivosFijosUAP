<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    #data-table {
        font-size: 0.85rem;
    }

    #data-table th,
    #data-table td {
        padding: 0.3rem 0.5rem;
        white-space: nowrap;
    }

    #data-table .btn-sm {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
    }

    .select2-container .select2-selection--single {
        height: 31px !important;
        font-size: 0.875rem;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 31px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 31px !important;
    }
</style>
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Registro Activo</h5>
        <div class="d-flex gap-2">

            <div class="d-flex gap-2">
                <button id="btnSyncActivos" type="button" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-file-import me-1"></i> Importar desde DBF montado
                </button>

                <button type="button" id="btn-clear-filtros" class="btn btn-outline-dark">
                    <i class="bi bi-eraser"></i> Limpiar filtros
                </button>
                <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
                    data-bs-target="#modalFormularioActivo">
                    <i class="fa-solid fa-user-plus"></i> Agregar Activo
                </button>
            </div>
        </div>
    </div>

    <div class="card-body pb-0">
        <div class="row g-2 mb-3">
            <div class="col-md-2">
                <label for="">Codigo Activo</label>
                <input type="text" id="filtro-codigo" class="form-control form-control-sm"
                    placeholder="Buscar por código...">
            </div>
            <div class="col-md-4">
                <label for="">Buscar por responsable</label>
                <select id="filtro-responsable" class="form-select form-select-sm"
                    data-placeholder="Buscar por nombre o codigo oficina de responsable">
                    <option value=""></option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="">Buscar por oficina</label>
                <select id="filtro-oficina" class="form-select form-select-sm"
                    data-placeholder="Buscar por código o nombre de oficina">
                    <option value=""></option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="">Fecha Adquisición</label>
                <input type="date" id="filtro-fecha" class="form-control form-control-sm">
            </div>
        </div>
    </div>

    <div class="card-datatable table-responsive pt-0 px-3" style="width: 100%;">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th style="min-width: 50px;">#</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Responsable</th>
                    <th>Oficina</th>
                    <th>Costo</th>
                    <th>Vida Util</th>
                    <th>Fecha Adqusiición</th>
                    <th>Estado Activo</th>
                    <th>Descripción</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(function () {
        const $tbl = $('#data-table');
        showGlobalLoader({ texto: 'Cargando...' });

        $tbl.on('preXhr.dt', function () {
            showGlobalLoader({ texto: 'Cargando...' });
        });

        $tbl.on('xhr.dt', function () {
            hideGlobalLoader();
        });

        $tbl.on('xhr.dt', function (e, settings, json) {
            if (json && json.source) {
                const src = json.source.toUpperCase();
                $('#badgeSource').text(src === 'DBF' ? '(fuente: DBF)' : '(fuente: BD)');
            }
            hideGlobalLoader();
        });

        const tbl = $tbl.DataTable({
            processing: false,
            serverSide: true,
            ajax: {
                url: '/administracion/activo/datatables',
                type: 'POST',
                data: function (d) {
                    d.codigo = $('#filtro-codigo').val();
                    d.responsable = $('#filtro-responsable').val();
                    d.oficina = $('#filtro-oficina').val();
                    d.fecha = $('#filtro-fecha').val() || '';
                }
            },
            columns: [
                { data: 'index' },
                { data: 'codigo' },
                { data: 'nombre' },
                { data: 'responsable' },
                { data: 'oficina' },
                { data: 'costo' },
                { data: 'vidaUtil' },
                { data: 'fechaAdquisicion' },
                { data: 'estado' },
                { data: 'descripcion' },
                { data: 'acciones', orderable: false, searchable: false }
            ],
            responsive: true
        });

        $('#filtro-codigo').on('input', function () {
            tbl.ajax.reload();
        });

        $('#filtro-responsable, #filtro-oficina, #filtro-fecha').on('change', function () {
            tbl.ajax.reload();
        });

        $('#filtro-responsable, #filtro-oficina').select2({ // puedes omitir esto si no usas el tema bootstrap
            width: '100%',
            allowClear: true
        });

        /*Filtros de API*/

        $.get('/api/responsables', function (data) {
            const $sel = $('#filtro-responsable');
            const opts = data.map(r => `<option value="${r.id}">${r.nombre}</option>`).join('');
            $sel.append(opts).trigger('change'); // mantiene selección/estado
        });

        $.get('/api/oficinas', function (data) {
            const $sel = $('#filtro-oficina');
            const opts = data.map(o => {
                const label = o.codigo ? `${o.codigo} - ${o.nombre}` : o.nombre;
                return `<option value="${o.id}">${label}</option>`;
            }).join('');
            $sel.append(opts).trigger('change');
        });

        $('#btn-clear-filtros').on('click', function () {
            $('#filtro-codigo').val('');
            $('#filtro-fecha').val('');

            // Para Select2: setear null y disparar change
            $('#filtro-responsable').val(null).trigger('change'); // vuelve a placeholder
            $('#filtro-oficina').val(null).trigger('change');

            tbl.ajax.reload();
        });

        $(document).on('click', '#btnSyncActivos', function () {
            Swal.fire({
                title: 'Sincronizando ACTUAL.DBF…',
                html: `
      <div class="mb-2">Iniciando…</div>
      <div class="progress">
        <div class="progress-bar" role="progressbar" style="width:0%">0%</div>
      </div>`,
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => {
                    Swal.showLoading();
                    startPolling(); // seguirá consultando /sync-progress

                    $.ajax({
                        type: 'POST',
                        url: '/administracion/activo/start-sync',   // <<<<<< AQUI
                        success: function () {
                            // No cerramos: el polling actualizará el modal hasta running=false
                        },
                        error: function (xhr) {
                            const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                            stopPolling();
                            Swal.fire({ icon: 'error', title: 'Error', text: msg });
                        }
                    });
                }
            });
        });

    });
</script>
