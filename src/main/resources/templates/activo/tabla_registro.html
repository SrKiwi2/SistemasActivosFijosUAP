<style>
    #data-table {
        font-size: 0.85rem;
    }
    
    #data-table th, 
    #data-table td {
        padding: 0.3rem 0.5rem;
        white-space: nowrap;
    }
    
    #data-table .btn-sm {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
    }
</style>
<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Activo</h5>
        <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
            data-bs-target="#modalFormularioActivo">
            <i class="fa-solid fa-user-plus"></i> Agregar Activo
        </button>
        <!-- Botón para abrir el modal de improtacion excel-->
        <button type="button" onclick="abrirModal()">Importar Activos</button>

    </div>
    <div class="card-datatable table-responsive pt-0">
        <div class="row mb-3">
            <div class="col-md-2">
                <input type="text" id="filtro-codigo" class="form-control form-control-sm" placeholder="Código">
            </div>

            <div class="col-md-2">
                <select id="filtro-responsable" class="form-control form-control-sm">
                    <option value="">Responsable</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filtro-oficina" class="form-control form-control-sm">
                    <option value="">Oficina</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="date" id="filtro-fecha" class="form-control form-control-sm" placeholder="Fecha adquisición">
            </div>
            <div class="col-md-2">
                <button class="btn btn-sm btn-primary w-100" id="btn-aplicar-filtros">Filtrar</button>
            </div>
        </div>
        
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Responsable</th>
                    <th>Oficina</th>
                    <th>Costo</th>
                    <th>Vida Util</th>
                    <th>Fecha Adqusiición</th>
                    <th>Estado Activo</th>
                    <th>Grupo contable</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    var tablaActivos = $('#data-table').DataTable({
        processing: true,
        serverSide: true,
        ajax: {
            url: '/activo/datatables',
            type: 'POST',
            data: function (d) {
                d.codigo = $('#filtro-codigo').val();
                d.nombre = $('#filtro-nombre').val();
                d.responsable = $('#filtro-responsable').val();
                d.oficina = $('#filtro-oficina').val();
                d.fecha = $('#filtro-fecha').val();
            }
        },
        columns: [
            { data: 'index' },
            { data: 'codigo' },
            { data: 'nombre' },
            { data: 'descripcion' },
            { data: 'responsable' },
            { data: 'oficina' },
            { data: 'costo' },
            { data: 'vidaUtil' },
            { data: 'fechaAdquisicion' },
            { data: 'estado' },
            { data: 'grupoContable' },
            { data: 'acciones', orderable: false, searchable: false }
        ],
        responsive: true
    });

    // Evento para aplicar filtros
    $('#btn-aplicar-filtros').click(function () {
        tablaActivos.ajax.reload();
    });

    $(document).ready(function () {
        $.get('/api/responsables', function (data) {
            data.forEach(function (r) {
                $('#filtro-responsable').append(`<option value="${r.id}">${r.nombre}</option>`);
            });
        });

        $.get('/api/oficinas', function (data) {
            data.forEach(function (o) {
                $('#filtro-oficina').append(`<option value="${o.id}">${o.nombre}</option>`);
            });
        });
    });

</script>
