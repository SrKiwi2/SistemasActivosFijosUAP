<style>
    /* Estilos para el Modal de Detalle */
    .detail-header {
        background-color: #f8f9fa;
        border-bottom: 1px solid #ebecef;
        padding: 1rem 1.5rem;
        border-radius: 0.5rem 0.5rem 0 0;
    }
    
    .detail-group {
        margin-bottom: 1.5rem;
    }

    .detail-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #8592a3; /* Gris suave */
        font-weight: 600;
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .detail-value {
        font-size: 0.95rem;
        font-weight: 500;
        color: #384551; /* Texto oscuro */
        word-wrap: break-word;
    }

    .detail-value.highlight {
        color: #696cff; /* Color primario */
    }

    .detail-icon-box {
        width: 40px;
        height: 40px;
        background-color: rgba(105, 108, 255, 0.1);
        color: #696cff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        margin-right: 1rem;
    }

    .status-banner {
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
    }
</style>

<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Activos pendientes</h4>

<div id="tablaRegistro"></div>

<!-- Modal detalle -->
<div class="modal fade" id="modalDetalleActivo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered"> <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-primary">
                    <i class="fa-solid fa-box-open me-2"></i>Ficha del Activo
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            
            <div class="modal-body pt-4" id="modalDetalleBody">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>

            <div class="modal-footer border-0 bg-light rounded-bottom">
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnAprobarModal" class="btn btn-success px-4" disabled>
                    <i class="fa-solid fa-check-circle me-2"></i> Confirmar y Aprobar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () { cargarTabla(); });

    function cargarTabla() {
        showGlobalLoader({ texto: 'Cargando pendientes...' });
        $.ajax({
            type: 'POST',
            url: "/administracion/activo/tabla-registros_pendientes",
            success: function (response) {
                $("#tablaRegistro").html(response);
                // Si tienes una función initTablaPendientes() en el HTML hijo, se ejecutará sola o puedes llamarla aquí
                if(typeof initTablaPendientes === 'function') initTablaPendientes();
            },
            error: function () {
                $("#tablaRegistro").html(`<div class="alert alert-danger">Error cargando datos.</div>`);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    // === Todo el JS vive en la vista padre ===

    function renderDetalleHtml(d) {
        // Función auxiliar para valores nulos
        const safe = v => (v && v !== 'null') ? v : '<span class="text-muted fst-italic">No definido</span>';
        
        // Formateador de dinero
        const fmtMoney = new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB' });
        const costo = d.costo ? fmtMoney.format(d.costo) : 'Bs 0.00';

        // Acceso seguro a objetos anidados (CORRECCIÓN IMPORTANTE)
        const oficina = d.oficina ? d.oficina.nombre : null;
        const responsable = d.responsable && d.responsable.persona ? d.responsable.persona.nombreCompleto : null;
        const orgFin = d.organismoFinanciero ? d.organismoFinanciero.descripcion : null;
        const auxiliar = d.auxiliar ? d.auxiliar.nombre : null;
        const grupo = d.grupoContable ? d.grupoContable.nombre : null;

        // Banner de estado
        const estadoClass = d.estado === 'PENDIENTE' ? 'bg-warning-subtle text-warning-emphasis' : 'bg-success-subtle text-success-emphasis';
        const estadoIcon = d.estado === 'PENDIENTE' ? '<i class="fa-solid fa-clock"></i>' : '<i class="fa-solid fa-check-circle"></i>';

        return `
            <div class="status-banner ${estadoClass}">
                <div class="fw-bold d-flex align-items-center gap-2">
                    ${estadoIcon}
                    <span>ESTADO: ${d.estado || 'DESCONOCIDO'}</span>
                </div>
                <small class="text-uppercase fw-semibold tracking-wide">ID: ${d.idActivo}</small>
            </div>

            <div class="d-flex mb-4">
                <div class="detail-icon-box">
                    <i class="fa-solid fa-barcode"></i>
                </div>
                <div class="flex-grow-1">
                    <h5 class="mb-1 fw-bold text-dark">${safe(d.codigo)}</h5>
                    <p class="text-muted mb-0 small">${safe(d.descripcion)}</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-regular fa-calendar me-1"></i> Fecha Adquisición</div>
                        <div class="detail-value">${safe(d.fechaAdquisicion)}</div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-solid fa-layer-group me-1"></i> Grupo Contable</div>
                        <div class="detail-value">${safe(grupo)}</div>
                    </div>

                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-solid fa-diagram-project me-1"></i> Auxiliar</div>
                        <div class="detail-value">${safe(auxiliar)}</div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-solid fa-coins me-1"></i> Costo Histórico</div>
                        <div class="detail-value highlight fs-5">${costo}</div>
                    </div>

                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-solid fa-hourglass-half me-1"></i> Vida Útil</div>
                        <div class="detail-value">${safe(d.vidaUtil)} años</div>
                    </div>

                    <div class="detail-group">
                        <div class="detail-label"><i class="fa-solid fa-building-columns me-1"></i> Financiamiento</div>
                        <div class="detail-value">${safe(orgFin)}</div>
                    </div>
                </div>
            </div>

            <hr class="border-secondary-subtle my-3">

            <div class="bg-light p-3 rounded-3 border border-light-subtle">
                <div class="row">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <div class="detail-label"><i class="fa-solid fa-building me-1"></i> Oficina Asignada</div>
                        <div class="detail-value text-dark fw-bold">${safe(oficina)}</div>
                    </div>
                    <div class="col-md-6">
                        <div class="detail-label"><i class="fa-solid fa-user-tie me-1"></i> Responsable</div>
                        <div class="detail-value text-dark fw-bold">${safe(responsable)}</div>
                    </div>
                </div>
            </div>
        `;
    }

    $(document).on('click', '.btn-ver', async function () {
        const idEnc = $(this).data('id');
        
        // Loader suave
        const $modalBody = $('#modalDetalleBody');
        $modalBody.html('<div class="d-flex justify-content-center py-5"><div class="spinner-border text-primary"></div></div>');
        
        const modalEl = document.getElementById('modalDetalleActivo');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        const $btnAprobar = $('#btnAprobarModal');
        $btnAprobar.prop('disabled', true);

        try {
            // Fetch Datos
            const res = await fetch(`/administracion/activo/api/detalle/${encodeURIComponent(idEnc)}`);
            if (!res.ok) throw new Error('Error de conexión');
            
            const d = await res.json();
            
            // Normalizar estado
            if (!d.estado) d.estado = d.estadoActivo?.nombre || 'PENDIENTE';

            // Renderizar HTML
            $modalBody.html(renderDetalleHtml(d));

            // Configurar botón Aprobar
            $btnAprobar.prop('disabled', false).off('click').on('click', async function() {
                if(!confirm('¿Está seguro de aprobar este activo y registrarlo en el sistema oficial (DBF)?')) return;

                const $btn = $(this);
                $btn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin me-2"></i> Procesando...');

                try {
                    const respApr = await fetch(`/administracion/activo/api/aprobar/${encodeURIComponent(idEnc)}`, { method: 'POST' });
                    const dataApr = await respApr.json();

                    if (dataApr.ok) {
                        // Éxito
                        modal.hide();
                        cargarTabla(); // Recargar lista
                        Swal.fire({
                            title: '¡Aprobado!',
                            text: 'El activo ha sido registrado correctamente.',
                            icon: 'success',
                            timer: 2000,
                            showConfirmButton: false
                        });
                    } else {
                        throw new Error(dataApr.message || 'Error desconocido');
                    }
                } catch (err) {
                    console.error(err);
                    Swal.fire('Error', err.message, 'error');
                    $btn.prop('disabled', false).html('<i class="fa-solid fa-check-circle me-2"></i> Confirmar y Aprobar');
                }
            });

        } catch (e) {
            console.error(e);
            $modalBody.html(`
                <div class="text-center py-4 text-danger">
                    <i class="fa-solid fa-triangle-exclamation fa-3x mb-3"></i>
                    <h5>No se pudo cargar la información</h5>
                    <p class="small text-muted">${e.message}</p>
                </div>
            `);
        }
    });

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/activo/eliminar-pendiente", cargarTabla);
    }

</script>
