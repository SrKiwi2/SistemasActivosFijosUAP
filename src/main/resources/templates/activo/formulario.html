<style>
    /* Ancho máximo del formulario para que no se estire de más en pantallas grandes */
    .af-wrap {
        max-width: 1080px;
        margin-inline: auto;
    }

    /* Densidad visual */
    .form-compact * {
        font-size: .95rem;
    }

    .form-label {
        font-size: .9rem;
        margin-bottom: .35rem;
    }

    .mini-help {
        font-size: .8rem;
        color: #6c757d;
        margin-top: .15rem;
    }

    /* Altura/estética de controles */
    .form-control,
    .form-select,
    .select2-container--bootstrap-5 .select2-selection {
        min-height: 2.6rem;
        padding: .5rem .75rem;
        border-radius: .6rem;
        border-color: #e5e7eb;
    }

    .input-group-text {
        background: #f6f7f9;
        border-color: #e5e7eb;
        border-right: 0;
        border-radius: .6rem 0 0 .6rem;
        padding: .5rem .65rem;
    }

    .input-group .form-control,
    .input-group .form-select,
    .input-group .select2-container--bootstrap-5 .select2-selection {
        border-radius: 0 .6rem .6rem 0;
    }

    /* Select2 dentro de input-group */
    .input-group .select2-container {
        flex: 1 1 auto;
        width: 1% !important;
        min-width: 0;
    }

    .select2-container--bootstrap-5 .select2-selection__rendered {
        line-height: 1.4;
    }

    .select2-container--bootstrap-5 .select2-selection--single .select2-selection__arrow {
        height: 100%;
        right: .6rem;
    }

    /* Tarjeta */
    .card-compact {
        border-radius: .8rem;
        box-shadow: 0 6px 20px rgba(0, 0, 0, .05);
        overflow: hidden;
    }

    .card-compact .card-header {
        background: linear-gradient(180deg, #fff, #fafafa);
        border-bottom: 1px solid #eee;
    }

    .card-compact .card-body {
        padding: 1rem 1rem 1.1rem;
    }

    /* Toolbar */
    .toolbar {
        gap: .5rem;
        flex-wrap: wrap;
    }

    .toolbar .input-group {
        min-width: 300px;
    }

    .toolbar .btn {
        border-radius: .6rem;
    }

    /* Etiquetas de sección */
    .af-section-title {
        font-size: .85rem;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: .06em;
        margin: .2rem 0 .25rem;
    }

    .af-divider {
        height: 1px;
        background: #eee;
        margin: .25rem 0 .8rem;
    }

    /* Campos cortos: limitamos ancho para que no se vean eternos */
    .af-short {
        max-width: 260px;
    }

    .af-short-220 {
        max-width: 220px;
    }

    /* Monoespaciado para código */
    .text-mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* Bloqueo */
    .locked {
        opacity: .85;
        pointer-events: none;
    }

    /* Espaciado vertical consistente entre filas */
    .af-row {
        row-gap: .75rem;
    }
</style>

<div class="card card-compact" id="modalFormularioActivo">
    <div class="card-header py-2">
        <div class="d-flex justify-content-between align-items-center">
            <!-- IZQUIERDA: título, badge y buscador apilados -->
            <div class="d-flex flex-column align-items-start gap-1">
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-semibold">ACTIVO</span>
                    <span id="lblModo" class="badge text-bg-secondary">BLOQUEADO</span>
                </div>

                <div class="input-group" style="max-width: 360px; width: 100%;">
                    <span class="input-group-text"><i class="fa-solid fa-barcode"></i></span>
                    <input type="text" id="buscarCodigo" class="form-control text-mono" placeholder="01-01-04-00048">
                    <button class="btn btn-outline-secondary" id="btnBuscarCodigo">
                        <i class="fa-solid fa-magnifying-glass me-1"></i> Buscar
                    </button>
                </div>
            </div>

            <!-- DERECHA: botones -->
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <button class="btn btn-primary" id="btnRegistrar">
                    <i class="fa-solid fa-plus me-1"></i> Nuevo
                </button>
                <button class="btn btn-warning" id="btnModificar" disabled>
                    <i class="fa-solid fa-pen-to-square me-1"></i> Editar
                </button>
                <button class="btn btn-light" id="btnCancelar" disabled>
                    <i class="fa-regular fa-circle-xmark me-1"></i> Cancelar
                </button>
            </div>
        </div>
    </div>

    <div class="card-body">
        <form id="formularioActivo" class="form-compact needs-validation" novalidate autocomplete="off">

            <!-- IDENTIFICACIÓN -->
            <div class="af-section-title">Identificación</div>
            <div class="af-divider"></div>

            <div class="row g-3 af-row fieldset-activo">
                <!-- 3 por fila: col-xl-4 col-lg-6 col-12 -->
                <div class="col-xl-4 col-lg-6">
                    <label class="form-label fw-semibold">Municipio</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-map"></i></span>
                        <select id="municipioCode" class="form-select select2it" required>
                            <option value="">Seleccione…</option>
                            <option th:each="m : ${municipios}" th:value="${m.idMunicipio}"
                                th:data-code="${m.codigo != null ? (m.codigo.length() < 2 ? '0' + m.codigo : m.codigo) : ''}"
                                th:text="${m.nombre + ' (' + m.codigo + ')'}"></option>
                        </select>
                    </div>
                    <div class="mini-help">Para construir el código.</div>
                </div>

                <div class="col-xl-4 col-lg-6">
                    <label class="form-label fw-semibold">Predio</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-building"></i></span>
                        <select id="predioCode" name="predio" class="form-select select2it" required>
                            <option value="">Seleccione…</option>
                            <option th:each="p : ${predios}" th:value="${p.idPredio}"
                                th:data-code="${p.codigo != null ? p.codigo : ''}"
                                th:text="${p.descrip + ' (' + p.codigo + ')'}"></option>
                        </select>
                    </div>
                </div>

                <div class="col-xl-4 col-lg-6">
                    <label class="form-label fw-semibold">Grupo contable</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-layer-group"></i></span>
                        <select id="grupoCode" name="grupoContable" class="form-select select2it" required>
                            <option value="">Seleccione…</option>
                            <option th:each="g : ${grupos}" th:value="${g.idGrupoContable}"
                                th:data-code="${g.codContable != null ? #numbers.formatInteger(g.codContable, 2) : ''}"
                                th:text="${g.nombre + ' (' + g.codContable + ')'}"></option>
                        </select>
                    </div>
                </div>

                <!-- fila 2: breve + breve + descripción media -->
                <div class="col-xl-3 col-lg-4 af-short">
                    <label class="form-label fw-semibold">Código</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="text" id="codigo" name="codigo" class="form-control text-mono" readonly
                            placeholder="MM-PP-GG-CCCCC">
                    </div>
                </div>

                <div class="col-xl-3 col-lg-4 af-short">
                    <label class="form-label fw-semibold">Fecha adquisición</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-calendar"></i></span>
                        <input type="date" name="fechaAdq" id="fechaAdq" class="form-control" required>
                    </div>
                </div>

                <div class="col-xl-6 col-lg-8">
                    <label class="form-label fw-semibold">Descripción</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-rectangle-list"></i></span>
                        <textarea name="descripcion" id="descripcion" class="form-control" rows="2" required
                            minlength="5" maxlength="500" placeholder="Modelo, marca, características…"></textarea>
                    </div>
                </div>
            </div>

            <!-- UBICACIÓN Y RESPONSABLE -->
            <div class="mt-2 af-section-title">Ubicación y responsable</div>
            <div class="af-divider"></div>

            <div class="row g-3 af-row fieldset-activo">
                <div class="col-xl-6 col-lg-6">
                    <label class="form-label fw-semibold">Oficina</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-building"></i></span>
                        <select name="oficinaId" id="oficinaId" class="form-select select2it" required>
                            <option value="">Seleccione…</option>
                            <option th:each="o : ${oficinas}" th:value="${o.idOficina}"
                                th:text="${o.nombre + ' (' + o.codOfi + ')'}"></option>
                        </select>
                    </div>
                </div>

                <div class="col-xl-6 col-lg-6">
                    <label class="form-label fw-semibold">Responsable</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                        <select name="responsableId" id="responsableId" class="form-select" required>
                            <option value="">Buscar/seleccionar responsable…</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- FINANCIAMIENTO -->
            <div class="mt-2 af-section-title">Financiamiento</div>
            <div class="af-divider"></div>

            <div class="row g-3 af-row fieldset-activo">
                <div class="col-xl-6 col-lg-6">
                    <label class="form-label fw-semibold">Órgano financiador</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-hand-holding-dollar"></i></span>
                        <select name="orgFinId" id="orgFinId" class="form-select" required>
                            <option value="">Seleccione…</option>
                            <option th:each="f: ${financiadores}" th:value="${f.idOrganismoFinanciero}"
                                th:text="${f.descripcion + ' (' + f.codOf + ')'}"></option>
                        </select>
                    </div>
                </div>

                <div class="col-xl-6 col-lg-6">
                    <label class="form-label fw-semibold">Auxiliar</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-diagram-project"></i></span>
                        <select name="auxiliarId" id="auxiliarId" class="form-select" required>
                            <option value="">Seleccione…</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- VALORACIÓN -->
            <div class="mt-2 af-section-title">Valoración</div>
            <div class="af-divider"></div>

            <div class="row g-3 af-row fieldset-activo">
                <div class="col-xl-3 col-lg-4 af-short">
                    <label class="form-label fw-semibold">Costo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-money-check-dollar"></i></span>
                        <input type="text" name="costoFmt" id="costoFmt" class="form-control" required
                            inputmode="numeric" placeholder="0,00">
                        <input type="hidden" name="costo" id="costo">
                    </div>
                </div>

                <div class="col-xl-2 col-lg-3 af-short-220">
                    <label class="form-label fw-semibold">Vida útil (años)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-clock"></i></span>
                        <input type="number" id="vidaUtil" name="vidaUtil" class="form-control" required min="1"
                            max="50" step="1">
                    </div>
                </div>
            </div>

            <input type="hidden" id="idActivo" name="idActivo" />
        </form>
    </div>
</div>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>

                <div class="modal-body">

                            <input type="hidden" id="nr_oficinaId">

                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">

        </div>
    </div>
</div>
<script>
    window.ActivoForm = (function () {
        let uiState = { modo: 'LOCK', autoCodigo: false, filling: false };
        let $root;

        // ==== helpers UI (scoped) ====
        function lockForm(locked) {
            const f = $root.find('#fieldsetActivo')[0];
            if (!f) return;
            f.classList.toggle('locked', locked);
            [...f.querySelectorAll('input, select, textarea')].forEach(el => {
                if (el.id === 'codigo') { el.readOnly = true; return; }
                el.disabled = locked;
            });
            $root.find('#btnModificar').prop('disabled', locked);
            $root.find('#btnCancelar').prop('disabled', locked);
        }

        function setModo(texto, badgeClass) {
            const lbl = $root.find('#lblModo')[0];
            lbl.textContent = texto;
            lbl.className = 'badge ' + (badgeClass || 'text-bg-secondary');
        }

        function limpiarForm() {
            const $form = $root.find('#formularioActivo');
            if ($form.length) $form[0].reset();
            $root.find('#municipioCode, #predioCode, #grupoCode, #oficinaId, #responsableId, #orgFinId, #auxiliarId')
                .val(null).trigger('change');
            $root.find('#idActivo').val('');
            $root.find('#codigo').val('');
        }

        function fillFromDTO(d) {
            uiState.filling = true;
            try {
                $root.find('#idActivo').val(d.id || '');
                $root.find('#codigo').val(d.codigo || '');
                $root.find('#fechaAdq').val(d.fechaAdquisicion || '');
                $root.find('#descripcion').val(d.descripcion || '');
                $root.find('#vidaUtil').val(d.vidaUtil ?? '');

                const setSel = (sel, val) => { if (val != null) $root.find(sel).val(String(val)).trigger('change'); };
                setSel('#municipioCode', d.municipioId);
                setSel('#predioCode', d.predioId);
                setSel('#grupoCode', d.grupoContableId);
                setSel('#oficinaId', d.oficinaId);
                setSel('#orgFinId', d.organismoFinancieroId);

                if (d.responsableId) {
                    const $resp = $root.find('#responsableId');
                    if ($resp.find(`option[value="${d.responsableId}"]`).length === 0) {
                        $resp.append(`<option value="${d.responsableId}" selected>${d.responsableNombre ?? '(responsable)'}</option>`);
                    }
                    $resp.val(String(d.responsableId)).trigger('change');
                } else {
                    $root.find('#responsableId').val(null).trigger('change');
                }

                if (d.auxiliarId) {
                    const $aux = $root.find('#auxiliarId');
                    if ($aux.find(`option[value="${d.auxiliarId}"]`).length === 0) {
                        $aux.append(`<option value="${d.auxiliarId}" selected>${d.auxiliarNombre ?? '(auxiliar)'}</option>`);
                    }
                    $aux.val(String(d.auxiliarId)).trigger('change');
                } else {
                    $root.find('#auxiliarId').val(null).trigger('change');
                }

                if (d.costo != null) {
                    $root.find('#costo').val(Number(d.costo).toFixed(2));
                    const fmt = new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB', minimumFractionDigits: 2 });
                    $root.find('#costoFmt').val(fmt.format(Number(d.costo)));
                }
            } finally {
                uiState.filling = false;
            }
        }

        function initSelect2() {
            const $modal = $root.find('#modalFormularioActivo');
            const commonOpts = {
                theme: 'bootstrap-5',
                width: '100%',
                placeholder: 'Seleccione…',
                allowClear: true,
                language: { noResults: () => 'Sin resultados', searching: () => 'Buscando…' },
                dropdownParent: $modal.length ? $modal : $(document.body)
            };

            $root.find('#municipioCode').select2(commonOpts);
            $root.find('#predioCode').select2(commonOpts);
            $root.find('#grupoCode').select2(commonOpts);
            $root.find('#oficinaId').select2(commonOpts);
            $root.find('#orgFinId').select2(commonOpts);

            $root.find('#responsableId').select2({
                ...commonOpts, minimumInputLength: 2,
                ajax: {
                    url: '/api/buscar_responsable', delay: 250,
                    data: p => ({ q: p.term || '', page: p.page || 1 }),
                    processResults: (data, p) => ({ results: data.results, pagination: { more: data.pagination?.more === true } })
                }
            });

            $root.find('#auxiliarId').select2({
                ...commonOpts, minimumInputLength: 0, ajax: {
                    url: '/api/buscar_auxiliar', delay: 250, dataType: 'json',
                    data: params => ({
                        grupoId: $root.find('#grupoCode').val() || '',
                        predioId: $root.find('#predioCode').val() || '',
                        q: params.term || '', page: params.page || 1
                    }),
                    transport: (params, success, failure) => {
                        if (!$root.find('#grupoCode').val()) { success({ results: [], pagination: { more: false } }); return; }
                        $.ajax(params).then(success).catch(failure);
                    },
                    processResults: data => ({ results: data.results || [], pagination: { more: data.pagination?.more === true } })
                }
            });

            $root.find('#auxiliarId').prop('disabled', !$root.find('#grupoCode').val()).trigger('change.select2');
        }

        // Para evitar handlers duplicados, usa nombres de espacio ('.activo')
        function bindEvents() {
            // Limpia bindings previos en este contenedor
            $root.off('.activo');

            // --- helpers locales que SÍ existen en este scope ---
            const fmtMoney = new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB', minimumFractionDigits: 2 });

            function parseMoney(str) {
                if (!str) return 0;
                const clean = String(str).replace(/[^\d.,-]/g, '').replace(/\.(?=\d{3}\b)/g, '').replace(/\s/g, '');
                const lastSep = Math.max(clean.lastIndexOf(','), clean.lastIndexOf('.'));
                let intPart = clean, decPart = '';
                if (lastSep > -1) {
                    intPart = clean.slice(0, lastSep).replace(/[.,]/g, '');
                    decPart = clean.slice(lastSep + 1);
                }
                const num = Number(intPart || 0) + Number((decPart || '0').slice(0, 2)) / Math.pow(10, (decPart || '').slice(0, 2).length || 0);
                return isNaN(num) ? 0 : num;
            }

            function maskCodigo(value) {
                const d = String(value || '').replace(/\D/g, '');
                const parts = [d.slice(0, 2), d.slice(2, 4), d.slice(4, 6), d.slice(6, 11)].filter(Boolean);
                return parts.join('-').slice(0, 14);
            }

            function getCodeFromSelect2($sel) {
                const el = $sel[0];
                if (!el || !el.selectedIndex || el.selectedIndex < 0) return '';
                const opt = el.options[el.selectedIndex];
                return (opt && opt.dataset && opt.dataset.code) ? opt.dataset.code : '';
            }

            async function generarCorrelativo() {
                const $mun = $root.find('#municipioCode');
                const $pred = $root.find('#predioCode');
                const $grp = $root.find('#grupoCode');
                const $cod = $root.find('#codigo');

                const m = getCodeFromSelect2($mun);
                const p = getCodeFromSelect2($pred);
                const g = getCodeFromSelect2($grp);
                if (!(m && p && g)) { $cod.val(''); return; }

                $cod.val('Generando…');
                try {
                    const r = await fetch('/administracion/activo/generar-correlativo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                        body: new URLSearchParams({ mun: m, pred: p, grp: g }).toString()
                    });
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    const json = await r.json();
                    $cod.val(json.codigo || '');
                } catch (e) {
                    console.error(e);
                    $cod.val('');
                }
            }

            async function cargarMetaGrupo(idGrupo) {
                const $vida = $root.find('#vidaUtil');
                if (!idGrupo) { $vida.val(''); return; }
                try {
                    const r = await fetch(`/api/${encodeURIComponent(idGrupo)}/meta`, { headers: { 'Accept': 'application/json' } });
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    const meta = await r.json();
                    if (meta && typeof meta.vidaUtil === 'number') $vida.val(meta.vidaUtil); else $vida.val('');
                } catch (e) {
                    console.error('Error meta grupo', e);
                    $vida.val('');
                }
            }

            // --- Formato de moneda ---
            $root.on('input.activo', '#costoFmt', function () {
                const val = parseMoney(this.value);
                $root.find('#costo').val(val.toFixed(2));
            });
            $root.on('blur.activo', '#costoFmt', function () {
                const val = parseFloat($root.find('#costo').val() || '0');
                this.value = fmtMoney.format(isNaN(val) ? 0 : val);
            }).find('#costoFmt').trigger('blur');

            // --- Máscara de código ---
            const $codigo = $root.find('#codigo');
            $codigo.on('input.activo', function () {
                const v = maskCodigo(this.value);
                if (this.value !== v) this.value = v;
                const ok = /^\d{2}-\d{2}-\d{2}-\d{5}$/.test(this.value);
                this.setCustomValidity(ok ? '' : 'Formato: 99-99-99-99999');
            });
            $codigo.on('blur.activo', function () {
                const ok = /^\d{2}-\d{2}-\d{2}-\d{5}$/.test(this.value);
                this.setCustomValidity(ok ? '' : 'Formato: 99-99-99-99999');
            });

            // --- Cambios en selects que afectan correlativo / auxiliares ---
            $root.on('change.activo', '#municipioCode, #predioCode, #grupoCode', function () {
                if (this.id === 'grupoCode') {
                    const $aux = $root.find('#auxiliarId').prop('disabled', true).empty().append('<option value="">Seleccione…</option>');
                    const gid = $root.find('#grupoCode').val();
                    const pid = $root.find('#predioCode').val() || '';
                    if (gid) {
                        // select2 (AJAX) cargará al abrir; si quieres precargar, haz una llamada aquí.
                        $aux.prop('disabled', false);
                        cargarMetaGrupo(gid);
                    }
                }
                if (uiState.autoCodigo && !uiState.filling) generarCorrelativo();
            });

            // --- Botones ---
            $root.on('click.activo', '#btnRegistrar', function () {
                limpiarForm();
                setModo('REGISTRO NUEVO', 'text-bg-primary');
                uiState.modo = 'NEW'; uiState.autoCodigo = true;
                lockForm(false);
                $root.find('#btnModificar').prop('disabled', true);
                $root.find('#btnCancelar').prop('disabled', false);
            });

            $root.on('click.activo', '#btnBuscarCodigo', async function () {
                const codigo = ($root.find('#buscarCodigo').val() || '').trim();
                if (!codigo) { alert('Ingrese un código (ej. 01-01-04-00048)'); return; }
                try {
                    showGlobalLoader({ texto: 'Buscando...' });
                    const r = await fetch('/administracion/activo/buscar-por-codigo?codigo=' + encodeURIComponent(codigo));
                    hideGlobalLoader();
                    if (!r.ok) throw new Error('No encontrado');
                    const dto = await r.json();
                    limpiarForm();
                    fillFromDTO(dto);
                    setModo('VISTA', 'text-bg-info');
                    uiState.modo = 'VIEW'; uiState.autoCodigo = false;
                    lockForm(true);
                    $root.find('#btnModificar').prop('disabled', false);
                    $root.find('#btnCancelar').prop('disabled', false);
                } catch (e) {
                    hideGlobalLoader();
                    console.error(e);
                    alert('No se encontró el activo con ese código.');
                }
            });

            $root.on('click.activo', '#btnModificar', function () {
                if (!$root.find('#idActivo').val()) { alert('Primero busque un activo.'); return; }
                setModo('EDICIÓN', 'text-bg-warning');
                uiState.modo = 'EDIT'; uiState.autoCodigo = false;
                lockForm(false);
                $root.find('#btnCancelar').prop('disabled', false);
            });

            $root.on('click.activo', '#btnCancelar', function () {
                lockForm(true);
                setModo('BLOQUEADO', 'text-bg-secondary');
                uiState.modo = 'LOCK'; uiState.autoCodigo = false;
                $root.find('#btnModificar').prop('disabled', !$root.find('#idActivo').val());
                $root.find('#btnCancelar').prop('disabled', true);
            });

            // --- Submit ---
            $root.on('submit.activo', '#formularioActivo', async function (e) {
                e.preventDefault();
                const id = $root.find('#idActivo').val();
                const url = id ? '/administracion/activo/modificar-activo' : '/administracion/activo/registrar-activo';
                const formData = new FormData(this);
                showGlobalLoader({ texto: 'Guardando...' });
                try {
                    const r = await fetch(url, { method: 'POST', body: formData });
                    hideGlobalLoader();
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    const msg = await r.text();
                    alert(msg || 'Guardado');
                    lockForm(true);
                    setModo('BLOQUEADO', 'text-bg-secondary');
                    if (window.$ && $('#data-table').length) $('#data-table').DataTable().ajax.reload(null, false);
                } catch (err) {
                    hideGlobalLoader();
                    console.error(err);
                    alert('Error al guardar: ' + (err.message || err));
                }
            });

            // Manejo extra (si existe)
            if (typeof window.manejarEnvioFormulario === 'function') {
                window.manejarEnvioFormulario('#formularioActivo');
            }
        }

        function init(containerSelector) {
            $root = $(containerSelector);
            setModo('BLOQUEADO', 'text-bg-secondary');
            lockForm(true);
            initSelect2();
            bindEvents();
        }

        function destroy() {
            if (!$root) return;
            // destruye select2
            $root.find('#municipioCode, #predioCode, #grupoCode, #oficinaId, #orgFinId, #responsableId, #auxiliarId')
                .each(function () { if ($(this).data('select2')) $(this).select2('destroy'); });
            // desbindea eventos
            $root.off('.activo');
            $root = null;
        }

        return { init, destroy };

    })();
</script>
