<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
    rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.full.min.js"></script>

<style>
    /* Que el contenedor Select2 se comporte como form-control dentro del input-group */
    .input-group .select2-container {
        flex: 1 1 auto;
        width: 1% !important;
        /* evita que se pase de ancho */
        min-width: 0;
        /* permite encogerse en layouts estrechos */
    }

    /* Altura y padding similares a .form-select (Bootstrap 5) */
    .select2-container--bootstrap-5 .select2-selection {
        min-height: calc(2.5rem + 2px);
        /* altura estándar */
        padding: .375rem .75rem;
        /* mismos paddings horizontales */
        border-radius: .375rem;
    }

    /* Que el texto quede centrado verticalmente */
    .select2-container--bootstrap-5 .select2-selection__rendered {
        line-height: 1.5;
    }

    /* Flecha alineada a la derecha y ocupando la altura completa */
    .select2-container--bootstrap-5 .select2-selection--single .select2-selection__arrow {
        height: 100%;
        right: .75rem;
    }

    /* Borde redondeado correcto cuando hay icono a la izquierda */
    .input-group .select2-container--bootstrap-5 .select2-selection {
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
    }

    /* Compactar todo el formulario */
    .form-compact * {
        font-size: .9rem;
    }

    .form-compact .form-control,
    .form-compact .form-select,
    .form-compact .input-group-text {
        padding: .25rem .5rem;
    }

    .form-compact .row.g-3 {
        --bs-gutter-y: .5rem;
        --bs-gutter-x: .5rem;
    }

    .card-compact .card-body {
        padding: .75rem;
    }

    .toolbar .btn {
        padding: .3rem .6rem;
    }

    .mini-help {
        font-size: .78rem;
        color: #6c757d;
    }

    .locked {
        opacity: .75;
        pointer-events: none;
    }
</style>

<div class="card card-compact" id="modalFormularioActivo">
    <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2 toolbar">
            <span class="fw-semibold">Activo</span>
            <!-- Estado de modo -->
            <span id="lblModo" class="badge text-bg-secondary">BLOQUEADO</span>
        </div>
        <div class="d-flex align-items-center gap-2 toolbar">
            <div class="input-group input-group-sm" style="min-width:260px">
                <span class="input-group-text"><i class="fa-solid fa-barcode"></i></span>
                <input type="text" id="buscarCodigo" class="form-control" placeholder="01-01-04-00048">
                <button class="btn btn-outline-secondary" id="btnBuscarCodigo">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar
                </button>
            </div>

            <button class="btn btn-primary" id="btnRegistrar">
                <i class="fa-solid fa-plus"></i> REGISTRAR
            </button>
            <button class="btn btn-warning" id="btnModificar" disabled>
                <i class="fa-solid fa-pen-to-square"></i> MODIFICAR
            </button>
            <button class="btn btn-light" id="btnCancelar" disabled>
                <i class="fa-regular fa-circle-xmark"></i> CANCELAR
            </button>
        </div>
    </div>

    <div class="card-body">
        <form id="formularioActivo" class="form-compact needs-validation" novalidate autocomplete="off">
            <div class="row g-3" id="fieldsetActivo">
                <!-- FILA 1 -->
                <div class="col-12 col-md-4">
                    <label class="form-label fw-semibold">Municipio</label>
                    <select id="municipioCode" class="form-select form-select-sm select2it" required>
                        <option value="">Seleccione…</option>
                        <option th:each="m : ${municipios}" th:value="${m.idMunicipio}"
                            th:data-code="${m.codigo != null ? (m.codigo.length() < 2 ? '0' + m.codigo : m.codigo) : ''}"
                            th:text="${m.nombre + ' (' + m.codigo + ')'}"></option>
                    </select>
                    <div class="mini-help">Se usa para armar el código.</div>
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label fw-semibold">Predio</label>
                    <select id="predioCode" name="predio" class="form-select form-select-sm select2it" required>
                        <option value="">Seleccione…</option>
                        <option th:each="p : ${predios}" th:value="${p.idPredio}"
                            th:data-code="${p.codigo != null ? p.codigo : ''}"
                            th:text="${p.descrip + ' (' + p.codigo + ')'}"></option>
                    </select>
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label fw-semibold">Grupo contable</label>
                    <select id="grupoCode" name="grupoContable" class="form-select form-select-sm select2it" required>
                        <option value="">Seleccione…</option>
                        <option th:each="g : ${grupos}" th:value="${g.idGrupoContable}"
                            th:data-code="${g.codContable != null ? #numbers.formatInteger(g.codContable, 2) : ''}"
                            th:text="${g.nombre + ' (' + g.codContable + ')'}"></option>
                    </select>
                </div>

                <!-- FILA 2 -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Código</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="text" id="codigo" name="codigo" class="form-control form-control-sm" readonly
                            placeholder="MM-PP-GG-CCCCC">
                    </div>
                    <div class="mini-help">Se genera (Municipio–Predio–Grupo + correlativo).</div>
                </div>

                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Fecha de adquisición</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="fa-regular fa-calendar"></i></span>
                        <input type="date" name="fechaAdq" id="fechaAdq" class="form-control form-control-sm" required>
                    </div>
                </div>

                <!-- FILA 3 -->
                <div class="col-12">
                    <label class="form-label fw-semibold">Descripción</label>
                    <textarea name="descripcion" id="descripcion" class="form-control form-control-sm" rows="2" required
                        minlength="5" maxlength="500"
                        placeholder="Describe el activo (modelo, marca, características)"></textarea>
                </div>

                <!-- FILA 4 -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Oficina</label>
                    <select name="oficinaId" id="oficinaId" class="form-select form-select-sm select2it" required>
                        <option value="">Seleccione…</option>
                        <option th:each="o : ${oficinas}" th:value="${o.idOficina}"
                            th:text="${o.nombre + ' (' + o.codOfi + ')'}"></option>
                    </select>
                </div>

                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Responsable</label>
                    <select name="responsableId" id="responsableId" class="form-select form-select-sm" required>
                        <option value="">Buscar/seleccionar responsable…</option>
                    </select>
                </div>

                <!-- FILA 5 -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Órgano financiador</label>
                    <select name="orgFinId" id="orgFinId" class="form-select form-select-sm" required>
                        <option value="">Seleccione…</option>
                        <option th:each="f: ${financiadores}" th:value="${f.idOrganismoFinanciero}"
                            th:text="${f.descripcion + ' (' + f.codOf + ')'}"></option>
                    </select>
                </div>

                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Auxiliar</label>
                    <select name="auxiliarId" id="auxiliarId" class="form-select form-select-sm" required>
                        <option value="">Seleccione…</option>
                    </select>
                </div>

                <!-- FILA 6 -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Costo</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="fa-solid fa-money-check-dollar"></i></span>
                        <input type="text" name="costoFmt" id="costoFmt" class="form-control text-end" required
                            inputmode="numeric" placeholder="0,00">
                        <input type="hidden" name="costo" id="costo">
                    </div>
                </div>

                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Vida útil (años)</label>
                    <input type="number" id="vidaUtil" name="vidaUtil" class="form-control form-control-sm" required
                        min="1" max="50" step="1">
                </div>
            </div>

            <!-- Para saber si estamos en edición -->
            <input type="hidden" id="idActivo" name="idActivo" />
        </form>
    </div>
</div>

<div class="modal fade" id="modalNuevoResponsable" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <form id="formNuevoResponsable" class="needs-validation" novalidate>
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-person-plus me-2"></i> Nuevo responsable
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <div class="modal-body">
                    <div class="row g-3">

                        <!-- Oficina (autorrellena según selección del formulario de activo) -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Oficina</label>
                            <input type="text" id="nr_oficinaText" class="form-control" readonly>
                            <input type="hidden" id="nr_oficinaId">
                            <div class="form-text">Se toma de la oficina seleccionada del formulario.</div>
                        </div>

                        <!-- Código funcionario (preview auto) -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Código funcionario</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                                <input type="text" id="nr_codigo" class="form-control" readonly
                                    placeholder="Se generará automáticamente">
                            </div>
                            <div class="form-text">Se genera según (predio + codOfi) de la oficina.</div>
                        </div>

                        <!-- Persona (select2 AJAX) -->
                        <div class="col-12">
                            <label class="form-label fw-semibold">Persona</label>
                            <select id="nr_persona" class="form-select" required>
                                <option value="">Buscar persona…</option>
                            </select>
                            <div class="invalid-feedback">Selecciona una persona.</div>
                        </div>

                        <!-- Cargo -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Cargo</label>
                            <select id="nr_cargo" class="form-select">
                                <option value="">(Opcional) Selecciona un cargo…</option>
                                <option th:each="c : ${cargos}" th:value="${c.idCargo}" th:text="${c.descripcion}">
                                </option>
                            </select>
                        </div>

                        <!-- Fecha último (fechaUlt) -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Fecha última</label>
                            <input type="date" id="nr_fechaUlt" class="form-control" placeholder="yyyy-mm-dd">
                        </div>

                        <!-- codExp / apiEstado -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Cod. expediente (opcional)</label>
                            <input type="number" id="nr_codExp" class="form-control" min="0" max="32767" step="1"
                                placeholder="Ej: 12">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">API Estado</label>
                            <select id="nr_apiEstado" class="form-select">
                                <option value="">(sin especificar)</option>
                                <option value="1">1 - Activo</option>
                                <option value="0">0 - Inactivo</option>
                            </select>
                        </div>

                        <!-- Observaciones -->
                        <div class="col-12">
                            <label class="form-label fw-semibold">Observaciones</label>
                            <textarea id="nr_observ" class="form-control" rows="3" maxlength="1000"
                                placeholder="Observaciones (opcional)"></textarea>
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">
                        <i class="fa-regular fa-circle-xmark me-1"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check2-circle me-1"></i> Guardar responsable
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    let uiState = { modo: 'LOCK', autoCodigo: false, filling: false };

    manejarEnvioFormulario('#formularioActivo');

    // Helpers UI
    function lockForm(locked) {
        const f = document.getElementById('fieldsetActivo');
        if (!f) return;
        f.classList.toggle('locked', locked);
        [...f.querySelectorAll('input, select, textarea')].forEach(el => {
            // mantener 'codigo' siempre readonly (lo rellena el backend), pero visible
            if (el.id === 'codigo') { el.readOnly = true; return; }
            el.disabled = locked;
        });
        document.getElementById('btnModificar')?.toggleAttribute('disabled', locked);
        document.getElementById('btnCancelar')?.toggleAttribute('disabled', locked);
    }

    function setModo(texto, badgeClass) {
        const lbl = document.getElementById('lblModo');
        lbl.textContent = texto;
        lbl.className = 'badge ' + (badgeClass || 'text-bg-secondary');
    }

    function limpiarForm() {
        document.getElementById('formularioActivo').reset();
        $('#municipioCode, #predioCode, #grupoCode, #oficinaId, #responsableId, #orgFinId, #auxiliarId')
            .val(null).trigger('change');
        document.getElementById('idActivo').value = '';
        document.getElementById('codigo').value = '';
    }

    

    function fillFromDTO(d) {
        uiState.filling = true;
        try {
            $('#idActivo').val(d.id || '');
            $('#codigo').val(d.codigo || '');
            $('#fechaAdq').val(d.fechaAdquisicion || '');
            $('#descripcion').val(d.descripcion || '');
            $('#vidaUtil').val(d.vidaUtil ?? '');

            const setSel = (id, val) => { if (val != null) $(id).val(String(val)).trigger('change'); };

            setSel('#municipioCode', d.municipioId);
            setSel('#predioCode', d.predioId);
            setSel('#grupoCode', d.grupoContableId);
            setSel('#oficinaId', d.oficinaId);
            setSel('#orgFinId', d.organismoFinancieroId);

            // Responsable (AJAX): insertar opción temporal si no existe
            if (d.responsableId) {
                const $resp = $('#responsableId');
                if ($resp.find(`option[value="${d.responsableId}"]`).length === 0) {
                    $resp.append(`<option value="${d.responsableId}" selected>${d.responsableNombre ?? '(responsable)'}</option>`);
                }
                $resp.val(String(d.responsableId)).trigger('change');
            } else {
                $('#responsableId').val(null).trigger('change');
            }

            // Auxiliar (ya lo tenías)
            if (d.auxiliarId) {
                const $aux = $('#auxiliarId');
                if ($aux.find(`option[value="${d.auxiliarId}"]`).length === 0) {
                    $aux.append(`<option value="${d.auxiliarId}" selected>${d.auxiliarNombre ?? '(auxiliar)'}</option>`);
                }
                $aux.val(String(d.auxiliarId)).trigger('change');
            } else {
                $('#auxiliarId').val(null).trigger('change');
            }

            if (d.costo != null) {
                $('#costo').val(Number(d.costo).toFixed(2));
                const fmt = new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB', minimumFractionDigits: 2 });
                $('#costoFmt').val(fmt.format(Number(d.costo)));
            }
        } finally {
            uiState.filling = false;
        }
    }


    $(function () {

        // Estado inicial: BLOQUEADO, sin datos
        setModo('BLOQUEADO', 'text-bg-secondary');
        lockForm(true);

        // 2) Formato de moneda en vivo + valor limpio oculto
        const fmt = new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB', minimumFractionDigits: 2 });
        const nf = new Intl.NumberFormat('es-BO'); // para parse auxiliar

        function parseMoney(str) {
            if (!str) return 0;
            // elimina todo menos dígitos y coma/punto
            const clean = String(str).replace(/[^\d.,-]/g, '').replace(/\.(?=\d{3}\b)/g, '').replace(/\s/g, '');
            // normaliza coma/punto: último separador se considera decimal
            const lastSep = Math.max(clean.lastIndexOf(','), clean.lastIndexOf('.'));
            let intPart = clean, decPart = '';
            if (lastSep > -1) {
                intPart = clean.slice(0, lastSep).replace(/[.,]/g, '');
                decPart = clean.slice(lastSep + 1);
            }
            const num = Number(intPart || 0) + Number((decPart || '0').slice(0, 2)) / Math.pow(10, (decPart || '').slice(0, 2).length || 0);
            return isNaN(num) ? 0 : num;
        }

        $('#costoFmt').on('input', function () {
            // no formatees mientras escribe: solo guarda limpio
            const val = parseMoney(this.value);
            $('#costo').val(val.toFixed(2));
        }).on('blur', function () {
            const val = parseFloat($('#costo').val() || '0');
            this.value = fmt.format(isNaN(val) ? 0 : val);
        }).trigger('blur');


        // 4) Dependencia Grupo → Auxiliar
        $('#grupoCode').on('change', function () {
            const id = $(this).val();
            const $aux = $('#auxiliarId').prop('disabled', true).empty().append('<option value="">Seleccione…</option>');
            if (!id) return;
            $.getJSON('/api/auxiliares?grupoId=' + encodeURIComponent(id), (arr) => {
                fillSelect('#auxiliarId', arr);
                $aux.prop('disabled', false);
            });
        });

        // 6) autoformato + validacon codigo activo
        const input = document.getElementById('codigo');

        function maskCodigo(value) {
            // deja solo dígitos
            const digits = value.replace(/\D/g, '');
            // aplica patrón 2-2-2-5
            const parts = [digits.slice(0, 2), digits.slice(2, 4), digits.slice(4, 6), digits.slice(6, 11)]
                .filter(Boolean);
            return parts.join('-').slice(0, 14); // 14 = 2+1+2+1+2+1+5
        }

        input.addEventListener('input', (e) => {
            const v = maskCodigo(e.target.value);
            if (e.target.value !== v) e.target.value = v;
            // feedback en vivo usando el mismo patrón del HTML
            const ok = /^\d{2}-\d{2}-\d{2}-\d{5}$/.test(e.target.value);
            e.target.setCustomValidity(ok ? '' : 'Formato: 99-99-99-99999');
        });

        input.addEventListener('blur', (e) => {
            const ok = /^\d{2}-\d{2}-\d{2}-\d{5}$/.test(e.target.value);
            e.target.setCustomValidity(ok ? '' : 'Formato: 99-99-99-99999');
        });

        // 7) llenar automaticamente el codigo correlativo segun municipio, predio y grupocontable
        const $mun = $('#municipioCode');
        const $pred = $('#predioCode');
        const $grp = $('#grupoCode');
        const $cod = $('#codigo');
        const $vida = $('#vidaUtil');

        function ready() {
            return $mun.val() && $pred.val() && $grp.val();
        }

        function getCodeFrom(sel) {
            const opt = sel.options[sel.selectedIndex];
            return opt ? (opt.dataset.code || '') : '';
        }

        async function generar() {
            if (!ready()) { $cod.val(''); return; }

            const m = getCodeFrom(document.getElementById('municipioCode'));
            const p = getCodeFrom(document.getElementById('predioCode'));
            const g = getCodeFrom(document.getElementById('grupoCode'));
            if (!(m && p && g)) { $cod.val(''); return; }

            $cod.val('Generando…');

            const params = new URLSearchParams({ mun: m, pred: p, grp: g });
            const headers = { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' };

            try {
                const r = await fetch('/administracion/activo/generar-correlativo', {
                    method: 'POST',
                    headers,
                    body: params.toString()
                });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const json = await r.json();
                $cod.val(json.codigo || '');
            } catch (e) {
                console.error(e);
                $cod.val('');
            }
        }

        async function cargarMetaGrupo(idGrupo) {
            if (!idGrupo) {
                $vida.val('');
                return;
            }
            try {
                const r = await fetch(`/api/${encodeURIComponent(idGrupo)}/meta`, {
                    headers: { 'Accept': 'application/json' }
                });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const meta = await r.json(); // {vidaUtil, depreciar, actualizar}
                if (meta && typeof meta.vidaUtil === 'number') {
                    $vida.val(meta.vidaUtil);
                    // (opcional) ajustar límites dinámicamente según políticas
                    // $vida.attr({ min: 1, max: 50 });
                } else {
                    $vida.val('');
                }
                // (opcional) podrías mostrar un badge si no deprecia/actualiza:
                // mostrarBadge(meta.depreciar, meta.actualizar);
            } catch (e) {
                console.error('Error meta grupo', e);
                $vida.val('');
            }
        }


        $mun.on('change', () => { if (uiState.autoCodigo && !uiState.filling) generar(); });
        $pred.on('change', () => { if (uiState.autoCodigo && !uiState.filling) generar(); });
        $grp.on('change',  () => { if (uiState.autoCodigo && !uiState.filling) generar(); });

        const $modal = $('#modalFormularioActivo'); // id del modal que contiene el form
        const commonOpts = {
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: 'Seleccione…',
            allowClear: true,
            language: {
                noResults: () => 'Sin resultados',
                searching: () => 'Buscando…'
            },
            // MUY IMPORTANTE cuando está en un modal
            dropdownParent: $modal.length ? $modal : $(document.body)
        };

        $('#municipioCode').select2(commonOpts);
        $('#predioCode').select2(commonOpts);
        $('#grupoCode').select2(commonOpts);
        $('#unidadId').select2(commonOpts);
        $('#oficinaId').select2(commonOpts);
        $('#orgFinId').select2(commonOpts);
        $('#grupoId').select2(commonOpts);

        $('#responsableId').select2({
            ...commonOpts,
            minimumInputLength: 2,
            ajax: {
                url: '/api/buscar_responsable',
                delay: 250,
                data: params => ({ q: params.term || '', page: params.page || 1 }),
                processResults: (data, params) => ({
                    results: data.results, pagination: { more: data.pagination?.more === true }
                })
            }
        });

        $('#auxiliarId').select2({
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: 'Seleccione…',
            allowClear: true,
            dropdownParent: $('#modalFormularioActivo'),
            minimumInputLength: 0,
            ajax: {
                url: '/api/buscar_auxiliar',              // <— misma ruta que el controller
                delay: 250,
                dataType: 'json',
                data: function (params) {
                    const gid = $grp.val() || '';
                    const pid = $pred.val() || '';
                    console.log('[AUX] params', { grupoId: gid, predioId: pid, q: params.term, page: params.page });
                    return {
                        grupoId: gid,
                        predioId: pid,
                        q: params.term || '',
                        page: params.page || 1
                    };
                },
                transport: function (params, success, failure) {
                    if (!$grp.val()) {
                        console.warn('[AUX] sin grupoId: no llamar backend');
                        success({ results: [], pagination: { more: false } });
                        return;
                    }
                    $.ajax(params).then(success).catch(failure);
                },
                processResults: function (data) {
                    console.log('[AUX] data', data);
                    return {
                        results: data.results || [],
                        pagination: { more: data.pagination?.more === true }
                    };
                },
                error: (xhr) => console.error('AUXILIAR AJAX error', xhr.status, xhr.responseText)
            }
        });

        // Estado inicial y reseteos
        $('#auxiliarId').prop('disabled', !$grp.val()).trigger('change.select2');

        $grp.on('change', function () {
            $('#auxiliarId').val(null).trigger('change');
            $('#auxiliarId').prop('disabled', !$grp.val()).trigger('change.select2');
            if ($grp.val()) $('#auxiliarId').select2('open');
            const id = $(this).val();
            cargarMetaGrupo(id);
        });

        $pred.on('change', function () {
            if ($grp.val()) {
                $('#auxiliarId').val(null).trigger('change');
                $('#auxiliarId').select2('open');
            }
        });

        // Botón REGISTRAR: limpia y desbloquea
        $('#btnRegistrar').on('click', function () {
            limpiarForm();
            setModo('REGISTRO NUEVO', 'text-bg-primary');
            uiState.modo = 'NEW';
            uiState.autoCodigo = true;   // <-- solo aquí habilitado
            lockForm(false);
            $('#btnModificar').prop('disabled', true);
            $('#btnCancelar').prop('disabled', false);
        });

        // Buscar por código
        $('#btnBuscarCodigo').on('click', async function () {
            const codigo = ($('#buscarCodigo').val() || '').trim();
            if (!codigo) { alert('Ingrese un código (ej. 01-01-04-00048)'); return; }
            try {
                showGlobalLoader({ texto: 'Buscando...' });
                const r = await fetch('/administracion/activo/buscar-por-codigo?codigo=' + encodeURIComponent(codigo));
                hideGlobalLoader();
                if (!r.ok) throw new Error('No encontrado');
                const dto = await r.json(); // ActivoDTOExtend
                limpiarForm();
                fillFromDTO(dto);
                setModo('VISTA', 'text-bg-info');
                uiState.modo = 'VIEW';
                uiState.autoCodigo = false; 
                lockForm(true);
                $('#btnModificar').prop('disabled', false);
                $('#btnCancelar').prop('disabled', false);
            } catch (e) {
                hideGlobalLoader();
                console.error(e);
                alert('No se encontró el activo con ese código.');
            }
        });

        // MODIFICAR: desbloquear con datos cargados
        $('#btnModificar').on('click', function () {
            if (!$('#idActivo').val()) { alert('Primero busque un activo.'); return; }
            setModo('EDICIÓN', 'text-bg-warning');
            uiState.modo = 'EDIT';
            uiState.autoCodigo = false; 
            lockForm(false);
            $('#btnCancelar').prop('disabled', false);
        });

        // CANCELAR: volver a bloqueado sin perder la vista actual
        $('#btnCancelar').on('click', function () {
            lockForm(true);
            setModo('BLOQUEADO', 'text-bg-secondary');
            uiState.modo = 'LOCK';
            uiState.autoCodigo = false;
            $('#btnModificar').prop('disabled', !$('#idActivo').val());
            $('#btnCancelar').prop('disabled', true);
        });

        // Envío (registrar o modificar dependiendo si hay idActivo)
        $('#formularioActivo').on('submit', async function (e) {
            e.preventDefault();
            const id = $('#idActivo').val();
            const url = id ? '/administracion/activo/modificar-activo' : '/administracion/activo/registrar-activo';
            const formData = new FormData(this);
            // asegúrate de añadir los campos que tu backend espera (ids de relaciones)
            showGlobalLoader({ texto: 'Guardando...' });
            try {
                const r = await fetch(url, { method: 'POST', body: formData });
                hideGlobalLoader();
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const msg = await r.text();
                alert(msg || 'Guardado');
                lockForm(true);
                setModo('BLOQUEADO', 'text-bg-secondary');
                // refresca tabla si aplica:
                if (window.$ && $('#data-table').length) $('#data-table').DataTable().ajax.reload(null, false);
            } catch (err) {
                hideGlobalLoader();
                console.error(err);
                alert('Error al guardar: ' + (err.message || err));
            }
        });
    });
</script>
