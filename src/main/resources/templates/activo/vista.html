
<style>
    #preloader {
        position: fixed;
        z-index: 9999;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255,255,255,0.8);
        align-items: center;
        justify-content: center;
    }
    </style>
<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Oficina</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioActivo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="prediocontenidoModalActivo"></div>
    </div>
</div>

<div id="mensaje" style="display:none; padding: 10px; margin-top: 10px; background-color: #f8d7da; color: #721c24;">
    <strong>¡Error!</strong> <span id="mensajeTexto"></span>
</div>

<div id="modalImportar" style="display: none;">
    <div class="modal-overlay" style="
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        display: flex;
        justify-content: center;
        align-items: center;
    ">
        <div class="bg-white p-4 rounded shadow" style="width: 100%; max-width: 400px; position: relative;">
            <h5 class="mb-3 text-center">📁 Importar archivo Excel</h5>
            <form id="formImportarActivos" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="archivoExcel" class="form-label">Seleccionar archivo</label>
                    <input type="file" id="archivoExcel" name="archivo" class="form-control" accept=".xlsx,.xls" required>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="button" class="btn btn-primary" onclick="importarOficinas()">
                        <i class="fa-solid fa-file-import"></i> Importar
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">
                        <i class="fa-solid fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="preloader" class="d-none">
    <div>
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-center">Importando registros, por favor espere...</p>
    </div>
</div>


<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla() {
        $.ajax({
            type: 'POST',
            url: "/administracion/activo/tabla-registros",
            success: function (response) {
                $("#tablaRegistro").html(response);
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/activo/formulario", "#prediocontenidoModalActivo", "#formularioActivo");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/activo/formulario-edit", "#prediocontenidoModalActivo", "#formularioActivo");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/activo/eliminar",cargarTabla);
    }

    function abrirModal() {
        document.getElementById('modalImportar').style.display = 'block';
    }

    function cerrarModal() {
        document.getElementById('modalImportar').style.display = 'none';
    }


    function mostrarMensaje(mensaje) {
        var div = document.getElementById('mensaje');
        var texto = document.getElementById('mensajeTexto');
        texto.innerText = mensaje;
        div.style.display = 'block';
    }

    function importarOficinas() {
        const inputArchivo = document.getElementById('archivoExcel');
        const archivo = inputArchivo.files[0];

        if (!archivo) {
            mostrarMensaje("⚠️ Por favor, seleccione un archivo antes de importar.");
            return;
        }

        var form = document.getElementById('formImportarActivos');
        var data = new FormData(form);

        document.getElementById('preloader').classList.remove('d-none');
        document.getElementById('preloader').classList.add('d-flex');
        // ⏳ Mostrar preloader
        
        fetch('/administracion/activo/importar', {
            method: 'POST',
            body: data
        }).then(response => response.json())
        .then(data => {
            document.getElementById('preloader').classList.remove('d-flex');
            document.getElementById('preloader').classList.add('d-none'); // ✅ Ocultar preloader
            cerrarModal();
            cargarTabla();

            if (data.errores && data.errores.length > 0) {
                let mensaje = `✔️ ${data.exitosos} registros importados correctamente.<br>❌ Errores encontrados:<ul>`;
                data.errores.forEach(e => {
                    mensaje += `<li>Fila ${e.fila}: ${e.motivo}</li>`;
                });
                mensaje += "</ul>";
                mostrarMensajeHTML(mensaje);
            } else {
                mostrarMensaje("✅ " + data.mensaje);
            }
        }).catch(error => {
            document.getElementById('preloader').classList.remove('d-flex');
            document.getElementById('preloader').classList.add('d-none');

            mostrarMensaje('❌ Error al importar el archivo: ' + error.message);
        });
    }

    function mostrarMensajeHTML(mensajeHTML) {
        const div = document.getElementById('mensaje');
        const texto = document.getElementById('mensajeTexto');
        texto.innerHTML = mensajeHTML;
        div.style.display = 'block';
    }

</script>
