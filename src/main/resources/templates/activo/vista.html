<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Actvios UAP</h4>

<div id="tablaRegistro"></div>
<small id="badgeSource" class="text-muted ms-2"></small>
<div class="modal fade" id="modalFormularioActivo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content" id="prediocontenidoModalActivo"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla() {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: "/administracion/activo/tabla-registros",
            success: function (response) {
                $("#tablaRegistro").html(response);
            },
            error: function () {
                $("#tablaRegistro").html(`
                <div class="alert alert-danger m-3">
                Ocurrió un error al cargar la tabla.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarTabla()">Reintentar</button>
                </div>
            `);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    function cargarFormulario() {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        cargarFormularioAlert("/administracion/activo/formulario", "#prediocontenidoModalActivo", "#formularioActivo");
        $.ajax({
            error: function () {
                $("#tablaRegistro").html(`
                <div class="alert alert-danger m-3">
                Ocurrió un error al cargar la tabla.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarTabla()">Reintentar</button>
                </div>
            `);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/activo/formulario-edit", "#prediocontenidoModalActivo", "#formularioActivo");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/activo/eliminar", cargarTabla);
    }

</script>
