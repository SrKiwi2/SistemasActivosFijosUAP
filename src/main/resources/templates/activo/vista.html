<h4 class="py-2 mb-1"><span class="text-muted fw-light">VISTA /</span> REGISTRO DE ACTIVOS</h4>

<div id="formulario"></div>
<div>
    <br>
</div>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalImportDbf" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form id="formImportDbf" class="modal-content" enctype="multipart/form-data" autocomplete="off">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fa-solid fa-file-import me-2"></i>Importar Activos desde DBF</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Archivo .dbf</label>
                    <input type="file" class="form-control" name="file" accept=".dbf" required />
                    <div class="form-text">Selecciona el archivo <b>ACTUAL.dbf</b> u otro con la misma estructura.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Codificación (charset)</label>
                    <select class="form-select" name="charset">
                        <option value="windows-1252" selected>Windows-1252 (recomendado)</option>
                        <option value="ISO-8859-1">ISO-8859-1</option>
                        <option value="UTF-8">UTF-8</option>
                    </select>
                    <div class="form-text">Si ves caracteres raros, prueba ISO-8859-1 o UTF-8.</div>
                </div>
                <div id="importProgress" class="d-none">
                    <div class="mb-2 small text-muted">Importando…</div>
                    <div class="progress" style="height: 18px;">
                        <div id="importProgressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                            role="progressbar" style="width: 0%">0%</div>
                    </div>
                    <div class="small mt-2" id="importProgressText"></div>
                </div>


                <div id="importResult" class="d-none"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-play me-1"></i> Iniciar importación
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    
    $(document).ready(function () {
        cargarTabla();
        cargarFormulario();
    });

    function cargarTabla() {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: "/administracion/activo/tabla-registros",
            success: function (response) {
                $("#tablaRegistro").html(response);
            },
            error: function () {
                $("#tablaRegistro").html(`
                <div class="alert alert-danger m-3">
                Ocurrió un error al cargar la tabla.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarTabla()">Reintentar</button>
                </div>
            `);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    function cargarFormulario() {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });

        if (window.ActivoForm?.destroy) window.ActivoForm.destroy();

        $('#formulario').load('/administracion/activo/formulario', function (resp, status) {
            hideGlobalLoader();
            if (status === 'success') {
            if (window.ActivoForm?.init) window.ActivoForm.init('#formulario');
            else console.error('ActivoForm no cargó.');
            } else {
            $('#formulario').html(`<div class="alert alert-danger m-3">
                Ocurrió un error al cargar el formulario.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarFormulario()">Reintentar</button>
            </div>`);
            }
        });
    }


    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/activo/formulario-edit", "#prediocontenidoModalActivo", "#formularioActivo");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/activo/eliminar", cargarTabla);
    }

    (function () {
        const form = document.getElementById('formImportDbf');
        const progressBox = document.getElementById('importProgress');
        const progressBar = document.getElementById('importProgressBar');
        const progressText = document.getElementById('importProgressText');
        const resultBox = document.getElementById('importResult');

        function setProgress(pct, text) {
            const val = Math.max(0, Math.min(100, Math.round(pct)));
            progressBar.style.width = val + '%';
            progressBar.textContent = val + '%';
            progressText.textContent = text || '';
        }

        form?.addEventListener('submit', async function (e) {
            e.preventDefault();

            const fd = new FormData(form);
            const file = fd.get('file');
            if (!file || !file.name.toLowerCase().endsWith('.dbf')) {
                alert('Selecciona un archivo .dbf válido');
                return;
            }

            progressBox.classList.remove('d-none');
            resultBox.classList.add('d-none');
            resultBox.innerHTML = '';
            setProgress(0, 'Preparando…');

            const opts = { method: 'POST', body: fd };
            try {
                // 1) Iniciar import async
                const r = await fetch('/importe/import-actual/start', opts);
                if (!r.ok) throw new Error('No se pudo iniciar la importación');
                const { importId, total } = await r.json();

                // 2) Polling de estado
                let timer = setInterval(async () => {
                    try {
                        const rs = await fetch(`/importe/import-actual/status/${importId}`);
                        if (!rs.ok) throw new Error('Estado no disponible');
                        const s = await rs.json();

                        const pct = s.total ? (s.leidas * 100 / s.total) : 0;
                        setProgress(pct, `Leídas: ${s.leidas}/${s.total} · Ins: ${s.insertados} · Act: ${s.actualizados} · Err: ${s.errores}`);

                        if (s.terminado) {
                            clearInterval(timer);
                            setProgress(100, 'Completado.');
                            // mostrar resultado final sencillo
                            resultBox.innerHTML = `
              <div class="alert alert-success mt-3">
                <i class="fa-solid fa-circle-check me-2"></i> Importación finalizada.
                <div class="mt-2">
                  <span class="badge text-bg-secondary me-2">Leídas: ${s.leidas ?? 0}</span>
                  <span class="badge text-bg-success me-2">Insertados: ${s.insertados ?? 0}</span>
                  <span class="badge text-bg-info me-2">Actualizados: ${s.actualizados ?? 0}</span>
                  <span class="badge text-bg-danger">Errores: ${s.errores ?? 0}</span>
                </div>
                ${(s.muestrasErrores && s.muestrasErrores.length) ? `
                <div class="alert alert-warning mt-2">
                  <div class="fw-semibold mb-1">Algunos errores:</div>
                  <ul class="mb-0 small" style="max-height:160px;overflow:auto;">
                    ${s.muestrasErrores.map(e => `<li>${e}</li>`).join('')}
                  </ul>
                </div>` : ''}
              </div>
              <div class="text-end">
                <button id="btnRecargarEntidades" class="btn btn-primary btn-sm">
                  <i class="fa-solid fa-rotate me-1"></i> Recargar lista
                </button>
              </div>
            `;
                            resultBox.classList.remove('d-none');
                            document.getElementById('btnRecargarEntidades')?.addEventListener('click', () => location.reload());
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }, 600);

            } catch (err) {
                progressBox.classList.add('d-none');
                resultBox.classList.remove('d-none');
                resultBox.innerHTML = `
        <div class="alert alert-danger">
          <i class="fa-solid fa-triangle-exclamation me-2"></i>
          Error durante la importación: <b>${(err && err.message) || err}</b>
        </div>`;
            }
        });
    })();

</script>
