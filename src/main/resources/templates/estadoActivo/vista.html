<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span>Estado Activo</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioEstadoActivo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalEstadoActivo"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();
    });

    function cargarTabla() {
        $.ajax({
            type: 'POST',
            url: "/administracion/estadoa/tabla-registros",  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/estadoa/formulario", "#contenidoModalEstadoActivo", "#formularioEstadoActivo");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/estadoa/formulario-edit", "#contenidoModalEstadoActivo", "#formularioEstadoActivo");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/estadoa/eliminar",cargarTabla);
    }
</script>
