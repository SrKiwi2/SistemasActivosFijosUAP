<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Organismo financiador</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioAuxiliar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="prediocontenidoModalOF"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function initDataTable() {
        const $tbl = $('#data-table');
        if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();
        $tbl.DataTable({
            language: {
                sProcessing: "Procesando...", sLengthMenu: "Mostrar _MENU_ registros",
                sZeroRecords: "No se encontraron resultados",
                sInfo: "Mostrando _START_ a _END_ de _TOTAL_",
                sInfoEmpty: "Mostrando 0 a 0 de 0", sInfoFiltered: "(filtrado de _MAX_)",
                sSearch: "Buscar:", oPaginate: { sFirst: "Primero", sLast: "Último", sNext: "Siguiente", sPrevious: "Anterior" }
            }
        });
    }

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: '/administracion/organismo/tabla-registros' + (q ? ('?q=' + encodeURIComponent(q)) : ''),
            success: function (html) { $('#tablaRegistro').html(html); initDataTable(); },
            error: function () { $('#tablaRegistro').html('<div class="alert alert-danger m-3">Error al cargar la tabla.</div>'); },
            complete: hideGlobalLoader
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/organismo/formulario", "#prediocontenidoModalOF", "#formularioOF");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/organismo/formulario-edit", "#prediocontenidoModalOF", "#formularioOF");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/organismo/eliminar", cargarTabla);
    }

</script>
