<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Organo financiador</h5>
        <small class="text-muted" th:if="${sourceUsed=='dbf'}">(fuente: DBF)</small>
        <small class="text-muted" th:if="${sourceUsed=='db'}">(fuente: BD)</small>
        <div class="d-flex gap-2">
            <button id="btnSyncOF" class="btn btn-outline-secondary">
                <i class="fa-solid fa-file-import me-1"></i> Importar desde DBF montado
            </button>
        </div>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gestion</th>
                    <th>OF</th>
                    <th>DES</th>
                    <th>SIGLAr</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
                <tr th:each="of, index: ${listasOrganismoFinanciero}">
                    <th th:text="${index.index+1}"></th>
                    <th th:text="${of.gestion}"></th>
                    <th th:text="${of.codOf}"></th>
                    <th th:text="${of.descripcion}"></th>
                    <th th:text="${of.sigla}"></th>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });

    $(document).on('click', '#btnSyncOF', function () {
        showGlobalLoader({ texto: 'Sincronizando...' });
        $.ajax({
            type: 'POST',
            url: '/administracion/organismo/sync-from-mounted',
            success: function (res) {
                Swal.fire('Listo', `Leídas: ${res.totalLeidas}<br>Insertados: ${res.insertados}<br>Actualizados: ${res.actualizados}<br>Repetidos en DBF: ${res.duplicadosEnDbf}`, 'success');
                cargarTabla();
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                Swal.fire('Error', msg, 'error');
            },
            complete: hideGlobalLoader
        });
    });
</script>
