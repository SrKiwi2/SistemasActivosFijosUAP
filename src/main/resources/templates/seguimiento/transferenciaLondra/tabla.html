<!-- Bloque de diagnóstico — quitar después de resolver -->
<div th:if="${errorCarga != null}" class="alert alert-danger mx-3 mt-3">
    <strong><i class="fa-solid fa-bug me-2"></i>Error interno:</strong>
    <code th:text="${errorCarga}"></code>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Solicitudes de Transferencia — Pendientes</h5>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-warning fs-6">
                <i class="fa-solid fa-hourglass-half me-1"></i>
                <span th:text="${transferencias.size()}">0</span> pendiente(s)
            </span>
            <button class="btn btn-outline-secondary btn-sm" onclick="cargarTabla()">
                <i class="fa-solid fa-rotate me-1"></i> Actualizar
            </button>
        </div>
    </div>

    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table-transferencias">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Fecha / Correlativo</th>
                    <th>Tipo</th>
                    <th>Activo</th>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th class="text-center">Validación</th>
                    <th class="text-center">Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t, idx : ${transferencias}">
                    <td th:text="${idx.index + 1}"></td>

                    <!-- Fecha y correlativo -->
                    <td>
                        <div class="fw-semibold" th:text="${t.datos.corrT}">—</div>
                        <small class="text-muted" th:text="${t.datos.fechaT}">—</small>
                        <br>
                        <small th:text="${t.datos.nombreT}" class="text-truncate d-block" style="max-width:140px"></small>
                    </td>

                    <!-- Tipo: INTERNA / EXTERNA -->
                    <td>
                        <span th:if="${t.tipo != null and t.tipo.name() == 'INTERNA'}"
                              class="badge bg-info">
                            <i class="fa-solid fa-building me-1"></i>Interna
                        </span>
                        <span th:if="${t.tipo != null and t.tipo.name() == 'EXTERNA'}"
                              class="badge bg-warning text-dark">
                            <i class="fa-solid fa-arrow-right-arrow-left me-1"></i>Externa
                        </span>
                    </td>

                    <!-- Activo -->
                    <td>
                        <span class="badge bg-secondary" th:text="${t.datos.codigoO}">—</span>
                        <br>
                        <small class="text-muted">
                            CONT: <span th:text="${t.datos.codContO}">—</span> /
                            AUX: <span th:text="${t.datos.codAuxO}">—</span>
                        </small>
                    </td>

                    <!-- Origen -->
                    <td>
                        <div><i class="fa-solid fa-location-dot text-muted me-1"></i>
                            <span th:text="${t.datos.unidadO}">—</span></div>
                        <small>Of: <span th:text="${t.datos.codOficO}">—</span>
                            / Resp: <span th:text="${t.datos.codRespO}">—</span></small>
                        <br>
                        <small class="text-muted">CI: <span th:text="${t.datos.ciSolO}">—</span></small>
                    </td>

                    <!-- Destino -->
                    <td>
                        <div><i class="fa-solid fa-flag-checkered text-muted me-1"></i>
                            <span th:text="${t.datos.unidadD}">—</span></div>
                        <small>Of: <span th:text="${t.datos.codOficD}">—</span></small>
                        <br>
                        <small class="text-muted">
                            <span th:text="${t.datos.nomRecep}">—</span>
                            (<span th:text="${t.datos.ciRecep}">—</span>)
                        </small>
                    </td>

                    <!-- Validación: íconos individuales con tooltip -->
                    <td class="text-center">
                        <div th:if="${t.yaAprobadaEnBd}">
                            <span class="badge bg-success">
                                <i class="fa-solid fa-circle-check me-1"></i>Ya aprobada
                            </span>
                        </div>
                        <div th:if="${!t.yaAprobadaEnBd}" class="d-flex flex-wrap gap-1 justify-content-center">
                            <span th:class="${t.activoExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Activo">
                                <i th:class="${t.activoExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> Activo
                            </span>
                            <span th:class="${t.predioOrigenExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Unidad origen">
                                <i th:class="${t.predioOrigenExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> U.Orig
                            </span>
                            <span th:class="${t.oficinaOrigenExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Oficina origen">
                                <i th:class="${t.oficinaOrigenExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> Of.Orig
                            </span>
                            <span th:class="${t.responsableOrigenExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Responsable origen">
                                <i th:class="${t.responsableOrigenExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> Resp.O
                            </span>
                            <span th:class="${t.predioDestinoExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Unidad destino">
                                <i th:class="${t.predioDestinoExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> U.Dest
                            </span>
                            <span th:class="${t.oficinaDestinoExiste} ? 'badge bg-success' : 'badge bg-danger'"
                                  data-bs-toggle="tooltip" title="Oficina destino">
                                <i th:class="${t.oficinaDestinoExiste} ? 'fa-solid fa-check' : 'fa-solid fa-xmark'"></i> Of.Dest
                            </span>
                        </div>
                        <!-- Errores detallados -->
                        <div th:if="${!t.valida and !t.yaAprobadaEnBd and !t.errores.empty}"
                             class="mt-1">
                            <small class="text-danger" th:each="err : ${t.errores}">
                                <i class="fa-solid fa-triangle-exclamation"></i>
                                <span th:text="${err}"></span><br>
                            </small>
                        </div>
                    </td>

                    <!-- Acción -->
                    <td class="text-center">
                        <button th:if="${t.valida and !t.yaAprobadaEnBd}"
                                type="button"
                                class="btn btn-success btn-sm btn-aprobar"
                                th:data-corr="${t.datos.corrT}">
                            <i class="fa-solid fa-circle-check me-1"></i>Aprobar
                        </button>
                        <span th:if="${!t.valida and !t.yaAprobadaEnBd}"
                              class="badge bg-secondary"
                              data-bs-toggle="tooltip" title="Corrija los errores antes de aprobar">
                            <i class="fa-solid fa-lock"></i> No válida
                        </span>
                        <span th:if="${t.yaAprobadaEnBd}" class="text-muted">
                            <i class="fa-solid fa-circle-check text-success"></i>
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]')
        .forEach(el => new bootstrap.Tooltip(el));

    // Delegación de evento para botones de aprobar
    document.addEventListener('click', function (e) {
        const btn = e.target.closest('.btn-aprobar');
        if (!btn) return;
        const corrT = btn.getAttribute('data-corr');
        if (corrT && typeof window.aprobarTransferencia === 'function') {
            window.aprobarTransferencia(corrT);
        }
    });
</script>
