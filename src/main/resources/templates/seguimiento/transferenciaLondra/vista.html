<h4 class="py-3 mb-4">
    <span class="text-muted fw-light">Menú /</span> Transferencias de Activos
</h4>

<div class="alert alert-info d-flex align-items-center gap-2 mb-3" id="alertaPendientes" style="display:none!important">
    <i class="fa-solid fa-bell fa-beat"></i>
    <span id="msgPendientes">Verificando transferencias pendientes...</span>
</div>

<div id="tablaRegistro"></div>

<script>
    // ✅ Sin $(document).ready — el fragmento ya está en el DOM al ejecutarse
    (function () {

        function cargarTabla(q) {
            showGlobalLoader({ texto: 'Leyendo DBF...', imgUrl: '/assets/img/logo/activofijos.png' });
            $.ajax({
                type: 'POST',
                url: '/administracion/transferenciasLondra/tabla-registros' + (q ? ('?q=' + encodeURIComponent(q)) : ''),
                success: function (html) {
                    $('#tablaRegistro').html(html);
                    initDataTable();
                    // Reinicializar tooltips del fragmento recién inyectado
                    $('[data-bs-toggle="tooltip"]').each(function () {
                        new bootstrap.Tooltip(this);
                    });
                },
                error: function (xhr) {
                    console.error('[Transferencias] Error:', xhr.status, xhr.responseText.substring(0, 300));
                    $('#tablaRegistro').html(
                        '<div class="alert alert-danger m-3">' +
                        '<i class="fa-solid fa-triangle-exclamation me-2"></i>' +
                        'Error ' + xhr.status + ': No se pudo cargar la tabla de transferencias.' +
                        '</div>'
                    );
                },
                complete: hideGlobalLoader
            });
        }

        function initDataTable() {
            const $tbl = $('#data-table-transferencias');
            if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();
            $tbl.DataTable({
                order: [ [1, 'desc'] ],
                language: {
                    sProcessing: "Procesando...",
                    sLengthMenu: "Mostrar _MENU_ registros",
                    sZeroRecords: "No hay transferencias pendientes",
                    sInfo: "Mostrando _START_ a _END_ de _TOTAL_ registros",
                    sInfoEmpty: "Sin registros",
                    sInfoFiltered: "(filtrado de _MAX_)",
                    sSearch: "Buscar:",
                    oPaginate: {
                        sFirst: "Primero", sLast: "Último",
                        sNext: "Siguiente", sPrevious: "Anterior"
                    }
                }
            });
        }

        function verificarPendientes() {
            $.get('/administracion/transferenciasLondra/conteo-pendientes', function (res) {
                const count = res.pendientes || 0;
                if (count > 0) {
                    $('#msgPendientes').text(count + ' transferencia(s) pendiente(s) de aprobación.');
                    $('#alertaPendientes').show();
                } else {
                    $('#alertaPendientes').hide();
                }
            });
        }

        // ✅ Exponer para que el layout SSE pueda llamar cargarTabla()
        window.cargarTabla = cargarTabla;

        // ✅ Exponer para el botón de aprobar en tabla_registro.html
        window.aprobarTransferencia = function (corrT, count) {
            Swal.fire({
                title: '¿Aprobar transferencia?',
                html: `Correlativo: <strong>${corrT}</strong><br>
                    Se procesarán <strong>${count || '?'}</strong> activo(s) en ACTUAL.DBF.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="fa-solid fa-check me-1"></i> Aprobar todo',
                cancelButtonText: 'Cancelar'
            }).then(function (result) {
                if (!result.isConfirmed) return;
                showGlobalLoader({ texto: 'Procesando ' + (count || '') + ' activo(s)...' });
                $.ajax({
                    type: 'POST',
                    url: '/administracion/transferenciasLondra/aprobar/' + encodeURIComponent(corrT),
                    success: function (res) {
                        Swal.fire('Aprobado', res.msg, 'success');
                        cargarTabla();
                        verificarPendientes();
                    },
                    error: function (xhr) {
                        Swal.fire('Error', xhr.responseJSON?.msg || 'Error inesperado', 'error');
                    },
                    complete: hideGlobalLoader
                });
            });
        };

        // ── Iniciar ──────────────────────────────────────────────────────────
        cargarTabla();
        verificarPendientes();
        setInterval(verificarPendientes, 30000);

    })();
</script>
