<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Asignacion activos nuevos</h4>

<div id="tablaRegistro"></div>

<script>
    $(document).ready(function () {
        cargarTabla();

    }); 

    function showSpinner(target) {
        $(target).html(`
        <div class="d-flex justify-content-center">
            <div class="spinner-border m-5 text-secondary" role="status">
            <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
        `);
    }

    function cargarTabla() {
        showSpinner("#tablaRegistro");
        $.ajax({
            type: 'POST',
            url: "/seguimiento-activo/tabla_activos_nuevos",  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            }
        });
    }
</script>
