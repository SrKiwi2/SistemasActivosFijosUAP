<div class="card">
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>Fecha baja</th>
                    <th>Nº H.R</th>
                    <th>Responsable</th>
                    <th>Activo</th>
                    <th>Causa</th>
                    <th>Opciones</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
                <tr th:each="baja : ${bajas}">
                    <th th:text="${baja.fechaBaja}"></th>
                    <th th:text="${baja.hr}"></th>
                    <th th:text="${baja.responsable.persona.nombre ?: '-'} +' '+ ${baja.responsable.persona.paterno ?: '-' } +' '+ ${baja.responsable.persona.materno ?: '-' }"></th>
                    <th th:text="${baja.activo.codigo} + ${baja.activo.nombre ?: '-' } "></th>
                    <th th:text="${baja.causa ?: '-'}"></th>
                    <th>
                        <a th:href="@{/seguimiento-activo/bajas/{id}/pdf(id=${baja.idBajaActivo})}"
                            target="_blank"
                            class="btn btn-sm btn-outline-primary">
                        Ver PDF
                        </a>
                    </th>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });
</script>
