<!-- /seguimiento/baja/tabla_registro.html -->

<div th:if="${#lists.isEmpty(bajas)}" class="card border-0 shadow-sm">
    <div class="card-body text-center py-5">
        <i class="bx bx-trash fs-1 text-muted mb-3 d-block"></i>
        <h6 class="text-muted">No se encontraron registros de baja de activos</h6>
    </div>
</div>

<div th:if="${!#lists.isEmpty(bajas)}" class="card border-0 shadow-sm">

    <div class="card-header bg-transparent border-bottom d-flex align-items-center justify-content-between py-3">
        <div class="d-flex align-items-center gap-2">
            <i class="bx bx-trash text-danger fs-5"></i>
            <span class="fw-semibold">Registros de Baja de Activos</span>
            <span class="badge bg-danger rounded-pill" th:text="${#lists.size(bajas)}">0</span>
        </div>
        <div class="d-none d-md-flex align-items-center gap-3 small text-muted">
            <span><span class="badge bg-success me-1">●</span>Aprobada</span>
            <span><span class="badge bg-primary me-1">●</span>Ejecutada</span>
            <span><span class="badge bg-warning me-1">●</span>Pendiente</span>
            <span><span class="badge bg-danger me-1">●</span>Anulada</span>
        </div>
    </div>

    <div class="d-none d-lg-block px-3 pt-2 pb-1">
        <div class="row g-0 text-muted small fw-semibold border-bottom pb-2">
            <div class="col-lg-2">N° RESOLUCIÓN</div>
            <div class="col-lg-2">FECHA</div>
            <div class="col-lg-2">MOTIVO</div>
            <div class="col-lg-3">RESPONSABLE</div>
            <div class="col-lg-1">OFICINA</div>
            <div class="col-lg-1 text-center">ACTIVOS</div>
            <div class="col-lg-1 text-center">ESTADO</div>
        </div>
    </div>

    <div class="list-group list-group-flush">
        <div th:each="baja : ${bajas}" th:id="'baja-row-' + ${baja.idBaja}"
            class="baja-row list-group-item list-group-item-action px-3 py-0 border-start border-4" th:classappend="${baja.estado == 'EJECUTADA'} ? 'border-primary' :
                         (${baja.estado == 'APROBADA'} ? 'border-success' :
                         (${baja.estado == 'PENDIENTE'} ? 'border-warning' : 'border-danger'))"
            th:data-id="${baja.idBaja}" th:data-numero="${baja.numeroResolucion}" th:data-motivo="${baja.motivo}"
            th:data-estado="${baja.estado}" th:data-fecha="${baja.fechaSolicitud}"
            th:data-fecha-aprobacion="${baja.fechaAprobacion}" th:data-resolucion="${baja.acta}" th:data-responsable="${baja.responsable != null ?
           (baja.responsable.persona.nombre + ' ' + baja.responsable.persona.paterno) : ''}"
            th:data-oficina="${baja.oficina != null ? baja.oficina.nombre : ''}" th:data-aprobador="${baja.aprobador != null ?
           (baja.aprobador.persona.nombre + ' ' + baja.aprobador.persona.paterno) : ''}"
            th:data-observacion="${baja.observacion}"
            th:data-num-activos="${baja.detalles != null ? #lists.size(baja.detalles) : 0}"
            th:data-fecha-reg="${baja._fechaRegistro}" th:data-usuario-reg="${baja._registroIdUsuario}"
            th:data-fecha-mod="${baja._fechaModificacion}" th:data-usuario-mod="${baja._modificacionIdUsuario}"
            style="cursor:pointer; transition:background 0.15s">

            <div class="row g-0 align-items-center py-3">
                <!-- N° Resolución -->
                <div class="col-12 col-lg-2 mb-1 mb-lg-0">
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar avatar-xs bg-label-danger rounded">
                            <i class="bx bx-trash small"></i>
                        </div>
                        <div>
                            <div class="fw-semibold text-danger small" th:text="${baja.numeroResolucion ?: '—'}">—</div>
                            <div class="text-muted" style="font-size:0.7rem" th:text="${baja.acta ?: ''}"></div>
                        </div>
                    </div>
                </div>

                <!-- Fecha -->
                <div class="col-6 col-lg-2 mb-1 mb-lg-0">
                    <div class="text-muted small">
                        <i class="bx bx-calendar me-1"></i>
                        <span th:if="${baja.fechaSolicitud != null}"
                            th:text="${#temporals.format(baja.fechaSolicitud, 'dd/MM/yyyy')}">—</span>
                        <span th:unless="${baja.fechaSolicitud != null}">—</span>
                    </div>
                    <div class="text-muted" style="font-size:0.7rem" th:if="${baja.fechaAprobacion != null}">
                        Aprobado: <span th:text="${#temporals.format(baja.fechaAprobacion, 'dd/MM/yyyy')}"></span>
                    </div>
                </div>

                <!-- Motivo -->
                <div class="col-6 col-lg-2 mb-1 mb-lg-0">
                    <span class="badge bg-label-danger" th:text="${baja.motivo ?: '—'}">—</span>
                </div>

                <!-- Responsable -->
                <div class="col-12 col-lg-3 mb-1 mb-lg-0">
                    <div class="d-flex align-items-center gap-2" th:if="${baja.responsable != null}">
                        <i class="bx bx-user text-muted small"></i>
                        <span class="small text-truncate" style="max-width:180px"
                            th:text="${baja.responsable.persona.nombre + ' ' + baja.responsable.persona.paterno}">—</span>
                    </div>
                    <span th:unless="${baja.responsable != null}" class="text-muted small">—</span>
                </div>

                <!-- Oficina -->
                <div class="col-6 col-lg-1 mb-1 mb-lg-0">
                    <div class="small text-muted text-truncate" style="max-width:100px"
                        th:text="${baja.oficina != null ? baja.oficina.nombre : '—'}">—</div>
                </div>

                <!-- Num activos -->
                <div class="col-3 col-lg-1 mb-1 mb-lg-0 text-lg-center">
                    <span class="badge bg-label-danger rounded-pill">
                        <i class="bx bx-box me-1"></i>
                        <span th:text="${baja.detalles != null ? #lists.size(baja.detalles) : 0}">0</span>
                    </span>
                </div>

                <!-- Estado -->
                <div
                    class="col-3 col-lg-1 text-lg-center d-flex align-items-center justify-content-end justify-content-lg-center gap-2">
                    <span class="badge" th:classappend="${baja.estado == 'EJECUTADA'} ? 'bg-primary' :
                            (${baja.estado == 'APROBADA'} ? 'bg-success' :
                            (${baja.estado == 'PENDIENTE'} ? 'bg-warning text-dark' : 'bg-danger'))"
                        th:text="${baja.estado ?: '—'}">—</span>
                    <a th:href="@{/administracion/baja/{id}/pdf(id=${baja.idBaja})}" target="_blank"
                        class="btn btn-sm btn-icon btn-outline-danger py-0 px-1" onclick="event.stopPropagation()"><i
                            class="bx bxs-file-pdf small"></i></a>
                    <i class="bx bx-chevron-right text-muted ms-1"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="card-footer bg-transparent border-top d-flex align-items-center py-2 px-3">
        <small class="text-muted">
            <i class="bx bx-info-circle me-1"></i>
            Mostrando <strong th:text="${#lists.size(bajas)}">0</strong> registros. Haz clic para ver el detalle.
        </small>
    </div>
</div>

<style>
    .baja-row:hover {
        background-color: rgba(var(--bs-danger-rgb), 0.04) !important;
    }
</style>
<script>
    $(document).on('click', '.baja-row', function () { abrirModalBaja($(this).data('id')); });
</script>
