<div class="card">
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>Fecha Incorporación</th>
                    <th>Fecha de retiro</th>
                    <th>Funcionario</th>
                    <th>Unidad</th>
                    <th>Activos Registrados</th>
                    <th>PDF</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
                <tr th:each="ingreso : ${ingresos}">
                    <td th:text="${ingreso.fechaIngreso ?: '-'}"></td>
                    <td th:text="${ingreso.fechaFin ?: '-'}"></td>

                    <!-- Ajusta al nombre real del campo en Persona (nombre/nombreCompleto) -->
                    <td th:text="${ingreso.responsablePropietario != null && ingreso.responsablePropietario.persona != null
                                ? ingreso.responsablePropietario.persona.nombreCompleto
                                : '-'}"></td>

                    <td th:text="${ingreso.oficinaPropietario != null ? ingreso.oficinaPropietario.nombre : '-'}"></td>

                    <!-- Opción A: listar cada activo con su estado -->
                    <td>
                        <span th:if="${#lists.isEmpty(ingreso.detalles)}">-</span>
                        <ul th:if="${!#lists.isEmpty(ingreso.detalles)}" class="mb-0 ps-3">
                            <li th:each="det : ${ingreso.detalles}"
                                th:text="${det.descripcion + ' (' + det.estadoActivo + ')'}"></li>
                        </ul>
                    </td>

                    <!-- Link PDF: usa el id correcto -->
                    <td>
                        <a th:href="@{/seguimiento-activo/ingresos/{id}/pdf(id=${ingreso.idIngreso})}" target="_blank"
                            class="btn btn-sm btn-outline-primary">
                            Ver PDF
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>
</div>

<script>
    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });
</script>
