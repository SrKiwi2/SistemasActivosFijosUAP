<div class="card">
    <div class="card-datatable table-responsive pt-0">
        <table class="table table-hover align-top table-modern" id="data-table">
            <thead class="table-light sticky-top">
                <tr>
                    <th style="width: 48px;"></th>
                    <th style="min-width:220px;">Transfiere</th>
                    <th style="min-width:220px;">Recibe</th>
                    <th class="text-nowrap">Fecha transf.</th>
                    <th class="text-nowrap">Fecha recepción</th>
                    <th class="text-center">PDF</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__fadeIn">
                <th:block th:each="t, stat : ${transferencias}">

                    <!-- Fila principal -->
                    <tr>
                        <!-- Toggle -->
                        <td class="text-center align-middle">
                            <button class="btn btn-sm btn-outline-secondary btn-toggle" type="button"
                                th:attr="data-bs-target=${'#det_' + stat.index}" data-bs-toggle="collapse"
                                aria-expanded="false" th:aria-controls="${'det_' + stat.index}">
                                <i class="bi bi-chevron-down"></i>
                            </button>
                        </td>

                        <!-- Transfiere -->
                        <td>
                            <div class="fw-semibold">
                                <i class="bi bi-box-arrow-up-right me-1 text-primary"></i>
                                <span th:text="${ (t.responsableOrigen != null && t.responsableOrigen.persona != null) 
                                         ? ((t.responsableOrigen.persona.nombre ?: '-') + ' ' + (t.responsableOrigen.persona.paterno ?: '-')) 
                                         : '-' }"></span>
                            </div>
                            <div class="text-muted small"
                                th:text="${t.responsableOrigen != null && t.responsableOrigen.oficina != null ? t.responsableOrigen.oficina.nombre : '—'}">
                            </div>
                        </td>

                        <!-- Recibe -->
                        <td>
                            <div class="fw-semibold">
                                <i class="bi bi-box-arrow-in-down me-1 text-success"></i>
                                <span th:text="${ (t.responsableDestino != null && t.responsableDestino.persona != null) 
                                         ? ((t.responsableDestino.persona.nombre ?: '-') + ' ' + (t.responsableDestino.persona.paterno ?: '-')) 
                                         : '-' }"></span>
                            </div>
                            <div class="text-muted small"
                                th:text="${t.responsableDestino != null && t.responsableDestino.oficina != null ? t.responsableDestino.oficina.nombre : '—'}">
                            </div>
                        </td>

                        <!-- Fechas -->
                        <td class="text-nowrap"
                            th:text="${t.fechaTransferencia != null ? #temporals.format(t.fechaTransferencia, 'dd/MM/yyyy') : '—'}">
                        </td>
                        <td class="text-nowrap"
                            th:text="${t.fechaRecepcion    != null ? #temporals.format(t.fechaRecepcion,    'dd/MM/yyyy') : '—'}">
                        </td>

                        <!-- PDF -->
                        <td class="text-center">
                            <a th:href="@{/seguimiento-activo/transferencia/{id}/pdf(id=${t.idTransferencia})}"
                                target="_blank" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-file-earmark-pdf me-1"></i> Ver PDF
                            </a>
                        </td>
                    </tr>

                    <!-- Fila de detalle (debe ir DENTRO del mismo th:block) -->
                    <tr class="detail-row">
                        <td colspan="6" class="p-0 border-0">
                            <div class="collapse" th:id="${'det_' + stat.index}" data-bs-parent="#data-table">
                                <div class="detail-wrapper">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Detalle de activos
                                            transferidos</h6>
                                        <span class="badge rounded-pill text-bg-secondary"
                                            th:text="|${t.detalles != null ? #lists.size(t.detalles) : 0} ítem(s)|">0
                                            ítem(s)</span>
                                    </div>

                                    <div th:if="${#lists.isEmpty(t.detalles)}" class="text-muted fst-italic">
                                        No hay detalle para esta transferencia.
                                    </div>

                                    <div class="row row-cols-1 row-cols-lg-2 g-3"
                                        th:if="${!#lists.isEmpty(t.detalles)}">
                                        <div class="col" th:each="d : ${t.detalles}">
                                            <div class="detail-item">
                                                <div class="d-flex align-items-start gap-2">
                                                    <span class="badge code-badge"
                                                        th:text="${d.activo != null ? (d.activo.codigo ?: '-') : '-'}"></span>
                                                    <div class="flex-grow-1">
                                                        <div class="fw-semibold text-truncate-2"
                                                            th:attr="title=${d.activo != null ? (d.activo.descripcion ?: '-') : '-'}"
                                                            data-bs-toggle="tooltip"
                                                            th:text="${d.activo != null ? (d.activo.descripcion ?: '-') : '-'}">
                                                        </div>

                                                        <div class="d-flex flex-wrap gap-2 mt-2">
                                                            <span class="badge rounded-pill text-bg-light">
                                                                <i class="bi bi-geo me-1 text-secondary"></i>
                                                                <span class="text-muted">Origen:</span>
                                                                <span class="ms-1"
                                                                    th:text="${d.ubicacionOrigen ?: (d.oficinaAnterior != null ? d.oficinaAnterior.nombre : '—')}"></span>
                                                            </span>
                                                            <span class="badge rounded-pill text-bg-light">
                                                                <i class="bi bi-geo-alt me-1 text-success"></i>
                                                                <span class="text-muted">Actual:</span>
                                                                <span class="ms-1"
                                                                    th:text="${d.ubicacionActual ?: (t.responsableDestino != null && t.responsableDestino.oficina != null ? t.responsableDestino.oficina.nombre : '—')}"></span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div><!-- /detail-item -->
                                        </div><!-- /col -->
                                    </div><!-- /row -->
                                </div><!-- /detail-wrapper -->
                            </div><!-- /collapse -->
                        </td>
                    </tr>

                </th:block>
            </tbody>

        </table>
    </div>
</div>


<style>
    #data-table.table-modern th,
    #data-table.table-modern td {
        vertical-align: top;
    }

    #data-table.table-modern thead th {
        font-weight: 600;
        letter-spacing: .2px;
    }

    .detail-row .detail-wrapper {
        padding: 14px 18px 18px 66px;
        /* deja “aire” y alinea con el botón */
        border-top: 1px dashed #e5e7eb;
        background: #fafafa;
    }

    .detail-item {
        border: 1px solid #eef0f3;
        background: #fff;
        border-radius: .5rem;
        padding: .75rem .9rem;
        transition: box-shadow .15s ease;
    }

    .detail-item:hover {
        box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
    }

    .code-badge {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-weight: 600;
        background: #f1f2f6;
        color: #333;
        border: 1px solid #e6e7ea;
    }

    .text-truncate-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        max-width: 100%;
    }

    .btn-toggle[aria-expanded="true"] i {
        transform: rotate(180deg);
        transition: transform .15s ease;
    }

    .btn-toggle i {
        transition: transform .15s ease;
    }
</style>


<script th:inline="none">
    document.addEventListener('DOMContentLoaded', () => {
        // Tooltips
        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));

        // DataTable
        const $table = $('#data-table');
        if ($.fn.DataTable.isDataTable($table)) { $table.DataTable().destroy(); }
        const dt = $table.DataTable({
            pageLength: 10,
            order: [[3, 'desc']], // usa 4 si quieres ordenar por "Fecha recepción"
            columnDefs: [
                { targets: [0, 5], orderable: false, searchable: false },
                { targets: [2, 3, 5], className: 'text-nowrap' }
            ],
            language: {
                sProcessing: "Procesando...",
                sLengthMenu: "Mostrar _MENU_ registros",
                sZeroRecords: "No se encontraron resultados",
                sInfo: "Mostrando _START_ a _END_ de _TOTAL_",
                sInfoEmpty: "Mostrando 0 a 0 de 0",
                sInfoFiltered: "(filtrado de _MAX_)",
                sSearch: "Buscar:",
                oPaginate: { sFirst: "Primero", sLast: "Último", sNext: "Siguiente", sPrevious: "Anterior" }
            }
        });

        // Cerrar otros detalles al abrir uno
        $table.on('show.bs.collapse', '.collapse', function () {
            $('.collapse.show').not(this).collapse('hide');
        });

        // Alternar icono del botón
        $table.on('shown.bs.collapse hidden.bs.collapse', '.collapse', function () {
            const id = this.id;
            const btn = document.querySelector(`.btn-toggle[data-bs-target="#${id}"] i`);
            if (btn) btn.style.transform = this.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        });
    });
</script>
