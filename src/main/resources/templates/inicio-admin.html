<!doctype html>

<html lang="en" class="light-style layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
    data-theme="theme-default" data-assets-path="../../assets/" data-template="vertical-menu-template">

<head th:replace="~{layout/head :: head}"></head>
<link rel="stylesheet" href="../../assets/css/config_general_publico.css" />
<link rel="preload" as="image" href="/assets/img/logo/activofijos.png" imagesrcset="/assets/img/logo/activofijos.png"
    fetchpriority="high" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<!-- VISTA PRINCIPAL LOGUEO ADMINISTRADORES -->

<body>
    <div class="layout-wrapper layout-content-navbar">
        <div class="layout-container">
            <aside th:replace="~{layout/sidebar :: sidebar}"></aside>
            <div class="layout-page">
                <nav th:replace="~{layout/topbar :: topbar}"></nav>
                <div class="content-wrapper">
                    <div class="container-xxl flex-grow-1 container-p-y" id="contenido">
                        <div class="layout-wrapper layout-content-navbar">
                            <div class="layout-container">
                                <div class="container">
                                    <div class="content-wrapper">
                                        <div class="card animated-card position-relative p-0 mb-4 overflow-hidden shadow-sm border-0"
                                            style="
                          min-height: 200px;
                          border-radius: 14px;
                          background: linear-gradient(
                            135deg,
                            rgba(30, 58, 138, 0.06),
                            rgba(185, 28, 28, 0.06)
                          );
                        ">
                                            <div class="position-absolute top-0 start-0 p-4 d-none d-sm-block">
                                                <img src="../../assets/img/logo/activofijos.png" alt="UAP" height="90"
                                                    class="logo-hover" />
                                            </div>
                                            <div class="position-absolute top-0 end-0 p-4 d-none d-sm-block">
                                                <img src="../../assets/img/logo/logoUap.png" alt="UAP" height="100"
                                                    class="logo-hover" />
                                            </div>
                                            <div
                                                class="card-body d-flex flex-column justify-content-center align-items-center text-center py-5 px-3">
                                                <div class="d-block d-sm-none text-center pb-3">
                                                    <img src="../../assets/img/logo/activofijos.png" alt="UAP"
                                                        height="60" class="logo-hover mx-1" />
                                                    <img src="../../assets/img/logo/logoUap.png" alt="UAP" height="65"
                                                        class="logo-hover mx-1" />
                                                </div>
                                                <h1 class="titulo-sistema mb-2 text-uppercase">
                                                    SAYOVE <span class="version">2.0</span>
                                                </h1>
                                                <p class="slogan mb-0 fst-italic d-sm-block">
                                                    Escribiendo una nueva historia con vos...
                                                </p>
                                            </div>
                                        </div>

                                        <div class="container-fluid mt-5 px-0">
                                            <div id="informacionActivosFijos"></div>
                                        </div>
                                        
                                        <footer th:replace="~{layout/footer :: footer}"></footer>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div th:if="${session.responsable == null}">
                            <div class="alert alert-warning mt-3" role="alert">
                                No tiene ninguna oficina asignada como responsable.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="globalLoader" aria-live="polite" aria-busy="true"></div>

    <div th:replace="~{layout/script :: script}"></div>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
    <script>
        (function () {
            /* ─────────────────────────────────────────────────────────
               1. INYECTAR CSS de animaciones directamente en el <head>
                  → ya no depende de que config_general_publico.css cargue
               ───────────────────────────────────────────────────────── */
            if (!document.getElementById("_loaderStyles")) {
                const s = document.createElement("style");
                s.id = "_loaderStyles";
                s.textContent = `
            @keyframes _spinY {
                from { transform: perspective(600px) rotateY(0deg); }
                to   { transform: perspective(600px) rotateY(360deg); }
            }
            @keyframes _spinX {
                from { transform: perspective(600px) rotateX(0deg); }
                to   { transform: perspective(600px) rotateX(360deg); }
            }
            @keyframes _fadeInMsg {
                from { opacity: 0; transform: translateY(4px); }
                to   { opacity: 1; transform: translateY(0); }
            }
 
            #globalLoader {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                background: rgba(255,255,255,0.55);
                backdrop-filter: blur(3px);
                -webkit-backdrop-filter: blur(3px);
            }
            html[data-theme="dark"] #globalLoader {
                background: rgba(10,18,35,0.62);
            }
            #globalLoader.show { display: flex; }
 
            #_loaderCard {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                background: #ffffff;
                border: 1px solid rgba(26,86,160,0.12);
                border-radius: 16px;
                padding: 28px 36px;
                box-shadow: 0 8px 32px rgba(26,86,160,0.14), 0 1px 4px rgba(0,0,0,0.06);
                min-width: 180px;
            }
            html[data-theme="dark"] #_loaderCard {
                background: #0d1a2e;
                border-color: rgba(74,144,217,0.18);
                box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            }
 
            #_loaderImg {
                width: 62px;
                height: 62px;
                object-fit: contain;
                will-change: transform;
                animation: _spinY 1.4s linear infinite;
            }
            @media (prefers-reduced-motion: reduce) {
                #_loaderImg { animation: none; opacity: 0.6; }
            }
 
            #_loaderBar {
                width: 120px;
                height: 3px;
                background: rgba(26,86,160,0.1);
                border-radius: 4px;
                overflow: hidden;
            }
            #_loaderBar::after {
                content: '';
                display: block;
                width: 40%;
                height: 100%;
                background: linear-gradient(90deg, #1a56a0, #4a90d9);
                border-radius: 4px;
                animation: _barSlide 1.4s ease-in-out infinite;
            }
            @keyframes _barSlide {
                0%   { margin-left: -40%; }
                60%  { margin-left: 100%; }
                100% { margin-left: 100%; }
            }
            html[data-theme="dark"] #_loaderBar::after {
                background: linear-gradient(90deg, #2563b0, #7ab3f0);
            }
 
            #_loaderMsg {
                font-size: 0.8rem;
                font-weight: 500;
                color: #374151;
                letter-spacing: 0.2px;
                transition: opacity 0.3s ease;
                white-space: nowrap;
            }
            html[data-theme="dark"] #_loaderMsg {
                color: #c9d4e8;
            }
            #_loaderMsg.fading { opacity: 0; }
        `;
                document.head.appendChild(s);
            }

            /* ─────────────────────────────────────────────────────────
               2. HELPERS
               ───────────────────────────────────────────────────────── */
            const _shuffle = (arr) =>
                arr
                    .map((v) => [Math.random(), v])
                    .sort((a, b) => a[0] - b[0])
                    .map((x) => x[1]);

            const _defaultMessages = [
                "Cargando datos…",
                "Un momento…",
                "Procesando…",
                "SAYOVE 2.0",
                "Kiwi estuvo aquí",
                "Preparando vista…",
                "Optimizando…",
            ];

            let _msgPool = [];
            let _msgIdx = 0;
            let _rotateTimer = null;
            let _slowTimer = null;
            let _fadeTimer = null;

            function _stopCycler() {
                clearInterval(_rotateTimer);
                clearTimeout(_slowTimer);
                clearTimeout(_fadeTimer);
                _rotateTimer = _slowTimer = _fadeTimer = null;
            }

            function _setMsg(text) {
                const el = document.getElementById("_loaderMsg");
                if (!el) return;
                el.classList.add("fading");
                _fadeTimer = setTimeout(() => {
                    el.textContent = text;
                    el.classList.remove("fading");
                }, 280);
            }

            function _startCycler(messages, everyMs, slowAfterMs) {
                _stopCycler();
                _msgPool = _shuffle(messages.length ? messages : _defaultMessages);
                _msgIdx = 0;
                _setMsg(_msgPool[0]);

                _rotateTimer = setInterval(() => {
                    _msgIdx = (_msgIdx + 1) % _msgPool.length;
                    _setMsg(_msgPool[_msgIdx]);
                }, everyMs);

                _slowTimer = setTimeout(() => {
                    clearInterval(_rotateTimer);
                    _rotateTimer = null;
                    _setMsg("Conexión lenta…");
                    const el = document.getElementById("_loaderMsg");
                    if (el) el.style.color = "#b91c1c";
                }, slowAfterMs);
            }

            /* ─────────────────────────────────────────────────────────
               3. API PÚBLICA — igual que antes, mismos nombres
               ───────────────────────────────────────────────────────── */

            /** Garantiza que el contenedor exista en el DOM */
            function ensureGlobalLoader() {
                if (!document.getElementById("globalLoader")) {
                    const div = document.createElement("div");
                    div.id = "globalLoader";
                    div.setAttribute("aria-live", "polite");
                    div.setAttribute("aria-busy", "true");
                    document.body.appendChild(div);
                }
            }

            /**
             * showGlobalLoader(opts)
             * opts.texto      — mensaje inicial
             * opts.axis       — 'x' | 'y'  (por defecto 'y' = gira horizontal)
             * opts.speed      — segundos por vuelta (por defecto 1.4)
             * opts.messages   — array de mensajes rotativos
             * opts.rotateEvery — ms entre mensajes (por defecto 3200)
             * opts.slowAfter  — ms para marcar "conexión lenta" (por defecto 12000)
             */
            function showGlobalLoader(opts = {}) {
                ensureGlobalLoader();
                const el = document.getElementById("globalLoader");

                const axis = opts.axis === "x" ? "_spinX" : "_spinY";
                const speed = opts.speed ?? 1.4;
                const texto = opts.texto ?? "Cargando…";

                el.innerHTML = `
            <div id="_loaderCard">
                <img id="_loaderImg"
                     src="${opts.svg || "/assets/img/logo/activofijos.png"}"
                     alt="Cargando"
                     style="animation-name:${axis};animation-duration:${speed}s;"
                     onerror="this.style.display='none'" />
                <div id="_loaderBar"></div>
                <span id="_loaderMsg">${texto}</span>
            </div>`;

                el.classList.add("show");
                el.setAttribute("aria-busy", "true");
                document.documentElement.style.overflow = "hidden";

                _startCycler(
                    opts.messages || _defaultMessages,
                    opts.rotateEvery ?? 3200,
                    opts.slowAfter ?? 12000,
                );
            }

            function hideGlobalLoader() {
                _stopCycler();
                const el = document.getElementById("globalLoader");
                if (!el) return;
                el.classList.remove("show");
                el.innerHTML = "";
                el.setAttribute("aria-busy", "false");
                document.documentElement.style.overflow = "";
                // Limpia color de "lenta" por si quedó
                const msg = document.getElementById("_loaderMsg");
                if (msg) msg.style.color = "";
            }

            /* ── Exposición global (igual que antes) ───────────── */
            window.ensureGlobalLoader = ensureGlobalLoader;
            window.showGlobalLoader = showGlobalLoader;
            window.hideGlobalLoader = hideGlobalLoader;

            /* Compatibilidad: spinnerHTML ya no es necesario pero
               se mantiene por si algún fragmento lo usa directamente */
            window.spinnerHTML = function ({ texto = "Cargando…" } = {}) {
                return `<span id="_loaderMsg">${texto}</span>`;
            };
        })();
    </script>
</body>

</html>
