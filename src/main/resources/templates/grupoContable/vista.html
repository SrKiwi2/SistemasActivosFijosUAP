<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Grupo Contable</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioGrupoContable" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalGrupoContable"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: '/administracion/grupoc/tabla-registros?source=dbf' + (q ? '&q=' + encodeURIComponent(q) : ''),  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            },
            error: function () {
                $("#tablaRegistro").html(`
                <div class="alert alert-danger m-3">
                Ocurrió un error al cargar la tabla.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarTabla()">Reintentar</button>
                </div>
            `);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/grupoc/formulario", "#contenidoModalGrupoContable", "#formularioGrupoC");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/grupoc/formulario-edit", "#contenidoModalGrupoContable", "#formularioGrupoC");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/grupoc/eliminar", cargarTabla);
    }
</script>
