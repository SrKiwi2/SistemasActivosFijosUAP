<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Grupo Contable</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioGrupoContable" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalGrupoContable"></div>
    </div>
</div>

<div class="modal fade" id="modalImportDbf" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form id="formImportDbf" class="modal-content" enctype="multipart/form-data" autocomplete="off">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fa-solid fa-file-import me-2"></i>Importar Codigo Contable desde DBF
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Archivo .dbf</label>
                    <input type="file" class="form-control" name="file" accept=".dbf" required />
                    <div class="form-text">Selecciona el archivo <b>unidadadmin.dbf</b> u otro con la misma estructura.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Codificación (charset)</label>
                    <select class="form-select" name="charset">
                        <option value="windows-1252" selected>Windows-1252 (recomendado)</option>
                        <option value="ISO-8859-1">ISO-8859-1</option>
                        <option value="UTF-8">UTF-8</option>
                    </select>
                    <div class="form-text">Si ves caracteres raros, prueba ISO-8859-1 o UTF-8.</div>
                </div>

                <div id="importProgress" class="d-none">
                    <div class="alert alert-info py-2">
                        <i class="fa-solid fa-spinner fa-spin me-2"></i> Importando… por favor espera.
                    </div>
                </div>

                <div id="importResult" class="d-none"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-play me-1"></i> Iniciar importación
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: '/administracion/grupoc/tabla-registros?source=dbf' + (q ? '&q=' + encodeURIComponent(q) : ''),  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            },
            error: function () {
                $("#tablaRegistro").html(`
                <div class="alert alert-danger m-3">
                Ocurrió un error al cargar la tabla.
                <button class="btn btn-sm btn-outline-light ms-2" onclick="cargarTabla()">Reintentar</button>
                </div>
            `);
            },
            complete: function () {
                hideGlobalLoader();
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/grupoc/formulario", "#contenidoModalGrupoContable", "#formularioGrupoC");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/grupoc/formulario-edit", "#contenidoModalGrupoContable", "#formularioGrupoC");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/grupoc/eliminar", cargarTabla);
    }

    document.getElementById('btnSync').addEventListener('click', function () {
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;

        $.ajax({
            type: 'POST',
            url: '/administracion/grupoc/sync-from-mounted',
            beforeSend: function (xhr) { if (token && header) xhr.setRequestHeader(header, token); },
            success: function (res) {
                Swal.fire('Listo', `Leídas: ${res.totalLeidas}<br>Insertados: ${res.insertados}<br>Actualizados: ${res.actualizados}`, 'success');
                cargarTabla(); // refresca tu tabla
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || 'Error al sincronizar';
                Swal.fire('Error', msg, 'error');
            }
        });
    });

</script>
