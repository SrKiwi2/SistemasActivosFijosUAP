<div class="modal-header">
    <h4 class="modal-title" th:text="${edit}? 'Modificar Nacionalidad' : 'Registrar Nacionalidad'"></h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioNacionalidad" method="post"
    th:action="${edit}? @{/administracion/nacionalidad/modificar-nacionalidad} : @{/administracion/nacionalidad/registrar-nacionalidad}" novalidate>
    <input type="hidden" th:if="${edit != null}" th:field="${nacionalidad.idNacionalidad}">
    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label" for="modalEditUserLastName">Nacionalidad</label>
                <input type="text" th:field="${nacionalidad.nombre}" class="form-control" placeholder="..."
                    required />
                <div class="valid-feedback">Correcto!</div>
                <div class="invalid-feedback">Porfavor Introduzca un dato valido.</div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-12">
                <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal">Cancelar</a>
                <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">

            </div>
        </div>
    </div>
</form>

<script>
    manejarEnvioFormulario('#formularioNacionalidad');
</script>
