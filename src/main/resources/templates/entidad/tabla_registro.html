<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Entidad - Institución</h5>
        <div class="d-flex gap-2 align-items-center">
            <!-- Badge con información de última sincronización -->
            <span class="badge bg-info" id="ultimaSync" 
                  data-bs-toggle="tooltip" 
                  data-bs-placement="bottom"
                  th:title="'Procesados: ' + (${registrosProcesados ?: 0}) + ' | Nuevos: ' + (${registrosNuevos ?: 0}) + ' | Actualizados: ' + (${registrosActualizados ?: 0}) + ' | Duración: ' + (${duracionUltimaSync ?: 0}) + 's'">
                <i class="fa-solid fa-clock me-1"></i>
                Última sync: <span th:text="${ultimaSincronizacion ?: 'Nunca'}">--</span>
            </span>
            
            <!-- Badge de estado -->
            <span class="badge" 
                  th:classappend="${estadoSync == 'COMPLETADO'} ? 'bg-success' : (estadoSync == 'ERROR' ? 'bg-danger' : 'bg-warning')"
                  th:text="${estadoSync ?: 'PENDIENTE'}">
            </span>
            
            <!-- Botón sincronización incremental -->
            <button id="btnSyncEntidad" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-sync me-1"></i> Sincronizar
            </button>
            
            <!-- Botón sincronización completa -->
            <button id="btnSyncCompleto" class="btn btn-outline-warning btn-sm"
                    data-bs-toggle="tooltip" 
                    data-bs-placement="bottom"
                    title="Forzar sincronización completa (más lento)">
                <i class="fa-solid fa-database me-1"></i> Sync Completo
            </button>
        </div>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Código</th>
                    <th>Nombre Entidad</th>
                    <th>Sigla</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
                <tr th:each="entidad, index: ${listasEntidades}">
                    <th th:text="${index.index+1}"></th>
                    <th th:text="${entidad.entidadCodigo}"></th>
                    <th th:text="${entidad.descripcion}"></th>
                    <th th:text="${entidad.sigla}"></th>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    $(document).on('click', '#btnSyncEntidad', function () {
        sincronizar(false);
    });

    $(document).on('click', '#btnSyncCompleto', function () {
        Swal.fire({
            title: '¿Forzar sincronización completa?',
            text: "Esto procesará todos los registros y puede tardar más tiempo",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Sí, sincronizar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                sincronizar(true);
            }
        });
    });

    function sincronizar(forzarCompleto) {
        Swal.fire({
            title: 'Sincronizando...',
            html: 'Por favor espere',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        $.ajax({
            type: 'POST',
            url: "/administracion/entidad/sync-from-mounted",
            data: { forzarCompleto: forzarCompleto },
            success: function (res) {
                const tiempoSegundos = (res.duracionMs / 1000).toFixed(2);
                const msg = `
                    <div class="text-start">
                        <p><strong>✅ Sincronización exitosa</strong></p>
                        <hr>
                        <p><i class="fa-solid fa-file-import"></i> Total leídas: <strong>${res.totalLeidas}</strong></p>
                        <p><i class="fa-solid fa-plus-circle text-success"></i> Insertados: <strong>${res.insertados}</strong></p>
                        <p><i class="fa-solid fa-edit text-primary"></i> Actualizados: <strong>${res.actualizados}</strong></p>
                        <p><i class="fa-solid fa-check-circle text-info"></i> Omitidos (sin cambios): <strong>${res.omitidos}</strong></p>
                        <p><i class="fa-solid fa-clock"></i> Tiempo: <strong>${tiempoSegundos}s</strong></p>
                    </div>
                `;
                
                Swal.fire({
                    title: 'Completado',
                    html: msg,
                    icon: 'success',
                    confirmButtonText: 'Aceptar'
                });
                
                // Actualizar badge de última sincronización
                const ahora = new Date();
                const fechaFormateada = ahora.toLocaleString('es-BO');
                $('#ultimaSync span').text(fechaFormateada);
                
                // Recargar tabla
                cargarTabla();
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                Swal.fire('Error', msg, 'error');
            }
        });
    }

    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });

</script>
