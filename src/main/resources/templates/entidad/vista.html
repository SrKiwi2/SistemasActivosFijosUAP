<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Entidad - Institución</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioEntidad" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalEntidad"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function initDataTable() {
        const $tbl = $('#data-table');
        if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();
        $tbl.DataTable({ language: {/* tu traducción */ } });
    }

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });
        $.ajax({
            type: 'POST',
            url: "/administracion/entidad/tabla-registros" + (q ? ('?q=' + encodeURIComponent(q)) : ''),
            success: function (html) {
                $("#tablaRegistro").html(html);
                initDataTable();
            },
            error: function (xhr) {
                $("#tablaRegistro").html(`<div class="alert alert-danger m-3">Error cargando tabla</div>`);
                console.error('tabla-registros entidad', xhr.status, xhr.responseText);
            },
            complete: hideGlobalLoader
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/entidad/formulario", "#contenidoModalEntidad", "#formularioEntidad");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/entidad/formulario-edit", "#contenidoModalEntidad", "#formularioEntidad");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/entidad/eliminar", cargarTabla);
    }
</script>
