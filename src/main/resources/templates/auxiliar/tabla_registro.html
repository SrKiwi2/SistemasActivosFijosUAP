<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Auxiliar</h5>
        <small class="text-muted" th:if="${sourceUsed=='dbf'}">(fuente: DBF)</small>
        <small class="text-muted" th:if="${sourceUsed=='db'}">(fuente: BD)</small>
        <div class="d-flex gap-2">
            <button id="btnSyncAux" class="btn btn-outline-secondary">
                <i class="fa-solid fa-file-import me-1"></i> Importar desde DBF montado
            </button>
            <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
                data-bs-target="#modalFormularioAuxiliar">
                <i class="fa-solid fa-user-plus"></i> Agregar Auxiliar
            </button>
        </div>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Entidad</th>
                    <th>Unidad</th>
                    <th>Codigo Contable</th>
                    <th>Codigo Auxiliar</th>
                    <th>Nombre Auxiliar</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
                <tr th:each="auxiliar, index: ${listasAuxiliares}">
                    <th th:text="${index.index+1}"></th>
                    <th th:text="${auxiliar.predio.entidad.entidadCodigo}"></th>
                    <th th:text="${auxiliar.predio.unidad}"></th>
                    <th th:text="${auxiliar.grupoContable.codContable}"></th>
                    <th th:text="${auxiliar.codAux}"></th>
                    <th th:text="${auxiliar.nombre}"></th>
                    <th>
                        <button type="button" class="btn btn-sm btn-primary"
                            th:onclick="cargarFormularioEdit([[${id_encryptado[__${index.index}__]}]])"
                            data-bs-toggle="modal" data-bs-target="#modalFormularioAuxiliar">
                            <i class="fa-solid fa-pen-to-square"></i> Editar
                        </button>
                        <button type="button" class="btn btn-sm btn-danger"
                            th:onclick="eliminar([[${auxiliar.nombre}]],[[${id_encryptado[__${index.index}__]}]])">
                            <i class="fa-solid fa-trash"></i> Eliminar
                        </button>
                    </th>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });

    $(document).on('click', '#btnSyncAux', function () {
        $.ajax({
            type: 'POST',
            url: "/administracion/auxiliar/sync-from-mounted",
            success: function (res) {
                Swal.fire('Listo',
                    `Leídas: ${res.totalLeidas}<br>Insertados: ${res.insertados}<br>Actualizados: ${res.actualizados}<br>Sin entidad: ${res.sinEntidad}<br>Sin predio: ${res.sinPredio}<br>Sin grupo: ${res.sinGrupoContable}`,
                    'success');
                cargarTabla();
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                Swal.fire('Error', msg, 'error');
            }
        });
    });
</script>
