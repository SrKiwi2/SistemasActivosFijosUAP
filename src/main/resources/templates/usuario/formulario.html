<div class="modal-header">
    <h4 class="modal-title" th:text="${edit}? 'Modificar Usuario' : 'Registrar Usuario'"></h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioUsuario" method="post"
    th:action="${edit}? @{/administracion/usuario/modificar-usuario} : @{/administracion/usuario/registrar-usuario}" novalidate>
    
    <input type="hidden" th:if="${edit != null}" name="idUsuario" th:value="${usuario.idUsuario}">
    
    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-6">
                <label class="form-label" for="usuario">Nombre de Usuario</label>
                <input type="text" 
                       id="usuario" 
                       name="usuario"
                       th:value="${usuario != null ? usuario.usuario : ''}"
                       class="form-control"
                       placeholder="Introduzca un nombre de usuario" 
                       required />
                <div class="valid-feedback">Correcto!</div>
                <div class="invalid-feedback">Por favor Introduzca un Nombre.</div>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" 
                       id="password" 
                       name="password"
                       class="form-control"
                       placeholder="Introduzca una contraseña" 
                       required />
                <div class="valid-feedback">Correcto!</div>
                <div class="invalid-feedback">Por favor Introduzca una Contraseña.</div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6">
                <label for="select2Basic" class="form-label">Persona</label>
                <select id="select2Basic" 
                        name="persona.idPersona"
                        class="select2 form-select form-select-lg" 
                        data-allow-clear="true"
                        required>
                    <option value="">Seleccione una persona</option>
                    <option th:each="persona : ${listaPersonas}" 
                            th:value="${persona.idPersona}"
                            th:selected="${usuario != null && usuario.persona != null && persona.idPersona == usuario.persona.idPersona}"
                            th:text="${persona.nombreCompleto + ' - ' + persona.ci}">
                    </option>
                </select>
                <div class="valid-feedback">Correcto!</div>
                <div class="invalid-feedback">Debe seleccionar a una persona.</div>
            </div>
            <div class="col-12 col-md-6">
                <label for="select2Primary" class="form-label">Roles</label>
                <div class="select2-primary">
                    <select id="select2Primary" 
                            name="rol.idRol"
                            class="select2 form-select"
                            required>
                        <option value="">Seleccione un rol</option>
                        <option th:each="rol: ${listaRoles}" 
                                th:value="${rol.idRol}" 
                                th:text="${rol.nombre}"
                                th:selected="${usuario != null && usuario.rol != null && rol.idRol == usuario.rol.idRol}">
                        </option>
                    </select>
                    <div class="valid-feedback">Correcto!</div>
                    <div class="invalid-feedback">Debe seleccionar un rol.</div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-12">
                <a type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</a>
                <button type="submit" class="btn btn-success" th:text="${edit}? 'Guardar Cambios': 'Guardar Registro'"></button>
            </div>
        </div>
    </div>
</form>

<script>
    manejarEnvioFormulario('#formularioUsuario');
</script>
