<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Persona</h5>
        <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
            data-bs-target="#modalFormularioPersona">
            <i class="fa-solid fa-user-plus"></i> Agregar Persona
        </button>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>NOMBRE</th>
                    <th>PATERNO</th>
                    <th>MATERNO</th>
                    <th>C.I.</th>
                    <th>OPCIONES</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script>
    $(function() {
  const tbl = $('#data-table').DataTable({
    processing: true,
    serverSide: true,
    deferRender: true,
    pageLength: 25,
    lengthMenu: [10,25,50,100],
    ordering: true,
    searching: true,
    ajax: {
      url: '/administracion/persona/api/datatables',
      type: 'POST'
    },
    columns: [
      { // índice
        data: null,
        orderable: false,
        searchable: false,
        render: (data, type, row, meta) => meta.row + meta.settings._iDisplayStart + 1
      },
      { data: 'nombre'  },
      { data: 'paterno' },
      { data: 'materno' },
      { data: 'ci'      },
      { // acciones
        data: 'idEnc',
        orderable: false,
        searchable: false,
        render: (idEnc) => `
          <div class="btn-group btn-group-sm">
            <button class="btn btn-primary"
                    onclick="cargarFormularioEdit('${idEnc}')"
                    data-bs-toggle="modal"
                    data-bs-target="#modalFormularioPersona">
              <i class="fa-solid fa-pen-to-square"></i> Editar
            </button>
            <button class="btn btn-danger"
                    onclick="eliminar('PERSONA', '${idEnc}')">
              <i class="fa-solid fa-trash"></i> Eliminar
            </button>
          </div>`
      }
    ],
    language: {
      sProcessing:    "Procesando...",
      sLengthMenu:    "Mostrar _MENU_ registros",
      sZeroRecords:   "No se encontraron resultados",
      sInfo:          "Mostrando _START_ a _END_ de _TOTAL_",
      sInfoEmpty:     "Mostrando 0 a 0 de 0",
      sInfoFiltered:  "(filtrado de _MAX_ en total)",
      sSearch:        "Buscar:",
      oPaginate: { sFirst:"Primero", sLast:"Último", sNext:"Siguiente", sPrevious:"Anterior" }
    }
  });

  // (Opcional) Debounce en la caja de búsqueda para reducir llamadas
  let searchTimer;
  $('#data-table_filter input').off().on('input', function() {
    clearTimeout(searchTimer);
    const val = this.value;
    searchTimer = setTimeout(() => tbl.search(val).draw(), 250);
  });
});
</script>
