<div class="modal-header">
    <h4 class="modal-title" th:text="${edit}? 'Modificar Oficina' : 'Registrar Oficina'"></h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioOficina" method="post"
    th:action="${edit} ? @{/administracion/oficina/modificar-oficina} : @{/administracion/oficina/registrar-oficina}"
    th:object="${oficina}" novalidate>

    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Nombre Oficina</label>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="..." required />
                <div class="invalid-feedback">Por favor introduzca un dato válido.</div>
            </div>

            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Código oficina</label>
                <input type="number" th:field="*{codOfi}" class="form-control" min="0" step="1" required />
                <div class="invalid-feedback">Por favor introduzca un código válido.</div>
            </div>

            <div class="col-12 col-md-4">
                <label class="form-label">Predio</label>
                <!-- bindea por id -->
                <select class="select2 form-select" th:field="*{predio.idPredio}" required>
                    <option value="" disabled>Seleccione...</option>
                    <option th:each="p : ${predios}" th:value="${p.idPredio}"
                        th:text="${p.nombre} + ' - ' + ${p.prefijo}"></option>
                </select>
                <div class="invalid-feedback">Debe seleccionar un predio.</div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-12">
                <label class="form-label">Observaciones (opcional)</label>
                <textarea th:field="*{observ}" class="form-control" rows="2" maxlength="500"></textarea>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar cambios' : 'Guardar registro'" />
    </div>
</form>


<script>
    manejarEnvioFormulario('#formularioOficina');
</script>
