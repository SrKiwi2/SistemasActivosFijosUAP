<div class="modal-header">
    <h4 class="modal-title" th:text="${edit}? 'Modificar Oficina' : 'Registrar Oficina'"></h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>

<form id="formularioOficina" method="post"
    th:action="${edit} ? @{/administracion/oficina/modificar-oficina} : @{/administracion/oficina/registrar-oficina}"
    th:object="${oficina}" novalidate>

    <!-- Campo oculto para ID (solo en edición) -->
    <input type="hidden" th:if="${edit != null}" th:field="*{idOficina}" name="idOficina">

    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Predio</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-building"></i></span>
                    <select class="select2 form-select" th:field="*{predio.idPredio}" id="selectPredio" required>
                        <option value="">Seleccione...</option>
                        <option th:each="p : ${predios}" th:value="${p.idPredio}"
                            th:text="${p.descrip} + ' - ' + ${p.codigo}"></option>
                    </select>
                </div>
                <div class="invalid-feedback">Debe seleccionar un predio.</div>
            </div>

            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Código oficina</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                    <input type="number" th:field="*{codOfi}" class="form-control" id="inputCodOfi" min="1" max="32767"
                        step="1" required placeholder="Ej: 1" />
                </div>
                <div class="invalid-feedback">Por favor introduzca un código válido (1-32767).</div>
            </div>

            <div class="col-12 col-md-4 mb-2">
                <label class="form-label">Nombre Oficina</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-regular fa-building"></i></span>
                    <input type="text" th:field="*{nombre}" class="form-control"
                        placeholder="Ej: Dirección de Recursos Humanos" required maxlength="255" />
                </div>
                <div class="invalid-feedback">Por favor introduzca un nombre válido.</div>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fa-solid fa-xmark me-1"></i> Cancelar
        </button>
        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk me-1"></i>
            <span th:text="${edit}? 'Guardar cambios' : 'Guardar registro'"></span>
        </button>
    </div>
</form>

<script>
    manejarEnvioFormulario('#formularioOficina');

    $(document).ready(function () {
        // Escucha los cambios en el select del predio
        $('#selectPredio').on('change', function () {
            var idPredio = $(this).val();
            var $inputCodOfi = $('#inputCodOfi');

            // Si se seleccionó un predio
            if (idPredio) {
                // Deshabilitar temporalmente el campo mientras se carga
                $inputCodOfi.prop('disabled', true).val('Cargando...');

                // Llama al endpoint REST creado
                $.ajax({
                    url: '/administracion/oficina/siguiente-codigo/' + idPredio,
                    type: 'GET',
                    dataType: 'json',
                    success: function (siguienteCodigo) {
                        // Si la petición es exitosa, establece el valor
                        $inputCodOfi.val(siguienteCodigo);
                    },
                    error: function (xhr, status, error) {
                        console.error("Error al obtener el siguiente código:", error);
                        // Opcional: mostrar un mensaje de error al usuario
                        $inputCodOfi.val('');
                        alert('Error al obtener el código correlativo.');
                    },
                    complete: function () {
                        // Vuelve a habilitar el campo al finalizar (éxito o error)
                        $inputCodOfi.prop('disabled', false);
                    }
                });
            } else {
                // Si no se seleccionó nada, vaciar el campo
                $inputCodOfi.val('');
            }
        });

        // IMPORTANTE: En modo de EDICIÓN, si ya tienes un valor, no lo sobrescribas.
        // Solo aplica esta lógica si es un NUEVO registro (y no estás en modo edición)
        // o si el campo codOfi está vacío.

    });
</script>
