<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Oficina</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioOficina" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="prediocontenidoModalOficina"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function initDataTable() {
        const $tbl = $('#data-table');
        if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();
        // Inicializa
        const table = $tbl.DataTable({
            destroy: true,           // cinturón y tirantes
            orderCellsTop: true,     // 2 filas de thead (filtros en la 2ª)
            language: {
                sProcessing: "Procesando...",
                sLengthMenu: "Mostrar _MENU_ registros",
                sZeroRecords: "No se encontraron resultados",
                sInfo: "Mostrando del _START_ al _END_ de _TOTAL_ registros",
                sInfoEmpty: "Mostrando 0 de 0 registros",
                sInfoFiltered: "(filtrado de _MAX_ registros)",
                sSearch: "Buscar general:",
                sLoadingRecords: "Cargando...",
                oPaginate: { sFirst: "Primero", sLast: "Último", sNext: "Siguiente", sPrevious: "Anterior" }
            }
        });

        // (Re)conecta los inputs del 2º thead a las columnas 1..4
        $tbl.find('thead tr:eq(1) th').each(function (i) {
            const $input = $('input', this);
            $input.off('.dt'); // evita duplicar handlers
            $input.on('keyup.dt change.dt', function () {
                if (table.column(i).search() !== this.value) {
                    table.column(i).search(this.value).draw();
                }
            });
        });
    }

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });

        $.ajax({
            type: 'POST',
            url: "/administracion/oficina/tabla-registros" + (q ? ('?q=' + encodeURIComponent(q)) : ''),
            success: function (html) { $("#tablaRegistro").html(html); initDataTable(); },
            error: function (xhr) { $("#tablaRegistro").html(`<div class="alert alert-danger m-3">Error cargando tabla</div>`); },
            complete: hideGlobalLoader
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/oficina/formulario", "#prediocontenidoModalOficina", "#formularioOficina");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/oficina/formulario-edit", "#prediocontenidoModalOficina", "#formularioOficina");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/oficina/eliminar", cargarTabla);
    }
</script>
