<div class="card">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registro Oficina</h5>
        <div class="d-flex gap-2 align-items-center">
            <!-- ✅ Badge con información de última sincronización -->
            <span class="badge bg-info" id="ultimaSync" data-bs-toggle="tooltip" data-bs-placement="bottom"
                th:title="'Procesados: ' + (${registrosProcesados ?: 0}) + ' | Nuevos: ' + (${registrosNuevos ?: 0}) + ' | Actualizados: ' + (${registrosActualizados ?: 0}) + ' | Duración: ' + (${duracionUltimaSync ?: 0}) + 's'">
                <i class="fa-solid fa-clock me-1"></i>
                Última sync: <span th:text="${ultimaSincronizacion ?: 'Nunca'}">--</span>
            </span>

            <!-- ✅ Badge de estado -->
            <span class="badge" id="estadoSyncBadge"
                th:classappend="${estadoSync == 'COMPLETADO'} ? 'bg-success' : (${estadoSync == 'ERROR'} ? 'bg-danger' : 'bg-warning')"
                th:text="${estadoSync ?: 'PENDIENTE'}">
            </span>

            <!-- ✅ Botón sincronización incremental -->
            <button id="btnSyncOficina" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-sync me-1"></i> Sincronizar
            </button>

            <!-- ✅ Botón sincronización completa -->
            <button id="btnSyncCompleto" class="btn btn-outline-warning btn-sm" data-bs-toggle="tooltip"
                data-bs-placement="bottom" title="Forzar sincronización completa (más lento)">
                <i class="fa-solid fa-database me-1"></i> Sync Completo
            </button>

            <!-- Botón agregar -->
            <button type="button" class="btn btn-primary btn-sm" onclick="cargarFormulario()" data-bs-toggle="modal"
                data-bs-target="#modalFormularioOficina">
                <i class="fa-solid fa-user-plus"></i> Agregar Oficina
            </button>
        </div>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Entidad</th>
                    <th>Unidad</th>
                    <th>Código Oficina</th>
                    <th>Nombre Oficina</th>
                    <th class="text-center">Opciones</th>
                </tr>
                <tr>
                    <th></th>
                    <th><input type="text" placeholder="Buscar entidad" class="form-control form-control-sm" /></th>
                    <th><input type="text" placeholder="Buscar unidad" class="form-control form-control-sm" /></th>
                    <th><input type="text" placeholder="Buscar código" class="form-control form-control-sm" /></th>
                    <th><input type="text" placeholder="Buscar nombre" class="form-control form-control-sm" /></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="oficina, index: ${listasOficinas}">
                    <td th:text="${index.index + 1}"></td>
                    <td>
                        <!-- ✅ Mostrar código de entidad -->
                        <span th:if="${oficina?.predio?.entidad != null}"
                            th:text="${oficina.predio.entidad.entidadCodigo}" class="badge bg-primary">
                        </span>
                        <span th:if="${oficina?.predio?.entidad == null}" class="text-muted">
                            —
                        </span>
                    </td>
                    <td th:text="${oficina?.predio?.unidad ?: '—'}"></td>
                    <td>
                        <span class="badge bg-secondary" th:text="${oficina.codOfi}"></span>
                    </td>
                    <td th:text="${oficina.nombre}"></td>
                    <td class="text-center">
                        <!-- ✅ Botones solo si tiene ID (existe en BD) -->
                        <div th:if="${oficina.idOficina != null}" class="btn-group btn-group-sm" role="group">
                            <button type="button" class="btn btn-primary btn-editar-oficina"
                                th:data-id="${id_encryptado[index.index]}" data-bs-toggle="modal"
                                data-bs-target="#modalFormularioOficina" title="Editar oficina">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button type="button" class="btn btn-danger btn-eliminar-oficina"
                                th:data-id="${id_encryptado[index.index]}" th:data-nombre="${oficina.nombre}"
                                title="Eliminar oficina">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>

                        <!-- ✅ Si NO tiene ID (viene del DBF), mostrar mensaje -->
                        <div th:if="${oficina.idOficina == null}">
                            <span class="badge bg-warning" data-bs-toggle="tooltip"
                                title="Registro solo lectura desde DBF. Sincronice para poder editar.">
                                <i class="fa-solid fa-lock"></i> Solo lectura
                            </span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>

    $(document).ready(function() {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    });

    $(document).on('click', '.btn-editar-oficina', function() {
        const idEncriptado = $(this).data('id');
        cargarFormularioEdit(idEncriptado);
    });

    $(document).on('click', '.btn-eliminar-oficina', function() {
        const idEncriptado = $(this).data('id');
        const nombre = $(this).data('nombre');
        eliminar(nombre, idEncriptado);
    });

    $(document).on('click', '#btnSyncOficina', function () {
        sincronizar(false);
    });

    $(document).on('click', '#btnSyncCompleto', function () {
        Swal.fire({
            title: '¿Forzar sincronización completa?',
            text: "Esto procesará todos los registros y puede tardar más tiempo",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Sí, sincronizar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                sincronizar(true);
            }
        });
    });

    function sincronizar(forzarCompleto) {
        Swal.fire({
            title: 'Sincronizando Oficinas...',
            html: 'Por favor espere',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        $.ajax({
            type: 'POST',
            url: "/administracion/oficina/sync-from-mounted",
            data: { forzarCompleto: forzarCompleto },
            success: function (res) {
                const tiempoSegundos = (res.duracionMs / 1000).toFixed(2);
                const msg = `
                        <div class="text-start">
                            <p><strong>✅ Sincronización de Oficinas exitosa</strong></p>
                            <hr>
                            <p><i class="fa-solid fa-file-import"></i> Total leídas: <strong>${res.totalLeidas}</strong></p>
                            <p><i class="fa-solid fa-plus-circle text-success"></i> Insertados: <strong>${res.insertados}</strong></p>
                            <p><i class="fa-solid fa-edit text-primary"></i> Actualizados: <strong>${res.actualizados}</strong></p>
                            <p><i class="fa-solid fa-check-circle text-info"></i> Omitidos (sin cambios): <strong>${res.omitidos}</strong></p>
                            <p><i class="fa-solid fa-exclamation-triangle text-warning"></i> Sin entidad: <strong>${res.sinEntidad}</strong></p>
                            <p><i class="fa-solid fa-exclamation-triangle text-warning"></i> Sin predio: <strong>${res.sinPredio}</strong></p>
                            <p><i class="fa-solid fa-clock"></i> Tiempo: <strong>${tiempoSegundos}s</strong></p>
                        </div>
                    `;

                Swal.fire({
                    title: 'Completado',
                    html: msg,
                    icon: 'success',
                    confirmButtonText: 'Aceptar'
                });

                // ✅ Actualizar badge
                actualizarInfoSync();

                // Recargar tabla
                cargarTabla();
            },
            error: function (xhr) {
                const msg = xhr.responseJSON?.message || `Error (${xhr.status})`;
                Swal.fire('Error en Sincronización', msg, 'error');
            }
        });
    }

    // ✅ Función para actualizar los badges sin recargar la página
    function actualizarInfoSync() {
        $.ajax({
            type: 'GET',
            url: '/administracion/oficina/sync-info',
            success: function (info) {
                $('#ultimaSync span').text(info.ultimaSincronizacion);

                const tooltip = `Procesados: ${info.registrosProcesados || 0} | Nuevos: ${info.registrosNuevos || 0} | Actualizados: ${info.registrosActualizados || 0} | Duración: ${info.duracionSegundos || 0}s`;
                $('#ultimaSync').attr('data-bs-original-title', tooltip);

                const badgeEstado = $('#estadoSyncBadge');
                badgeEstado.removeClass('bg-success bg-danger bg-warning');

                if (info.estado === 'COMPLETADO') {
                    badgeEstado.addClass('bg-success');
                } else if (info.estado === 'ERROR') {
                    badgeEstado.addClass('bg-danger');
                } else {
                    badgeEstado.addClass('bg-warning');
                }

                badgeEstado.text(info.estado);
            }
        });
    }
</script>
