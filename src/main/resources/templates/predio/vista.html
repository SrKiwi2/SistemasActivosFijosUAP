<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Predio</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioPredio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="prediocontenidoModalPredio"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function initDataTable() {
        const $tbl = $('#data-table');
        if ($.fn.DataTable.isDataTable($tbl)) $tbl.DataTable().destroy();
        $tbl.DataTable({ language: {/* tu traducción */ } });
    }

    function cargarTabla(q) {
        showGlobalLoader({ imgUrl: '/assets/img/logo/activofijos.png', axis: 'y', speed: 1.2, texto: 'Cargando...' });

        $.ajax({
            type: 'POST',
            url: "/administracion/predio/tabla-registros" + (q ? ('?q=' + encodeURIComponent(q)) : ''),
            success: function (html) { $("#tablaRegistro").html(html); initDataTable(); },
            error: function (xhr) { $("#tablaRegistro").html(`<div class="alert alert-danger m-3">Error cargando tabla</div>`); },
            complete: hideGlobalLoader
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/administracion/predio/formulario", "#prediocontenidoModalPredio", "#formularioPredio");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/administracion/predio/formulario-edit", "#prediocontenidoModalPredio", "#formularioPredio");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/administracion/predio/eliminar", cargarTabla);
    }
</script>
