    <script>
        $.ajaxSetup({
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });

        var botonPulsado;
        $(document).ready(function () {

            if (document.body.dataset.ctx === "admin" && $("#contenido").length) {
                cargarContenido("/adm/inicio");
            }

            // 2. Diccionario: Mapeamos cada ID con su URL correspondiente
            const rutasMenu = {
                "opcion_rol": "/administracion/rol/vista",
                "opcion_usuario": "/administracion/usuario/vista",
                "opcion_persona": "/administracion/persona/vista",
                "opcion_nacionalidad": "/administracion/nacionalidad/vista",
                "opcion_genero": "/administracion/genero/vista",
                "opcion_entidad": "/administracion/entidad/vista",
                "opcion_municipio": "/administracion/municipio/vista",
                "opcion_predio": "/administracion/predio/vista",
                "opcion_oficina": "/administracion/oficina/vista",
                "opcion_activo": "/administracion/activo/vista",
                "opcion_activop": "/administracion/activo/vistap",
                "opcion_contable": "/administracion/grupoc/vista",
                "opcion_auxiliar": "/administracion/auxiliar/vista",
                "opcion_of": "/administracion/organismo/vista",
                "opcion_estadoA": "/administracion/estadoa/vista",
                "opcion_responsable": "/administracion/responsable/vista",
                "opcion_iaa": "/seguimiento-activo/vista_ingreso_ajeno",
                "opcion_aan": "/seguimiento-activo/vista_activos_nuevos",
                "opcion_ta": "/seguimiento-activo/vista_transferencia_activos",
                "opcion_ba": "/seguimiento-activo/vista_bajas",
                "opcion_trInterna": "/administracion/trasnferencia/trasnferenciaInterna",
                "opcion_trExterna": "/administracion/trasnferencia/trasnferenciaExterna",
                "opcion_historialA": "/administracion/historial/vista",
                "opcion_ActivoAj": "/administracion/ingreso/vista"
            };

            // 3. EVENTO MAESTRO: Detecta clics en cualquier ID que exista en nuestro diccionario
            $(".menu-item").click(function (e) {
                const idSeleccionado = $(this).attr("id");

                // Si el elemento clickeado está en nuestro diccionario, ejecutamos la acción
                if (idSeleccionado && rutasMenu[idSeleccionado]) {
                    e.preventDefault();

                    // Cargar el contenido de la URL
                    cargarContenido(rutasMenu[idSeleccionado]);

                    // Quitar la clase 'active' de todos los demás menús
                    $(".menu-item").removeClass("active");

                    // Poner la clase 'active' SÓLO al elemento clickeado
                    $(this).addClass("active");
                }
            });

            function cargarContenido(url) {
                $.ajax({
                    url: "/adm/cargar-datos",
                    method: "GET",
                    success: function () {
                        $.ajax({
                            url: url,
                            method: "GET",
                            success: function (data) {
                                $("#contenido").html(data);
                            },
                            error: function (xhr) {
                                console.error('Error en la solicitud:', xhr);
                            }
                        });
                    },
                    error: function (xhr) {
                        if (xhr.status === 401) {
                            Swal.fire({
                                title: 'Sesión expirada',
                                text: 'Tu sesión ha expirado. Por favor, inicia sesión nuevamente.',
                                icon: 'warning',
                                confirmButtonText: 'Ir al login'
                            }).then((result) => {
                                if (result.isConfirmed) {
                                    window.location.href = '/';
                                }
                            });
                        }
                    }
                });
            }
        });
    </script>
